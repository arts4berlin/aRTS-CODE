<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="icon" href="assets/favicon.png" sizes="32x32" type="image/png">

  <link rel="apple-touch-icon" href="assets/favicon-180.png">
  <meta property="og:type"         content="website">
  <meta property="og:url"          content="https://4-arts.com/">
  <meta property="og:title"        content="[aRTS]">
  <meta property="og:description"  content="TRaDE + CONNeCT — now in BERLIN">
  <meta property="og:image"        content="https://4-arts.com/assets/og-banner.png">
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="[aRTS]">
  <meta name="twitter:description" content="TRaDE + CONNeCT — now in BERLIN">
  <meta name="twitter:image"       content="https://4-arts.com/assets/og-banner.png">
  <title>[aRTS] — TaIL EnD</title>
  <script>
    /* Clear any pass so the user must restart from scratch */
    localStorage.removeItem('captcha_passed');
  </script>
  <link rel="preload" as="image" href="assets/bear.png">
  <link href="assets/fonts/space-grotesk.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Label row: TaIL  ·  EnD ── */
    .label-row {
      display: flex;
      gap: clamp(3rem, 12vw, 9rem);
      align-items: baseline;
      margin-bottom: clamp(2rem, 5vh, 4rem);
      opacity: 0;
      animation: fadeUp 0.7s ease 0.1s forwards;
    }

    .label {
      font-size: clamp(1.1rem, 3vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.14em;
      color: #fff;
    }

    /* ── Bear grin ── */
    .bear-wrap {
      width: clamp(180px, 46vw, 420px);
      opacity: 0;
      animation: fadeUp 0.75s cubic-bezier(0.34, 1.56, 0.64, 1) 0.28s forwards;
    }

    .bear-wrap img {
      width: 100%;
      height: auto;
      filter: brightness(0) invert(1);
      display: block;
    }

    /* ── Hint ── */
    .hint {
      margin-top: clamp(1rem, 2.5vh, 2rem);
      font-size: clamp(0.65rem, 1.5vw, 0.82rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.28);
      opacity: 0;
      animation: fadeUp 0.6s ease 0.55s forwards;
    }

    /* ── Restart button ── */
    .btn-restart {
      margin-top: clamp(1.6rem, 3.5vh, 3rem);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: clamp(180px, 38vw, 300px);
      height: clamp(48px, 8vh, 72px);
      border: 2px solid #FF5C00;
      border-radius: 4px;
      background: transparent;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.8rem, 2vw, 1rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-decoration: none;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.18s, color 0.18s;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.8s forwards;
    }
    .btn-restart:hover { background: #FF5C00; color: #000; }

    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0);    }
    }

    /* ── dvh fix: excludes iOS Safari address bar ── */
    @supports (height: 100dvh) {
      body { height: 100dvh; }
    }
    /* ── Mobile: safe area + text-size ── */
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    .logo, .nav-about, header { touch-action: manipulation; }
    .btn, button, a { touch-action: manipulation; }
  
    /* ── Global: no text selection; no double-tap zoom (pinch zoom kept) ── */
    * { -webkit-user-select: none; user-select: none; }
    input, textarea, select, [contenteditable] { -webkit-user-select: text; user-select: text; }
    html { touch-action: manipulation; }
</style>
</head>
<body>

  <div class="label-row">
    <span class="label">TaIL</span>
    <span class="label">EnD</span>
  </div>

  <div class="bear-wrap">
    <img src="assets/bear.png" alt="">
  </div>

  <p class="hint">... sOMETHING WENT WRONG ...</p>

  <a href="captcha.html" class="btn-restart">rESTART</a>


<script src="theme.js?v=4"></script>
<script src="btn-fx.js"></script>
</body>
</html>
