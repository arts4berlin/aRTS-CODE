  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 100;
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .nav-about {
      position: fixed;
      top: 28px; right: 32px;
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    .nav-about:hover { opacity: 1; }

    .heading {
      text-align: center;
    }

    .small {
      font-size: 0.82rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      opacity: 0.55;
      display: block;
      margin-bottom: 0.15rem;
    }

    .large {
      font-size: clamp(2rem, 6vw, 3.4rem);
      font-weight: 700;
      letter-spacing: 0.25em;
      display: block;
    }
  
    /* ── dvh fix: excludes iOS Safari address bar ── */
    @supports (height: 100dvh) {
      body { height: 100dvh; }
    }
    /* ── Mobile: safe area + text-size ── */
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    .logo, .nav-about, header { touch-action: manipulation; }
    .btn, button, a { touch-action: manipulation; }
  </style>
</head>
<body>

  <a href="home.html" class="logo">[aRTS]</a>
  <a href="about.html" class="nav-about">aBOUT</a>

  <div class="heading">
    <span class="small">YOUR</span>
    <span class="large">aID.</span>
  </div>

  <script>
    (function () {
      function reveal() {
        var c = document.createElement('div');
        c.style.cssText = 'position:fixed;inset:0;background:#000;z-index:99998;pointer-events:none;opacity:1;';
        document.body.appendChild(c);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            c.style.transition = 'opacity 0.22s ease';
            c.style.opacity    = '0';
            setTimeout(function () { if (c.parentNode) c.parentNode.removeChild(c); }, 320);
          });
        });
      }
      window.addEventListener('pageshow', function (e) { if (e.persisted) reveal(); });
    })();
  </script>
</body>
</html>
