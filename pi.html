<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[aRTS]</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      height: 100vh;
      overflow: hidden;
    }

    /* ── The I — decryption gate, fixed centre ── */
    #big-i {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(7rem, 20vw, 13rem);
      font-weight: 700;
      color: #FF5C00;
      line-height: 1;
      user-select: none;
      pointer-events: none;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.28s ease;
      text-shadow: 0 0 70px rgba(255,92,0,0.30);
    }

    /* ── Scrolling word row ── */
    #word-wrap {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      white-space: nowrap;
      display: flex;
      align-items: center;
      z-index: 10;
      pointer-events: none;
    }

    /* Individual letters — undecrypted = dim uppercase scramble */
    .letter {
      display: inline-block;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 700;
      color: rgba(255,255,255,0.35);
      line-height: 1;
      padding: 0 0.10em;
      user-select: none;
    }

    /* Decrypted = bright lowercase */
    .letter.done {
      color: rgba(255,255,255,0.92);
    }
  </style>
</head>
<body>

  <span id="big-i">?</span>
  <div id="word-wrap"></div>

  <script>
  (function () {
    'use strict';

    const bigI     = document.getElementById('big-i');
    const wordWrap = document.getElementById('word-wrap');

    const POOL        = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#%&!?';
    const WORDS       = ['rsvp','connect','berlin','art','create','join','reveal','open','meet'];
    const WORD_SPEED  = 150;  // px / second
    const SCRAMBLE_MS = 58;   // letter scramble interval

    let wordIdx  = 0;
    let wordX    = 0;
    let exited   = false;   // current word has left the screen
    let spans    = [];
    let decrypted= [];
    let sTimers  = [];
    let lastTs   = null;
    let streaming= false;

    /* ══════════════════════════════════════════════
       PHASE 1 — single char scrambles → settles to I
    ══════════════════════════════════════════════ */
    function runIntro() {
      bigI.style.opacity = '1';
      bigI.textContent   = POOL[Math.floor(Math.random() * POOL.length)];

      // Fast scramble burst
      let alive = true;
      const fast = setInterval(() => {
        if (alive) bigI.textContent = POOL[Math.floor(Math.random() * POOL.length)];
      }, 55);

      // After 1.1 s, slow-settle to 'I'
      setTimeout(() => {
        alive = false;
        clearInterval(fast);

        let step = 0;
        const settle = setInterval(() => {
          if (step < 20) {
            bigI.textContent = POOL[Math.floor(Math.random() * POOL.length)];
          } else {
            clearInterval(settle);
            bigI.textContent = 'I';
            setTimeout(beginStream, 440);
          }
          step++;
        }, 55);
      }, 1100);
    }

    /* ══════════════════════════════════════════════
       PHASE 2 — word stream
    ══════════════════════════════════════════════ */
    function beginStream() {
      streaming = true;
      loadWord(WORDS[wordIdx]);
      requestAnimationFrame(tick);
    }

    function loadWord(word) {
      wordWrap.innerHTML = '';
      sTimers.forEach(clearInterval);
      spans     = [];
      decrypted = [];
      sTimers   = [];
      exited    = false;

      for (let i = 0; i < word.length; i++) {
        const span       = document.createElement('span');
        span.className   = 'letter';
        span.textContent = POOL[Math.floor(Math.random() * POOL.length)];
        wordWrap.appendChild(span);
        spans.push(span);
        decrypted.push(false);

        /* Capture index for interval closure */
        (function (idx) {
          const t = setInterval(() => {
            if (!decrypted[idx]) {
              spans[idx].textContent = POOL[Math.floor(Math.random() * POOL.length)];
            }
          }, SCRAMBLE_MS);
          sTimers.push(t);
        })(i);
      }

      /* Start word off-screen right */
      wordX = window.innerWidth + 60;
      wordWrap.style.left = wordX + 'px';
    }

    /* ══════════════════════════════════════════════
       RAF LOOP
    ══════════════════════════════════════════════ */
    function tick(ts) {
      if (!lastTs) lastTs = ts;
      const dt = Math.min((ts - lastTs) / 1000, 0.05); // cap at 50 ms
      lastTs = ts;

      if (streaming && spans.length && !exited) {
        /* Move word left */
        wordX -= WORD_SPEED * dt;
        wordWrap.style.left = wordX + 'px';

        /* I centre X */
        const iRect = bigI.getBoundingClientRect();
        const iCX   = iRect.left + iRect.width / 2;

        /* Check each letter for crossing */
        spans.forEach((span, i) => {
          if (decrypted[i]) return;
          const lr  = span.getBoundingClientRect();
          const lcx = lr.left + lr.width / 2;

          if (lcx < iCX) {
            decrypted[i] = true;
            clearInterval(sTimers[i]);

            /* Capture correct char before any async delay */
            const correctChar = WORDS[wordIdx][i].toLowerCase();

            /* Brief flicker → lowercase */
            let flk = 0;
            const fTimer = setInterval(() => {
              if (flk < 3) {
                span.textContent = POOL[Math.floor(Math.random() * POOL.length)];
              } else {
                clearInterval(fTimer);
                span.textContent = correctChar;
                span.classList.add('done');
              }
              flk++;
            }, 40);
          }
        });

        /* Advance to next word once last letter exits left */
        const last = spans[spans.length - 1];
        if (last && last.getBoundingClientRect().right < 0) {
          exited = true;
          sTimers.forEach(clearInterval);
          setTimeout(() => {
            wordIdx = (wordIdx + 1) % WORDS.length;
            loadWord(WORDS[wordIdx]);
          }, 480);
        }
      }

      requestAnimationFrame(tick);
    }

    /* ── Go ── */
    runIntro();
  })();
  </script>

</body>
</html>
