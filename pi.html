  <link rel="stylesheet" href="styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
    }

    /* ── The I — decryption gate, fixed centre ── */
    #big-i {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(7rem, 20vw, 13rem);
      font-weight: 700;
      color: #FF5C00;
      line-height: 1;
      user-select: none;
      pointer-events: auto;
      cursor: default;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.28s ease;
      text-shadow: 0 0 70px rgba(255,92,0,0.30);
    }

    /* Blink while no letters are passing through */
    @keyframes iBlink {
      0%,  49.9% { color: #FF5C00; text-shadow: 0 0 70px rgba(255,92,0,0.30); }
      50%, 100%  { color: rgba(255,92,0,0.06); text-shadow: none; }
    }
    #big-i.idle {
      animation: iBlink 1s linear infinite;
    }

    /* Stamp/kick when a letter passes through */
    @keyframes iPress {
      0%   { transform: translate(-50%, -50%) scaleY(1); }
      28%  { transform: translate(-50%, -50%) scaleY(0.86); }
      65%  { transform: translate(-50%, -50%) scaleY(1.06); }
      100% { transform: translate(-50%, -50%) scaleY(1); }
    }
    #big-i.press {
      animation: iPress 0.32s cubic-bezier(0.34, 1.56, 0.64, 1) forwards !important;
      color: #FF5C00 !important;
      text-shadow: 0 0 80px rgba(255,92,0,0.5) !important;
    }

    /* ── Scrolling word row ── */
    #word-wrap {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      white-space: nowrap;
      display: flex;
      align-items: center;
      z-index: 10;
      pointer-events: none;
    }

    /* Individual letters — undecrypted = dim uppercase scramble */
    .letter {
      display: inline-block;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 700;
      color: rgba(255,255,255,0.35);
      line-height: 1;
      padding: 0 0.10em;
      user-select: none;
      transition: color 0.22s ease;
    }

    /* Decrypted = bright lowercase — colour fades in smoothly */
    .letter.done {
      color: rgba(255,255,255,0.92);
    }
  
    /* ── dvh fix: excludes iOS Safari address bar ── */
    @supports (height: 100dvh) {
      body { height: 100dvh; }
    }
    /* ── Mobile: safe area + text-size ── */
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    .logo, .nav-about, header { touch-action: manipulation; }
    .btn, button, a { touch-action: manipulation; }

    /* ── Apple Wallet voucher — Easter egg ── */
    #voucher-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 99990;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }
    #voucher-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    #voucher-card {
      background: #0e0e0e;
      border-radius: 24px 24px 0 0;
      width: min(440px, 100vw);
      padding-bottom: max(env(safe-area-inset-bottom), 32px);
      transform: translateY(100%);
      transition: transform 0.48s cubic-bezier(0.34, 1.2, 0.64, 1);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    #voucher-overlay.open #voucher-card {
      transform: translateY(0);
    }
    .v-stripe { height: 5px; background: #FF5C00; }
    .v-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 20px 28px 0;
    }
    .v-logo { font-size: 1rem; font-weight: 300; letter-spacing: 0.08em; color: #fff; }
    .v-type {
      font-size: 0.56rem; font-weight: 300; letter-spacing: 0.22em;
      color: rgba(255,255,255,0.28); text-transform: uppercase;
    }
    .v-discount {
      font-family: 'Space Grotesk', system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: clamp(5.5rem, 22vw, 9rem);
      font-weight: 700;
      font-style: normal;
      letter-spacing: -0.02em;
      color: #FF5C00;
      line-height: 1;
      text-align: center;
      padding: 10px 28px 0;
      user-select: none;
      -webkit-user-select: none;
    }
    .v-label {
      font-size: 0.7rem; font-weight: 300; letter-spacing: 0.24em;
      color: rgba(255,255,255,0.35); text-transform: uppercase;
      text-align: center; margin-top: 2px;
    }
    .v-rule { height: 1px; background: rgba(255,255,255,0.07); margin: 22px 28px; }
    .v-congrats {
      font-size: 1rem; font-weight: 700; letter-spacing: 0.14em;
      color: #fff; text-align: center;
    }
    .v-sublabel {
      font-size: 0.65rem; font-weight: 300; letter-spacing: 0.16em;
      color: rgba(255,255,255,0.32); text-align: center; margin-top: 4px;
    }
    .v-code-label {
      font-size: 0.52rem; font-weight: 300; letter-spacing: 0.26em;
      color: rgba(255,255,255,0.22); text-align: center;
      margin-top: 22px; text-transform: uppercase;
    }
    #v-code {
      font-size: 1.05rem; font-weight: 700; letter-spacing: 0.2em;
      color: #fff; text-align: center; margin-top: 7px;
      cursor: pointer; transition: color 0.15s;
      touch-action: manipulation;
    }
    #v-code:hover { color: #FF5C00; }
    /* ── Global: no text selection; no double-tap zoom (pinch zoom kept) ── */
    * { -webkit-user-select: none; user-select: none; }
    input, textarea, select, [contenteditable] { -webkit-user-select: text; user-select: text; }
    html { touch-action: manipulation; }
</style>
</head>
<body>

  <span id="big-i">?</span>
  <div id="word-wrap"></div>
  <a href="home.html" id="skip-link" style="position:fixed;bottom:clamp(18px,4vh,32px);left:50%;transform:translateX(-50%);font-family:'Space Grotesk',sans-serif;font-size:0.56rem;font-weight:300;letter-spacing:0.22em;color:rgba(255,255,255,0);text-decoration:none;z-index:30;transition:color 1.8s ease 4s;pointer-events:none;">sKIP →</a>
  <script>setTimeout(function(){var s=document.getElementById('skip-link');if(s){s.style.color='rgba(255,255,255,0.18)';s.style.pointerEvents='auto';}},4500);</script>

  <!-- Easter egg: Apple Wallet voucher -->
  <div id="voucher-overlay">
    <div id="voucher-card">
      <div class="v-stripe"></div>
      <div class="v-header">
        <span class="v-logo">[aRTS]</span>
        <span class="v-type">member pass</span>
      </div>
      <div class="v-label">pAY</div>
      <div class="v-discount">π%</div>
      <div class="v-rule"></div>
      <div class="v-congrats">cONGRATULATIONS</div>
      <div class="v-sublabel">you found the easter egg</div>
      <div class="v-code-label">redemption code</div>
      <div id="v-code">—</div>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const bigI     = document.getElementById('big-i');
    const wordWrap = document.getElementById('word-wrap');

    const POOL        = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#%&!?';
    /* Scale speed to viewport — wider screens move faster, capped */
    const WORD_SPEED  = Math.max(140, Math.min(window.innerWidth * 0.18, 260));
    const SCRAMBLE_MS = 80;   // letter scramble interval

    /* Large brand-aligned pool — every visit draws a unique random selection */
    const ALL_WORDS = [
      'sense','shift','signal','build','hold','move','speak','open','draw',
      'trade','connect','create','curate','collect','exchange','discover','reveal',
      'place','find','shape','make','show','give','share','channel','bridge',
      'craft','offer','gather','frame','direct','express','trace','value','seek'
    ];

    /* Pick 9 unique words at random, then use those for this session */
    const WORDS = (function(){
      var pool = ALL_WORDS.slice();
      var picked = [];
      var n = Math.min(9, pool.length);
      for (var _i = 0; _i < n; _i++) {
        var idx = Math.floor(Math.random() * pool.length);
        picked.push(pool.splice(idx, 1)[0]);
      }
      return picked;
    })();

    let wordIdx  = 0;
    let wordX    = 0;
    let exited   = false;   // current word has left the screen
    let spans    = [];
    let decrypted= [];
    let sTimers  = [];
    let lastTs   = null;
    let streaming= false;
    let speedMult= 1.0;     // 0.32× near gate, 1.0× elsewhere

    /* ══════════════════════════════════════════════
       PHASE 1 — single char scrambles → settles to I
    ══════════════════════════════════════════════ */
    function runIntro() {
      bigI.style.opacity = '1';
      bigI.textContent   = POOL[Math.floor(Math.random() * POOL.length)];

      // Fast scramble burst
      let alive = true;
      const fast = setInterval(() => {
        if (alive) bigI.textContent = POOL[Math.floor(Math.random() * POOL.length)];
      }, 55);

      // After 1.1 s, slow-settle to 'I'
      setTimeout(() => {
        alive = false;
        clearInterval(fast);

        let step = 0;
        const settle = setInterval(() => {
          if (step < 20) {
            bigI.textContent = POOL[Math.floor(Math.random() * POOL.length)];
          } else {
            clearInterval(settle);
            bigI.textContent = 'I';
            setTimeout(beginStream, 440);
          }
          step++;
        }, 55);
      }, 1100);
    }

    /* ══════════════════════════════════════════════
       PHASE 2 — word stream
    ══════════════════════════════════════════════ */
    function beginStream() {
      streaming = true;
      bigI.classList.add('idle'); // blink until first letter arrives
      loadWord(WORDS[wordIdx]);
      requestAnimationFrame(tick);
    }

    function loadWord(word) {
      wordWrap.innerHTML = '';
      sTimers.forEach(clearInterval);
      spans     = [];
      decrypted = [];
      sTimers   = [];
      exited    = false;

      for (let i = 0; i < word.length; i++) {
        const span       = document.createElement('span');
        span.className   = 'letter';
        span.textContent = POOL[Math.floor(Math.random() * POOL.length)];
        wordWrap.appendChild(span);
        spans.push(span);
        decrypted.push(false);

        /* Capture index for interval closure */
        (function (idx) {
          const t = setInterval(() => {
            if (!decrypted[idx]) {
              spans[idx].textContent = POOL[Math.floor(Math.random() * POOL.length)];
            }
          }, SCRAMBLE_MS);
          sTimers.push(t);
        })(i);
      }

      /* Start word off-screen right */
      wordX = window.innerWidth + 60;
      wordWrap.style.left = wordX + 'px';
      speedMult = 1.0;
    }

    /* ══════════════════════════════════════════════
       RAF LOOP
    ══════════════════════════════════════════════ */
    function tick(ts) {
      if (!lastTs) lastTs = ts;
      const dt = Math.min((ts - lastTs) / 1000, 0.05); // cap at 50 ms
      lastTs = ts;

      if (streaming && spans.length && !exited) {
        /* I centre X + proximity threshold */
        const iRect = bigI.getBoundingClientRect();
        const iCX   = iRect.left + iRect.width / 2;
        const NEAR  = Math.max(70, iRect.width);

        /* Pre-scan: is any undecrypted letter approaching the gate?
           If so, throttle speed for dramatic decryption moment */
        let gateActive = false;
        spans.forEach((span, i) => {
          if (decrypted[i]) return;
          const r = span.getBoundingClientRect();
          if (Math.abs(r.left + r.width / 2 - iCX) < NEAR) gateActive = true;
        });

        /* Speed: 32% through gate, full pace everywhere else */
        speedMult = gateActive ? 0.32 : 1.0;

        /* Move word left */
        wordX -= WORD_SPEED * speedMult * dt;
        wordWrap.style.left = wordX + 'px';

        /* Decrypt letters + track I blink */
        let anyNear = false;
        spans.forEach((span, i) => {
          if (decrypted[i]) return;
          const lr  = span.getBoundingClientRect();
          const lcx = lr.left + lr.width / 2;

          if (Math.abs(lcx - iCX) < NEAR) anyNear = true;

          if (lcx < iCX) {
            decrypted[i] = true;
            clearInterval(sTimers[i]);
            /* Snap immediately — colour transition in CSS makes it seamless */
            span.textContent = WORDS[wordIdx][i].toLowerCase();
            span.classList.add('done');

            /* Press / stamp animation on the I caret */
            bigI.classList.remove('idle', 'press');
            void bigI.offsetWidth; // force reflow to restart animation
            bigI.classList.add('press');
            setTimeout(() => bigI.classList.remove('press'), 300);
          }
        });

        /* Blink I when idle, solid when a letter is passing through */
        if (anyNear) { bigI.classList.remove('idle'); }
        else         { bigI.classList.add('idle'); }

        /* Advance to next word once last letter exits left */
        const last = spans[spans.length - 1];
        if (last && last.getBoundingClientRect().right < 0) {
          exited = true;
          bigI.classList.add('idle'); // restart blink during gap
          sTimers.forEach(clearInterval);
          setTimeout(() => {
            wordIdx = (wordIdx + 1) % WORDS.length;
            loadWord(WORDS[wordIdx]);
          }, 300);
        }
      }

      requestAnimationFrame(tick);
    }

    /* ── Easter egg: 7 clicks on I → 77% voucher ── */
    (function(){
      var clicks = 0;
      var CPOOL  = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      function randCode(){
        var c=''; for(var i=0;i<6;i++) c+=CPOOL[Math.floor(Math.random()*CPOOL.length)];
        return 'aRTS-PI-'+c;
      }
      var overlay = document.getElementById('voucher-overlay');
      var codeEl  = document.getElementById('v-code');

      bigI.addEventListener('click', function(){
        clicks++;
        if(clicks===7){
          clicks=0;
          codeEl.textContent = randCode();
          codeEl.style.color = '';
          overlay.classList.add('open');
          /* Award +77 points if member logged in */
          try {
            if (localStorage.getItem('arts_id_hash')) {
              var ptsCfg=null;try{ptsCfg=JSON.parse(localStorage.getItem('arts_points_config'));}catch(e){}
              var piPts=(ptsCfg&&ptsCfg.events&&ptsCfg.events.pi_easter_egg!=null)?ptsCfg.events.pi_easter_egg:314;
              var cur = parseInt(localStorage.getItem('arts_points') || '0', 10);
              localStorage.setItem('arts_points', String(cur + piPts));
            }
          } catch(e) {}
        }
      });

      /* Double tap anywhere on backdrop to close */
      overlay.addEventListener('click', function(e){
        if(e.target!==codeEl) overlay.classList.remove('open');
      });

      /* Tap code to copy it */
      codeEl.addEventListener('click', function(e){
        e.stopPropagation();
        var txt = codeEl.textContent;
        if(navigator.clipboard){ navigator.clipboard.writeText(txt); }
        else{
          var ta=document.createElement('textarea'); ta.value=txt;
          ta.style.cssText='position:fixed;opacity:0;'; document.body.appendChild(ta);
          ta.select(); try{document.execCommand('copy');}catch(ee){}
          document.body.removeChild(ta);
        }
        var orig=codeEl.textContent;
        codeEl.textContent='cOPIED ✓'; codeEl.style.color='#FF5C00';
        setTimeout(function(){ codeEl.textContent=orig; codeEl.style.color=''; }, 1600);
      });
    })();

    /* ── Go ── */
    runIntro();
  })();
  </script>

<script src="theme.js?v=4"></script>
</body>
