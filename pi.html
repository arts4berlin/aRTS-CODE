<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[aRTS]</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ── Background polygon canvas ── */
    canvas {
      position: fixed;
      inset: 0;
      display: block;
      opacity: 0.38;
      transition: opacity 0.65s ease;
    }
    canvas.fade { opacity: 0; }

    /* ── Full-screen black veil ── */
    #veil {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.75s ease;
      z-index: 30;
    }
    #veil.out { opacity: 1; }

    /* ── Top-centre logo ── */
    #pi-logo {
      position: fixed;
      top: 2.2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.85rem, 2.2vw, 1.4rem);
      font-weight: 300;
      letter-spacing: 0.24em;
      color: #fff;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    /* ── Shared centre stage ── */
    #stage {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── π and I share the same size / style ── */
    .glyph {
      position: absolute;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(7rem, 28vh, 17rem);
      color: #FF5C00;
      line-height: 1;
      user-select: none;
      pointer-events: none;
    }

    /* π bounces in */
    @keyframes piBounce {
      0%   { opacity: 0; transform: scale(0);    }
      60%  { opacity: 1; transform: scale(1.12); }
      80%  { opacity: 1; transform: scale(0.94); }
      100% { opacity: 1; transform: scale(1);    }
    }
    #pi-char {
      opacity: 0;
      animation: piBounce 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }
    /* Lock class: CSS animation removed so JS can drive opacity/filter */
    #pi-char.lock {
      animation: none !important;
      opacity: 1 !important;
      transform: scale(1) !important;
    }

    /* I starts invisible; JS drives the entire appearance */
    #big-i {
      opacity: 0;
    }
  </style>
</head>
<body>

  <canvas id="c"></canvas>
  <div id="pi-logo">[aRTS]</div>

  <div id="stage">
    <span class="glyph" id="pi-char">π</span>
    <span class="glyph" id="big-i">I</span>
  </div>

  <div id="veil"></div>

  <script>
  (function () {
    'use strict';

    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const veil   = document.getElementById('veil');
    const logo   = document.getElementById('pi-logo');
    const piChar = document.getElementById('pi-char');
    const bigI   = document.getElementById('big-i');

    /* ── Timing ── */
    const MORPH_START = 1700;   // ms after load when π→I begins
    const MORPH_DUR   = 580;    // blur-crossfade duration (ms)
    const SHOW_MS     = 4000;   // total time before redirect
    const VEIL_MS     = 750;    // veil fade before navigate
    const DEST        = 'index.html';

    let morphed = false;

    /* Fade in logo */
    setTimeout(() => { logo.style.opacity = '0.65'; }, 300);

    /* ── Canvas resize ── */
    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    /* ── Easing helpers ── */
    function easeInOutCubic(t) {
      return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
    }
    function easeOut2(t) { return 1 - (1 - t) * (1 - t); }
    function smoothstep(t) { return t * t * (3 - 2 * t); }
    function clamp(mn, v, mx) { return Math.max(mn, Math.min(mx, v)); }

    /* ── Blur-crossfade: π dissolves → I emerges ──────────────────────
       π  : easeOut fade-out + blur grows   (starts immediately)
       I  : smoothstep fade-in + blur shrinks (delayed 18% of duration)
       The two glyphs pass through each other in a shared blur-peak. ── */
    function morphPiToI(dur) {
      // Stabilise π so JS can drive opacity/filter freely
      piChar.classList.add('lock');
      // Force a reflow so the lock class is applied before we touch style
      void piChar.offsetHeight;

      const t0 = performance.now();

      function step(now) {
        const p = clamp(0, (now - t0) / dur, 1);

        /* π fades out */
        const fp = easeOut2(p);
        piChar.style.opacity = (1 - fp).toFixed(4);
        piChar.style.filter  = `blur(${(fp * 18).toFixed(1)}px)`;

        /* I fades in — delayed 18% so the blur peaks overlap */
        const pI = clamp(0, (p - 0.18) / 0.82, 1);
        const fi = smoothstep(pI);
        bigI.style.opacity = fi.toFixed(4);
        bigI.style.filter  = `blur(${((1 - fi) * 18).toFixed(1)}px)`;

        if (p < 1) {
          requestAnimationFrame(step);
        } else {
          /* Clean up */
          piChar.style.display = 'none';
          bigI.style.filter    = '';
          bigI.style.opacity   = '1';
        }
      }

      requestAnimationFrame(step);
    }

    /* ── Exit: schedule veil + navigation ── */
    setTimeout(() => {
      veil.classList.add('out');
      setTimeout(() => { window.location.href = DEST; }, VEIL_MS + 80);
    }, SHOW_MS);

    /* ── Canvas render loop (runs until morph is complete) ── */
    let startTs = null;

    function frame(now) {
      if (startTs === null) startTs = now;
      const elapsed = now - startTs;

      const t     = clamp(0, elapsed / MORPH_START, 1);
      const sides = Math.max(3, Math.floor(3 + 57 * easeInOutCubic(t)));
      const rot   = elapsed * 0.00012;

      const W  = canvas.width;
      const H  = canvas.height;
      const cx = W / 2;
      const cy = H / 2;
      const r  = Math.min(W, H) * 0.30;
      const a  = clamp(0, elapsed / 500, 1);

      ctx.clearRect(0, 0, W, H);

      /* Concentric rings */
      [0.55, 1.0, 1.5].forEach((s, i) => {
        ctx.beginPath();
        ctx.arc(cx, cy, r * s, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,255,${(0.06 - i * 0.015) * a})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      });

      /* Dashed radius */
      ctx.save();
      ctx.setLineDash([5, 8]);
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + r * Math.cos(rot), cy + r * Math.sin(rot));
      ctx.strokeStyle = `rgba(255,255,255,${0.10 * a})`;
      ctx.lineWidth = 0.6;
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();

      /* Outer circle */
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,255,255,${0.12 * a})`;
      ctx.lineWidth = 0.8;
      ctx.stroke();

      /* Spokes */
      for (let i = 0; i < sides; i++) {
        const ang = (2 * Math.PI * i / sides) + rot;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + r * Math.cos(ang), cy + r * Math.sin(ang));
        ctx.strokeStyle = `rgba(255,92,0,${0.06 * a})`;
        ctx.lineWidth = 0.4;
        ctx.stroke();
      }

      /* Polygon */
      ctx.beginPath();
      for (let i = 0; i <= sides; i++) {
        const ang = (2 * Math.PI * i / sides) + rot;
        const x   = cx + r * Math.cos(ang);
        const y   = cy + r * Math.sin(ang);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(255,92,0,${0.85 * a})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      /* Vertex dots */
      for (let i = 0; i < sides; i++) {
        const ang = (2 * Math.PI * i / sides) + rot;
        const x   = cx + r * Math.cos(ang);
        const y   = cy + r * Math.sin(ang);
        ctx.beginPath();
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,92,0,${a})`;
        ctx.fill();
      }

      /* π approximation label */
      const piApprox = sides * Math.sin(Math.PI / sides);
      const fs = clamp(10, W * 0.011, 13);
      ctx.font         = `300 ${fs}px 'Space Grotesk', sans-serif`;
      ctx.fillStyle    = `rgba(255,255,255,${0.38 * a})`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText(
        `π  ≈  ${piApprox.toFixed(8)}     n = ${sides}`,
        cx, cy + r + clamp(28, r * 0.16, 46)
      );

      /* ── Trigger morph ── */
      if (!morphed && elapsed >= MORPH_START) {
        morphed = true;
        canvas.classList.add('fade');
        logo.style.opacity = '0';
        morphPiToI(MORPH_DUR);
      }

      /* Keep canvas loop alive through morph, then stop */
      if (elapsed < MORPH_START + MORPH_DUR + 200) {
        requestAnimationFrame(frame);
      }
    }

    requestAnimationFrame(frame);
  })();
  </script>

</body>
</html>
