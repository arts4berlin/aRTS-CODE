<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[aRTS]</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      transition: opacity 0.45s ease;
    }

    /* ── Full-screen black veil (fades in on exit) ── */
    #veil {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.75s ease;
      z-index: 20;
    }
    #veil.out { opacity: 1; }

    /* ── Top-centre logo ── */
    #pi-logo {
      position: fixed;
      top: 2.2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.85rem, 2.2vw, 1.4rem);
      font-weight: 300;
      letter-spacing: 0.24em;
      color: #fff;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    /* ── Morph target: the big serif I ── */
    #big-i {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(7rem, 30vh, 18rem);
      color: #FF5C00;
      line-height: 1;
      user-select: none;
      pointer-events: none;
      opacity: 0;
      z-index: 10;
    }

    @keyframes iBounce {
      0%   { transform: translate(-50%, -50%) scale(0);    opacity: 0; }
      60%  { transform: translate(-50%, -50%) scale(1.12); opacity: 1; }
      80%  { transform: translate(-50%, -50%) scale(0.94); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1);    opacity: 1; }
    }

    #big-i.show {
      animation: iBounce 0.85s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
  </style>
</head>
<body>

  <canvas id="c"></canvas>

  <!-- Logo -->
  <div id="pi-logo">[aRTS]</div>

  <!-- Morph target -->
  <span id="big-i">I</span>

  <!-- Exit veil -->
  <div id="veil"></div>

  <script>
  (function () {
    'use strict';

    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const veil   = document.getElementById('veil');
    const logo   = document.getElementById('pi-logo');
    const bigI   = document.getElementById('big-i');

    /* ── Timing (ms) ── */
    const MORPH_START = 2400;  // canvas + logo fade out
    const I_DELAY     = 350;   // I bounces in after canvas is gone
    const SHOW_MS     = 5200;  // total time before redirect veil
    const VEIL_MS     = 750;   // veil fade duration
    const DEST        = 'index.html';

    let morphed = false;

    /* ── Fade in logo ── */
    setTimeout(() => { logo.style.opacity = '0.65'; }, 220);

    /* ── Canvas resize ── */
    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    /* ── Easing ── */
    function easeInOutCubic(t) {
      return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
    }

    function clamp(min, val, max) {
      return Math.max(min, Math.min(max, val));
    }

    let startTs = null;

    /* ── Main render loop ── */
    function frame(now) {
      if (startTs === null) startTs = now;
      const elapsed = now - startTs;

      /* Progress 0→1 for polygon growth over MORPH_START */
      const t     = clamp(0, elapsed / MORPH_START, 1);
      const sides = Math.max(3, Math.floor(3 + 57 * easeInOutCubic(t)));
      const rot   = elapsed * 0.00015; // very slow drift

      /* Canvas opacity: quick fade-in */
      const canvasAlpha = clamp(0, elapsed / 380, 1);

      const W  = canvas.width;
      const H  = canvas.height;
      const cx = W / 2;
      const cy = H / 2;
      const r  = Math.min(W, H) * 0.285;
      const a  = canvasAlpha;

      ctx.clearRect(0, 0, W, H);

      /* ── Bounce-in scale (spring, same feel as the I) ── */
      const BOUNCE_DUR = 900;
      const bt  = clamp(0, elapsed / BOUNCE_DUR, 1);
      const scl = bt < 0.55
        ? (bt / 0.55) * 1.14
        : bt < 0.80
          ? 1.14 - 0.20 * ((bt - 0.55) / 0.25)
          : 0.94 + 0.06 * ((bt - 0.80) / 0.20);

      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(scl, scl);
      ctx.translate(-cx, -cy);

      /* ── Concentric faint rings ── */
      [0.58, 1.0, 1.46].forEach((s, i) => {
        ctx.beginPath();
        ctx.arc(cx, cy, r * s, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,255,${(0.05 - i * 0.013) * a})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      });

      /* ── Dashed rotating radius line ── */
      ctx.save();
      ctx.setLineDash([6, 9]);
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + r * Math.cos(rot), cy + r * Math.sin(rot));
      ctx.strokeStyle = `rgba(255,255,255,${0.11 * a})`;
      ctx.lineWidth = 0.7;
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();

      /* ── Main circle ── */
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,255,255,${0.18 * a})`;
      ctx.lineWidth = 1;
      ctx.stroke();

      /* ── Spoke lines (center → each vertex) ── */
      for (let i = 0; i < sides; i++) {
        const ang = (2 * Math.PI * i / sides) + rot;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + r * Math.cos(ang), cy + r * Math.sin(ang));
        ctx.strokeStyle = `rgba(255,92,0,${0.07 * a})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }

      /* ── Inscribed polygon ── */
      ctx.beginPath();
      for (let i = 0; i <= sides; i++) {
        const ang = (2 * Math.PI * i / sides) + rot;
        const x   = cx + r * Math.cos(ang);
        const y   = cy + r * Math.sin(ang);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(255,92,0,${0.94 * a})`;
      ctx.lineWidth = 1.8;
      ctx.stroke();

      /* ── Vertex dots + coordinate labels (shown only for small n) ── */
      const showCoords = sides <= 8;
      for (let i = 0; i < sides; i++) {
        const ang  = (2 * Math.PI * i / sides) + rot;
        const x    = cx + r * Math.cos(ang);
        const y    = cy + r * Math.sin(ang);

        /* Soft glow halo */
        const grd = ctx.createRadialGradient(x, y, 0, x, y, 7);
        grd.addColorStop(0, `rgba(255,92,0,${0.55 * a})`);
        grd.addColorStop(1,  'rgba(255,92,0,0)');
        ctx.beginPath();
        ctx.arc(x, y, 7, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        /* Solid core dot */
        ctx.beginPath();
        ctx.arc(x, y, 2.4, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,92,0,${a})`;
        ctx.fill();

        /* Coordinate label */
        if (showCoords) {
          const pureAng = 2 * Math.PI * i / sides;
          const nx = Math.cos(pureAng).toFixed(3);
          const ny = (-Math.sin(pureAng)).toFixed(3);
          const labelR = r + clamp(20, r * 0.15, 36);
          const lx = cx + labelR * Math.cos(ang);
          const ly = cy + labelR * Math.sin(ang);
          const fs = clamp(8.5, W * 0.009, 11);
          ctx.font         = `300 ${fs}px 'Space Grotesk', sans-serif`;
          ctx.fillStyle    = `rgba(255,255,255,${0.30 * a})`;
          ctx.textAlign    = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(`(${nx}, ${ny})`, lx, ly);
        }
      }

      /* ── π approximation label ── */
      const piApprox = sides * Math.sin(Math.PI / sides);
      const fs = clamp(10, W * 0.011, 13);
      ctx.font         = `300 ${fs}px 'Space Grotesk', sans-serif`;
      ctx.fillStyle    = `rgba(255,255,255,${0.42 * a})`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText(
        `π  ≈  ${piApprox.toFixed(8)}     n = ${sides}`,
        cx,
        cy + r + clamp(30, r * 0.16, 48)
      );

      ctx.restore();

      /* ── Trigger morph: canvas + logo fade, then I bounces in ── */
      if (!morphed && elapsed >= MORPH_START) {
        morphed = true;
        canvas.style.opacity = '0';
        logo.style.opacity   = '0';
        setTimeout(() => bigI.classList.add('show'), I_DELAY);
      }

      /* ── Loop or exit ── */
      if (elapsed < SHOW_MS) {
        requestAnimationFrame(frame);
      } else {
        veil.classList.add('out');
        setTimeout(() => { window.location.href = DEST; }, VEIL_MS + 80);
      }
    }

    requestAnimationFrame(frame);
  })();
  </script>

</body>
</html>
