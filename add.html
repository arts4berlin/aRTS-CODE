  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
    }

    /* ── Fixed header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 26px 32px;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(0,0,0,0.92) 60%, transparent);
    }

    .logo {
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 2.4rem;
    }

    nav a {
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      opacity: 0.85;
      transition: opacity 0.15s;
    }
    nav a:hover { opacity: 1; }

    /* ── Main column ── */
    main {
      padding-top: clamp(90px, 14vh, 120px);
      padding-bottom: clamp(80px, 10vh, 130px);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .form-col {
      width: min(92vw, 640px);
      display: flex;
      flex-direction: column;
    }

    /* Section label */
    .section-label {
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      margin-bottom: clamp(8px, 1.5vh, 14px);
    }

    /* Page title */
    .form-title {
      font-size: clamp(2rem, 6vw, 3.4rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1;
      color: #fff;
      margin-bottom: clamp(28px, 4.5vh, 48px);
    }

    /* ── Upload zone ── */
    .upload-zone {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s;
      background: rgba(255,255,255,0.02);
    }
    .upload-zone:hover { border-color: rgba(255,255,255,0.35); }
    .upload-zone.has-image { border-color: rgba(255,255,255,0.06); }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    #preview {
      display: none;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }
    #preview.visible { display: block; }

    .upload-hint {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .upload-zone.has-image .upload-hint { opacity: 0; }

    .upload-icon {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 300;
      color: rgba(255,255,255,0.18);
      line-height: 1;
    }
    .upload-text {
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.24em;
      color: rgba(255,255,255,0.18);
    }
    .upload-change {
      display: none;
      position: absolute;
      bottom: 12px;
      right: 12px;
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.28);
      background: rgba(0,0,0,0.55);
      padding: 4px 8px;
      border-radius: 3px;
      pointer-events: none;
    }
    .upload-zone.has-image .upload-change { display: block; }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: clamp(28px, 4vh, 44px) 0;
    }

    /* ── Form fields ── */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      margin-bottom: clamp(18px, 2.8vh, 28px);
    }

    .field-group label {
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.26em;
      color: rgba(255,255,255,0.32);
      text-transform: uppercase;
    }

    .field-group input,
    .field-group textarea {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1rem, 2.6vw, 1.3rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.55rem 0;
      outline: none;
      transition: border-color 0.18s;
      width: 100%;
    }
    .field-group input::placeholder,
    .field-group textarea::placeholder {
      color: rgba(255,255,255,0.12);
      font-weight: 300;
    }
    .field-group input:focus,
    .field-group textarea:focus {
      border-bottom-color: rgba(255,255,255,0.45);
    }
    .field-group textarea {
      resize: none;
      height: 80px;
      font-size: clamp(0.9rem, 2.2vw, 1.1rem);
    }

    /* ── Submit row ── */
    .submit-row {
      margin-top: clamp(24px, 3.5vh, 40px);
      display: flex;
      align-items: stretch;
    }

    .btn-submit {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.82rem, 2.2vw, 0.98rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      cursor: pointer;
      padding: 0.85rem clamp(1.6rem, 4vw, 2.8rem);
      background: #fff;
      color: #000;
      border: 2px solid #fff;
      border-radius: 4px 0 0 4px;
      border-right: 1px solid rgba(0,0,0,0.18);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-submit:hover { background: #FF5C00; border-color: #FF5C00; color: #000; }

    .btn-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.82rem, 2.2vw, 0.98rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-decoration: none;
      padding: 0.85rem clamp(1.4rem, 3.5vw, 2.2rem);
      background: transparent;
      color: #fff;
      border: 2px solid #fff;
      border-left: none;
      border-radius: 0 4px 4px 0;
      transition: background 0.15s, color 0.15s;
    }
    .btn-back:hover { background: #fff; color: #000; }

    /* Submit note */
    .submit-note {
      margin-top: clamp(16px, 2vh, 24px);
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.22);
      line-height: 1.6;
    }

    /* ── Mobile ── */
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    header, nav, a, button { touch-action: manipulation; }

    @media (max-width: 520px) {
      header { padding: 18px 16px; }
      nav    { gap: clamp(0.7rem, 3.5vw, 1.4rem); }
      nav a  { font-size: clamp(0.7rem, 2.2vw, 0.85rem); }
    }
  
    /* ── Global: no text selection; no double-tap zoom (pinch zoom kept) ── */
    * { -webkit-user-select: none; user-select: none; }
    input, textarea, select, [contenteditable] { -webkit-user-select: text; user-select: text; }
    html { touch-action: manipulation; }
</style>

  <!-- Image preview -->
  <script>
  (function(){
    var zone   = document.getElementById('upload-zone');
    var input  = document.getElementById('file-input');
    var preview= document.getElementById('preview');
    input.addEventListener('change', function(){
      var file = input.files && input.files[0];
      if(!file) return;
      var url = URL.createObjectURL(file);
      preview.src = url;
      preview.classList.add('visible');
      zone.classList.add('has-image');
    });
  })();
  </script>

  <!-- Submit → Formspree -->
  <script>
  (function(){
    var btn  = document.getElementById('btn-submit');
    var note = document.getElementById('submit-note');

    btn.addEventListener('click', async function(){
      var title = document.getElementById('f-title').value.trim();
      var email = document.getElementById('f-email').value.trim();

      if (!title) { document.getElementById('f-title').focus(); return; }
      if (!email) { document.getElementById('f-email').focus(); return; }

      var data = new FormData();
      data.append('title',    title);
      data.append('price',    document.getElementById('f-price').value.trim() || '—');
      data.append('email',    email);
      data.append('note',     document.getElementById('f-note').value.trim());
      data.append('_subject', '[aRTS] art submission: ' + title);

      var fileInput = document.getElementById('file-input');
      if (fileInput.files && fileInput.files[0]) {
        data.append('image', fileInput.files[0]);
      }

      btn.disabled = true;
      btn.textContent = 'sENDING...';

      try {
        var res = await fetch('https://formspree.io/f/xlgpgbeq', {
          method:  'POST',
          body:    data,
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          btn.textContent = 'sENT \u2713';
          btn.style.background  = '#FF5C00';
          btn.style.borderColor = '#FF5C00';
          note.textContent = '* submission received \u2014 we\'ll be in touch.';
          /* Award +50 points if member is logged in */
          try {
            if (localStorage.getItem('arts_id_hash')) {
              var cur = parseInt(localStorage.getItem('arts_points') || '0', 10);
              localStorage.setItem('arts_points', String(cur + 50));
              var ptsMsg = document.createElement('p');
              ptsMsg.style.cssText = 'font-size:0.62rem;font-weight:700;letter-spacing:0.14em;color:#FF5C00;margin-top:6px;';
              ptsMsg.textContent = '+ 50 pTS aWaRDED — cHECK yOUR iD';
              note.insertAdjacentElement('afterend', ptsMsg);
              setTimeout(function(){ if (ptsMsg.parentNode) ptsMsg.parentNode.removeChild(ptsMsg); }, 3500);
            }
          } catch(e) {}
          setTimeout(function(){
            btn.textContent       = 'sUBMiT';
            btn.style.background  = '';
            btn.style.borderColor = '';
            btn.disabled          = false;
            document.getElementById('f-title').value    = '';
            document.getElementById('f-price').value    = '';
            document.getElementById('f-email').value    = '';
            document.getElementById('f-note').value     = '';
            document.getElementById('file-input').value = '';
            document.getElementById('preview').classList.remove('visible');
            document.getElementById('upload-zone').classList.remove('has-image');
            note.textContent = '* image, title, price + contact sent directly to [aRTS].';
          }, 3000);
        } else {
          btn.textContent = 'sUBMiT';
          btn.disabled    = false;
          note.textContent = '* something went wrong \u2014 please try again.';
        }
      } catch (_) {
        btn.textContent  = 'sUBMiT';
        btn.disabled     = false;
        note.textContent = '* something went wrong \u2014 please try again.';
      }
    });
  })();
  </script>

  <script>
    (function () {
      function reveal() {
        var c = document.createElement('div');
        c.style.cssText = 'position:fixed;inset:0;background:#000;z-index:99998;pointer-events:none;opacity:1;';
        document.body.appendChild(c);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            c.style.transition = 'opacity 0.22s ease';
            c.style.opacity    = '0';
            setTimeout(function () { if (c.parentNode) c.parentNode.removeChild(c); }, 320);
          });
        });
      }
      window.addEventListener('pageshow', function (e) { if (e.persisted) reveal(); });
    })();
  </script>

  <!-- CRT channel-change transition -->
  <script>
  (function(){
    var scan=null,vig=null,busy=false;
    function mkL(){
      if(scan)return;
      scan=document.createElement('div');
      scan.style.cssText='position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,14,0,0.50) 3px,rgba(0,14,0,0.50) 4px);opacity:0;z-index:99997;pointer-events:none;';
      vig=document.createElement('div');
      vig.style.cssText='position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,0.88) 100%);opacity:0;z-index:99996;pointer-events:none;';
      document.body.appendChild(scan);
      document.body.appendChild(vig);
    }
    function lerp(a,b,t){return a+(b-a)*t;}
    function easeOut3(t){return 1-Math.pow(1-Math.min(1,Math.max(0,t)),3);}
    function smooth(t){var c=Math.min(1,Math.max(0,t));return c*c*(3-2*c);}

    function doEnter(){
      mkL();
      var T1=130,T2=780,T3=1150,s0=null;
      function run(ts){
        if(!s0)s0=ts;
        var e=ts-s0;
        if(e<T1){
          scan.style.opacity=String(lerp(0,1,e/T1));
          vig.style.opacity='0.95';
        }else if(e<T2){
          var t=(e-T1)/(T2-T1),p=lerp(50,0,easeOut3(t));
          document.documentElement.style.clipPath='inset('+p.toFixed(2)+'% 0 '+p.toFixed(2)+'% 0)';
          scan.style.opacity='1';
          vig.style.opacity=String(lerp(0.95,0.55,easeOut3(t)));
        }else if(e<T3){
          var t2=(e-T2)/(T3-T2),et=smooth(t2);
          document.documentElement.style.clipPath='';
          scan.style.opacity=String(lerp(1,0,et));
          vig.style.opacity=String(lerp(0.55,0,et));
        }else{
          document.documentElement.style.clipPath='';
          if(scan&&scan.parentNode)scan.parentNode.removeChild(scan);
          if(vig&&vig.parentNode)vig.parentNode.removeChild(vig);
          scan=null;vig=null;busy=false;return;
        }
        requestAnimationFrame(run);
      }
      requestAnimationFrame(run);
    }

    function doExit(dest){
      if(busy)return;busy=true;
      mkL();
      var TR=60,TS=320,s0=null;
      function run(ts){
        if(!s0)s0=ts;
        var e=ts-s0;
        if(e<TR){
          scan.style.opacity=String(lerp(0,1,e/TR));
          vig.style.opacity=String(lerp(0,0.95,e/TR));
        }else if(e<TR+TS){
          var t=(e-TR)/TS,p=lerp(0,50,smooth(t));
          document.documentElement.style.clipPath='inset('+p.toFixed(2)+'% 0 '+p.toFixed(2)+'% 0)';
          scan.style.opacity='1';
          vig.style.opacity='0.95';
        }else{
          document.documentElement.style.clipPath='inset(50% 0 50% 0)';
          sessionStorage.setItem('crt_transition','1');
          window.location.href=dest;
          return;
        }
        requestAnimationFrame(run);
      }
      requestAnimationFrame(run);
    }

    if(sessionStorage.getItem('crt_transition')){
      sessionStorage.removeItem('crt_transition');
      doEnter();
    }

    document.addEventListener('click',function(ev){
      var a=ev.target.closest('a[href]');
      if(!a)return;
      var h=a.getAttribute('href');
      if(!h||h.charAt(0)==='#'||/^(https?:|mailto:|tel:|\/\/)/.test(h))return;
      if(ev.metaKey||ev.ctrlKey||ev.shiftKey||ev.altKey)return;
      ev.preventDefault();
      doExit(h);
    },true);
  })();
  </script>

  <!-- Nav & logo hover -->
  <script>
  (function(){
    var DELAY = 40;
    function navHover(el){
      var orig = el.textContent;
      var timers=[], state=0;
      function clr(){ timers.forEach(clearTimeout); timers.length=0; }
      function render(n){
        var s=orig[0];
        for(var i=1;i<orig.length;i++) s+=(i<=n ? orig[i].toLowerCase() : orig[i]);
        el.textContent=s;
      }
      el.addEventListener('mouseenter',function(){
        clr(); var from=state;
        for(var i=0;i<orig.length-1-from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from+i+1);},i*DELAY));
        })(i);
      });
      el.addEventListener('mouseleave',function(){
        clr(); var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    }
    document.querySelectorAll('nav a, a.nav-about').forEach(navHover);
    document.querySelectorAll('a.logo[data-inner]').forEach(function(logo){
      var inner=logo.dataset.inner;
      var timers=[], state=0;
      function clr(){ timers.forEach(clearTimeout); timers.length=0; }
      function render(n){ logo.textContent='[a'+inner.slice(0,n)+']'; }
      logo.addEventListener('mouseenter',function(){
        clr(); var from=state;
        for(var i=from;i<inner.length;i++)(function(i){
          timers.push(setTimeout(function(){render(state=i+1);},(i-from)*DELAY));
        })(i);
      });
      logo.addEventListener('mouseleave',function(){
        clr(); var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    });
  })();
  </script>
