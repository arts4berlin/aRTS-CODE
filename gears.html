<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[aRTS]</title>
  <!-- No sessionStorage gate – robot path (dead end for bots) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ── Particle canvas — behind everything ── */
    #orb-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── I frame wrapper — true viewport centre on all devices ── */
    .i-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      cursor: default;
      z-index: 1;
    }

    /* ── The big orange serif I ── */
    .big-i {
      display: block;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(7rem, 30vh, 18rem);
      color: #FF5C00;
      line-height: 1;
      user-select: none;
      pointer-events: none;
      /* Spring bounce in, then fade-glow forever */
      animation:
        iBounce 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
        iPulse  4s ease-in-out 0.9s infinite;
    }

    /* ── Bounce-in entrance (runs once on load) ── */
    @keyframes iBounce {
      0%   { transform: scale(0);    opacity: 0; }
      100% { transform: scale(1);    opacity: 1; }
    }

    /* ── Continuous glow pulse (starts after bounce) ── */
    @keyframes iPulse {
      0%, 100% {
        text-shadow:
          0 0 18px rgba(255,92,0,0.25),
          0 0 45px rgba(255,92,0,0.08);
      }
      50% {
        text-shadow:
          0 0 40px rgba(255,92,0,0.65),
          0 0 90px rgba(255,92,0,0.22),
          0 0 160px rgba(255,92,0,0.07);
      }
    }

    /* ── 5-slot strip centred on the I ── */
    .strip {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
    }

    /* ── All slots: width in em (relative to own font-size) keeps symmetry at any viewport ── */
    .s {
      flex-shrink: 0;
      width: 1.5em;
      text-align: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 400;
      user-select: none;
      pointer-events: none;
    }

    /* far (±2) */
    .s-far  { font-size: clamp(0.7rem,  2.4vh, 1.7rem); color: rgba(255,255,255,0.14); }
    /* near (±1) */
    .s-near { font-size: clamp(1.1rem,  5vh,   3rem);   color: rgba(255,255,255,0.34); }
    /* center (0) — inside the I */
    .s-ctr  { font-size: clamp(2.2rem,  9vh,   6rem);   color: #fff; font-weight: 700; }

  </style>
</head>
<body>

  <!-- Orbital particle canvas -->
  <canvas id="orb-bg"></canvas>

  <!-- I frame + scrolling strip -->
  <div class="i-wrap">
    <span class="big-i">I</span>
    <div class="strip">
      <span class="s s-far"  id="s-2"></span>
      <span class="s s-near" id="s-1"></span>
      <span class="s s-ctr"  id="s0"></span>
      <span class="s s-near" id="s1"></span>
      <span class="s s-far"  id="s2"></span>
    </div>
  </div>

  <script>
    /* Words as plain lowercase — JS capitalises only the center letter */
    /* Route map: word → destination page */
    const routes = {
      'work': 'work.html',
    };

    const words = [
      'work',
      'applying',
      'buzzing',
      'buying',
      'doping',
      'trotting',
      'bubbling',
      'coping',
      'siezing',
      'mokka',
      'zoning',
      'propping',
      'calling',
      'questioning',
      'viewing',
      'tripping',
      'buffering',
      'crunching',
    ];

    const slots = [-2, -1, 0, 1, 2].map(d => document.getElementById('s' + d));

    /* Padding: spaces before/after so the word scrolls fully in and out */
    const PAD = 3;

    /* ms per scroll step */
    const STEP_MS  = 240;
    /* extra pause between words (ms) */
    const PAUSE_MS = 650;

    let wordIdx = 0;
    let pos     = 0;

    const iWrap = document.querySelector('.i-wrap');

    function updateCursor() {
      iWrap.style.cursor = routes[words[wordIdx]] ? 'pointer' : 'default';
    }

    function getChar(padded, i, isCenter) {
      if (i < 0 || i >= padded.length) return '';
      const ch = padded[i];
      if (ch === ' ') return '';
      return isCenter ? ch.toUpperCase() : ch;
    }

    function step() {
      const word   = words[wordIdx];
      const padded = ' '.repeat(PAD) + word + ' '.repeat(PAD);

      slots.forEach((el, idx) => {
        const offset   = idx - 2;
        el.textContent = getChar(padded, pos + offset, offset === 0);
      });

      pos++;

      if (pos >= padded.length) {
        pos     = 0;
        wordIdx = (wordIdx + 1) % words.length;
        updateCursor();
        setTimeout(step, PAUSE_MS + Math.random() * 300);
      } else {
        setTimeout(step, STEP_MS);
      }
    }

    /* Click-to-navigate: if current word has a route, go there */
    iWrap.addEventListener('click', () => {
      const dest = routes[words[wordIdx]];
      if (dest) {
        sessionStorage.setItem('captcha_passed', '1');
        window.location.href = dest;
      }
    });

    /* Start after bounce completes (~900ms) */
    updateCursor();
    setTimeout(step, 1000);

    /* ── Orbital particle system ─────────────────────────────────────
       Particles orbit the centre (where the I lives) in elliptical
       paths at varying radii, speeds and sizes — leaving comet trails.
    ──────────────────────────────────────────────────────────────── */
    (function () {
      const canvas = document.getElementById('orb-bg');
      const ctx    = canvas.getContext('2d');

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      /* Build particles — mix of tight inner orbit and wide outer orbit */
      const PARTICLES = Array.from({ length: 18 }, (_, i) => ({
        rFactor : 0.08 + Math.random() * 0.26,   // orbit radius as fraction of min(W,H)
        angle   : (Math.PI * 2 / 18) * i + Math.random() * 0.8,
        speed   : (0.12 + Math.random() * 0.22) * (Math.random() < 0.5 ? 1 : -1),
        size    : 1.2 + Math.random() * 2.2,
        opacity : 0.20 + Math.random() * 0.50,
        tilt    : 0.55 + Math.random() * 0.45,   // vertical squish → ellipse
      }));

      let lastTs = null;

      function frame(ts) {
        if (!lastTs) lastTs = ts;
        const dt = Math.min((ts - lastTs) / 1000, 0.05);
        lastTs = ts;

        const W  = canvas.width;
        const H  = canvas.height;
        const cx = W / 2;
        const cy = H / 2;
        const R  = Math.min(W, H);

        /* Trail: semi-transparent black fade instead of full clear */
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        ctx.fillRect(0, 0, W, H);

        PARTICLES.forEach(p => {
          p.angle += p.speed * dt;

          const r = R * p.rFactor;
          const x = cx + r * Math.cos(p.angle);
          const y = cy + r * Math.sin(p.angle) * p.tilt;

          /* Outer glow */
          const grd = ctx.createRadialGradient(x, y, 0, x, y, p.size * 4);
          grd.addColorStop(0, `rgba(255,92,0,${p.opacity * 0.8})`);
          grd.addColorStop(1, 'rgba(255,92,0,0)');
          ctx.beginPath();
          ctx.arc(x, y, p.size * 4, 0, Math.PI * 2);
          ctx.fillStyle = grd;
          ctx.fill();

          /* Solid core */
          ctx.beginPath();
          ctx.arc(x, y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,92,0,${p.opacity})`;
          ctx.fill();
        });

        requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
    })();
  </script>

</body>
</html>
