<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="icon" href="assets/favicon-64.png" sizes="64x64" type="image/png">
  <link rel="icon" href="assets/favicon.png" sizes="32x32" type="image/png">

  <link rel="apple-touch-icon" href="assets/favicon-180.png">
  <meta property="og:type"         content="website">
  <meta property="og:url"          content="https://4-arts.com/">
  <meta property="og:title"        content="[aRTS]">
  <meta property="og:description"  content="TRaDE + CONNeCT — now in BERLIN">
  <meta property="og:image"        content="https://4-arts.com/assets/og.png">
  <meta name="twitter:card"        content="summary">
  <meta name="twitter:title"       content="[aRTS]">
  <meta name="twitter:description" content="TRaDE + CONNeCT — now in BERLIN">
  <meta name="twitter:image"       content="https://4-arts.com/assets/og.png">
  <title>[aRTS]</title>
  <!-- Clears captcha on entry — tail end: must reopen to restart -->
  <script> sessionStorage.removeItem('captcha_passed'); </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ── I frame wrapper ── */
    .i-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      cursor: default;
      z-index: 1;
    }

    /* ── The big orange serif I ── */
    .big-i {
      display: block;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(7rem, 30vh, 18rem);
      color: #FF5C00;
      line-height: 1;
      user-select: none;
      pointer-events: none;
      animation: iBounce 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes iBounce {
      0%   { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ── 5-slot strip centred on the I ── */
    .strip {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      opacity: 0;
      transition: opacity 0.65s ease;
    }

    .s {
      flex-shrink: 0;
      width: 1.5em;
      text-align: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 400;
      user-select: none;
      pointer-events: none;
      transition: opacity 0.11s ease;
    }

    .s-far  { font-size: clamp(0.7rem,  2.4vh, 1.7rem); color: rgba(255,255,255,0.14); }
    .s-near { font-size: clamp(1.1rem,  5vh,   3rem);   color: rgba(255,255,255,0.34); }
    .s-ctr  { font-size: clamp(2.2rem,  9vh,   6rem);   color: #fff; font-weight: 700; }
  
    /* ── dvh fix: excludes iOS Safari address bar ── */
    @supports (height: 100dvh) {
      body { height: 100dvh; }
    }
    /* ── Mobile: safe area + text-size ── */
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    .logo, .nav-about, header { touch-action: manipulation; }
    .btn, button, a { touch-action: manipulation; }
  </style>
</head>
<body>

  <div class="i-wrap">
    <span class="big-i">I</span>
    <div class="strip">
      <span class="s s-far"  id="s-2"></span>
      <span class="s s-near" id="s-1"></span>
      <span class="s s-ctr"  id="s0"></span>
      <span class="s s-near" id="s1"></span>
      <span class="s s-far"  id="s2"></span>
    </div>
  </div>

  <script>
    const routes = {
      'work':       'work.html',
      'aiding':     'aid.html',
      'connecting': 'connect.html',
      'creating':   'art.html',
    };

    const words = [
      'work',
      'sensing', 'shifting', 'building', 'holding', 'moving',
      'speaking', 'drawing', 'acting', 'aiding', 'signaling',
      'creating', 'connecting', 'revealing', 'assembling',
      'bearing', 'channeling', 'collecting',
    ];

    /* Fisher-Yates shuffle */
    (function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
    })(words);

    /* ── Build flat character stream ── */
    const PAD = 5, GAP = 6;
    const streamChars  = [];   // actual character
    const streamWordOf = [];   // word index at this position (-1 = space)

    words.forEach((word, wi) => {
      for (let i = 0; i < PAD; i++) { streamChars.push(' '); streamWordOf.push(-1); }
      for (const ch of word)        { streamChars.push(ch);  streamWordOf.push(wi); }
      for (let i = 0; i < GAP; i++) { streamChars.push(' '); streamWordOf.push(-1); }
    });
    const SLEN = streamChars.length;

    /* ── Slots & state ── */
    const slots    = [-2, -1, 0, 1, 2].map(d => document.getElementById('s' + d));
    const shown    = ['', '', '', '', ''];  // last text shown per slot
    const fading   = [false, false, false, false, false];
    const iWrap    = document.querySelector('.i-wrap');
    const strip    = document.querySelector('.strip');

    /* scroll speed in chars / second */
    const SPEED = 1.7;
    let scrollPos = 0;
    let lastTs    = null;
    let running   = false;

    function charAt(idx) {
      return streamChars[(idx % SLEN + SLEN) % SLEN];
    }
    function wordAt(idx) {
      return streamWordOf[(idx % SLEN + SLEN) % SLEN];
    }

    function frame(ts) {
      if (!running) return;
      if (lastTs === null) lastTs = ts;
      const dt = Math.min(ts - lastTs, 50);
      lastTs = ts;

      scrollPos = (scrollPos + SPEED * dt / 1000) % SLEN;
      const ipos = Math.floor(scrollPos);

      /* Update each slot */
      slots.forEach((el, si) => {
        const offset = si - 2;
        const ch     = charAt(ipos + offset);
        const isCenter = offset === 0;
        const next   = (ch === ' ') ? '' : (isCenter ? ch.toUpperCase() : ch);

        if (next !== shown[si] && !fading[si]) {
          fading[si] = true;
          el.style.opacity = '0';
          /* Swap text mid-fade, then restore opacity */
          setTimeout(() => {
            el.textContent = next;
            shown[si] = next;
            el.style.opacity = '';
            fading[si] = false;
          }, 90);
        }
      });

      /* Cursor + centre highlight when a routable word is at centre */
      const wi = wordAt(ipos);
      const currentWord = wi >= 0 ? words[wi] : null;
      const isRoutable = !!(currentWord && routes[currentWord]);
      iWrap.style.cursor = isRoutable ? 'pointer' : 'default';
      slots[2].style.color = isRoutable ? '#FF5C00' : '';

      requestAnimationFrame(frame);
    }

    /* Click: navigate if routable word is centred */
    iWrap.addEventListener('click', () => {
      const ipos = Math.floor(scrollPos);
      const wi   = wordAt(ipos);
      const word = wi >= 0 ? words[wi] : null;
      const dest = word && routes[word];
      if (dest) {
        running = false;
        /* Flash centre three green */
        [slots[1], slots[2], slots[3]].forEach(el => {
          el.style.transition = 'color 0.15s ease';
          el.style.color = '#00e676';
        });
        sessionStorage.setItem('captcha_passed', '1');
        setTimeout(() => { window.location.href = dest; }, 480);
      }
    });

    /* Start after I bounce lands */
    setTimeout(() => {
      strip.style.opacity = '1';
      running = true;
      requestAnimationFrame(frame);
    }, 820);
  </script>

</body>
</html>
