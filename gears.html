<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[aRTS]</title>
  <!-- No sessionStorage gate – robot path (dead end for bots) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ── I frame wrapper — true viewport centre on all devices ── */
    .i-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      cursor: default;
      z-index: 1;
    }

    /* ── The big orange serif I ── */
    .big-i {
      display: block;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(7rem, 30vh, 18rem);
      color: #FF5C00;
      line-height: 1;
      user-select: none;
      pointer-events: none;
      /* Spring bounce in — one shot */
      animation: iBounce 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes iBounce {
      0%   { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ── 5-slot strip centred on the I ── */
    .strip {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      opacity: 0;
      transition: opacity 0.65s ease;
    }

    /* ── All slots: width in em (relative to own font-size) keeps symmetry at any viewport ── */
    .s {
      flex-shrink: 0;
      width: 1.5em;
      text-align: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 400;
      user-select: none;
      pointer-events: none;
    }

    /* far (±2) */
    .s-far  { font-size: clamp(0.7rem,  2.4vh, 1.7rem); color: rgba(255,255,255,0.14); }
    /* near (±1) */
    .s-near { font-size: clamp(1.1rem,  5vh,   3rem);   color: rgba(255,255,255,0.34); }
    /* center (0) — inside the I */
    .s-ctr  { font-size: clamp(2.2rem,  9vh,   6rem);   color: #fff; font-weight: 700; }

  </style>
</head>
<body>

  <!-- I frame + scrolling strip -->
  <div class="i-wrap">
    <span class="big-i">I</span>
    <div class="strip">
      <span class="s s-far"  id="s-2"></span>
      <span class="s s-near" id="s-1"></span>
      <span class="s s-ctr"  id="s0"></span>
      <span class="s s-near" id="s1"></span>
      <span class="s s-far"  id="s2"></span>
    </div>
  </div>

  <script>
    /* Words as plain lowercase — JS capitalises only the center letter */
    /* Route map: word → destination page */
    const routes = {
      'work': 'work.html',
    };

    const words = [
      'work',
      'applying',
      'buzzing',
      'buying',
      'doping',
      'trotting',
      'bubbling',
      'coping',
      'siezing',
      'mokka',
      'zoning',
      'propping',
      'calling',
      'questioning',
      'viewing',
      'tripping',
      'buffering',
      'crunching',
    ];

    /* Shuffle words so every visit is unique */
    (function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
    })(words);

    const slots = [-2, -1, 0, 1, 2].map(d => document.getElementById('s' + d));

    /* Padding: spaces before/after so the word scrolls fully in and out */
    const PAD = 3;

    /* ms per scroll step */
    const STEP_MS  = 240;
    /* extra pause between words (ms) */
    const PAUSE_MS = 650;

    let wordIdx = 0;
    let pos     = 0;

    const iWrap = document.querySelector('.i-wrap');

    function updateCursor() {
      iWrap.style.cursor = routes[words[wordIdx]] ? 'pointer' : 'default';
    }

    function getChar(padded, i, isCenter) {
      if (i < 0 || i >= padded.length) return '';
      const ch = padded[i];
      if (ch === ' ') return '';
      return isCenter ? ch.toUpperCase() : ch;
    }

    function step() {
      const word   = words[wordIdx];
      const padded = ' '.repeat(PAD) + word + ' '.repeat(PAD);

      slots.forEach((el, idx) => {
        const offset   = idx - 2;
        el.textContent = getChar(padded, pos + offset, offset === 0);
      });

      pos++;

      if (pos >= padded.length) {
        pos     = 0;
        wordIdx = (wordIdx + 1) % words.length;
        updateCursor();
        setTimeout(step, PAUSE_MS + Math.random() * 300);
      } else {
        setTimeout(step, STEP_MS);
      }
    }

    /* Click-to-navigate: if current word has a route, flash green then go */
    iWrap.addEventListener('click', () => {
      const dest = routes[words[wordIdx]];
      if (dest) {
        /* Flash the three center slots green */
        [slots[1], slots[2], slots[3]].forEach(el => {
          el.style.transition = 'color 0.15s ease';
          el.style.color = '#00e676';
        });
        sessionStorage.setItem('captcha_passed', '1');
        setTimeout(() => { window.location.href = dest; }, 480);
      }
    });

    /* Strip fades in as bounce lands — I and text arrive together */
    const strip = document.querySelector('.strip');
    updateCursor();
    setTimeout(() => {
      strip.style.opacity = '1';
      step();
    }, 820);
  </script>

</body>
</html>
