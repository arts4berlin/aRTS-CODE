<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="icon" href="assets/favicon-64.png" sizes="64x64" type="image/png">
  <link rel="icon" href="assets/favicon.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="assets/favicon-180.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://4-arts.com/">
  <meta property="og:title" content="[aRTS]">
  <meta property="og:description" content="TRaDE + CONNeCT — now in BERLIN">
  <meta property="og:image" content="https://4-arts.com/assets/og.png">
  <title>[aRTS] — vERIFY</title>
  <script>
    document.documentElement.style.background = '#000';
    if (localStorage.getItem('captcha_passed')) {
      window.location.replace('home.html');
    }
  </script>
  <link rel="preload" as="image" href="assets/bear.png">
  <link rel="prefetch" href="home.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000; color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh; min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
    }

    #crt-scan {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,14,0,0.50) 3px,rgba(0,14,0,0.50) 4px);
      opacity: 0; z-index: 9998; pointer-events: none;
    }
    #crt-vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,0.88) 100%);
      opacity: 0; z-index: 9997; pointer-events: none;
    }

    /* ── Back button ── */
    .c-back {
      position: fixed; top: 22px; left: 28px;
      background: none; border: none;
      color: rgba(255,255,255,0.38);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.78rem; font-weight: 300;
      letter-spacing: 0.14em; cursor: pointer;
      transition: color 0.15s; z-index: 10;
      padding: 4px 0;
    }
    .c-back:hover { color: #fff; }

    /* ── Card ── */
    .c-card {
      border: 2px solid #fff;
      border-radius: 6px;
      background: #000;
      padding: clamp(1.4rem, 4vw, 2rem) clamp(1.4rem, 4vw, 2rem) clamp(1.2rem, 3vw, 1.6rem);
      width: min(360px, 92vw);
      position: relative;
    }

    .c-eyebrow {
      font-size: 0.63rem; font-weight: 300;
      letter-spacing: 0.24em; opacity: 0.6;
    }
    .c-rule {
      border: none; border-top: 1px solid rgba(255,255,255,0.16);
      margin: 0.65rem 0 0.9rem;
    }
    .c-instruction {
      font-size: 0.88rem; font-weight: 400;
      letter-spacing: 0.06em; margin-bottom: 0.85rem;
    }

    /* ── Grid ── */
    .c-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
    }
    .c-cell {
      aspect-ratio: 1;
      border: 1px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      user-select: none; overflow: hidden;
    }
    .c-cell:hover { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.04); }
    .c-cell.selected { border: 2px solid #fff; background: rgba(255,255,255,0.08); }
    .c-cell.wrong { border-color: rgba(255,50,50,0.7); animation: cShake 0.38s ease; }
    .c-cell img  { width: 62%; height: 62%; object-fit: contain; pointer-events: none; display: block; }
    .c-cell svg  { width: 44%; height: 44%; display: block; pointer-events: none; }

    @keyframes cShake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-6px); }
      60%     { transform: translateX(6px); }
      80%     { transform: translateX(-3px); }
    }

    /* ── Footer ── */
    .c-footer { display: flex; align-items: center; gap: 1rem; margin-top: 0.85rem; }
    .c-pow { flex: 1; }
    .c-pow-track { height: 2px; background: rgba(255,255,255,0.1); overflow: hidden; }
    .c-pow-fill  { height: 100%; background: #fff; width: 0%; transition: width 0.2s ease; }
    .c-pow-label { display: block; font-size: 0.59rem; letter-spacing: 0.12em; font-weight: 300; opacity: 0.4; margin-top: 4px; }
    .c-msg       { font-size: 0.78rem; letter-spacing: 0.14em; font-weight: 600; text-align: center; min-height: 1.4em; margin-top: 0.6rem; }
    .c-msg.ok    { color: #00e676; }
    .c-msg.err   { color: rgba(255,70,70,0.9); }

    /* honeypot */
    #hp { position: absolute; width:0; height:0; opacity:0; pointer-events:none; }

    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; background: #000; }
    * { -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }
    html { touch-action: manipulation; }
    button, a { touch-action: manipulation; }
  </style>
</head>
<body>
  <div id="crt-scan"></div>
  <div id="crt-vignette"></div>

  <button class="c-back" id="c-back">← bACK</button>

  <div class="c-card">
    <input id="hp" name="_gotcha" tabindex="-1" autocomplete="off" aria-hidden="true">
    <p class="c-eyebrow">vERIFY HUMaNITY</p>
    <hr class="c-rule">
    <p class="c-instruction">click aLL [aRTS] bears</p>
    <div class="c-grid" id="c-grid" role="group" aria-label="Select all bears"></div>
    <div class="c-footer">
      <div class="c-pow">
        <div class="c-pow-track"><div class="c-pow-fill" id="c-pow-fill"></div></div>
        <span class="c-pow-label" id="c-pow-label">computing...</span>
      </div>
    </div>
    <div class="c-msg" id="c-msg"></div>
  </div>

  <script>
  (function(){
    'use strict';

    var SYMBOLS = [
      '<svg viewBox="0 0 40 40"><polygon points="20,4 37,35 3,35" fill="#fff"/></svg>',
      '<svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="15" fill="#fff"/></svg>',
      '<svg viewBox="0 0 40 40"><text x="20" y="32" text-anchor="middle" font-size="30" fill="#fff" font-family="Arial,sans-serif" font-weight="700">A</text></svg>',
      '<svg viewBox="0 0 40 40"><polygon points="20,2 24,14 38,14 27,22 31,34 20,26 9,34 13,22 2,14 16,14" fill="#fff"/></svg>',
      '<svg viewBox="0 0 40 40"><polygon points="20,3 37,20 20,37 3,20" fill="#fff"/></svg>',
      '<svg viewBox="0 0 40 40"><rect x="16" y="4" width="8" height="32" fill="#fff"/><rect x="4" y="16" width="32" height="8" fill="#fff"/></svg>',
    ];

    var N_BEARS=3, N_CELLS=9;
    var bearSet=new Set(), selected=new Set();
    var openTs=Date.now(), powDone=false, powRan=false;
    var token=Math.random().toString(36).slice(2)+Date.now().toString(36);

    async function runPoW(){
      if(!window.crypto||!window.crypto.subtle||typeof TextEncoder==='undefined'){
        powDone=true; setPowUI(100,'verified ✓'); tryVerify(); return;
      }
      try{
        var enc=new TextEncoder(), BATCH=128, n=0;
        while(!powDone){
          var jobs=Array.from({length:BATCH},(_,i)=>crypto.subtle.digest('SHA-256',enc.encode(token+':'+(n+i))));
          var results=await Promise.all(jobs);
          for(var i=0;i<results.length;i++){
            var b=new Uint8Array(results[i]);
            if(b[0]===0&&b[1]<8){powDone=true;setPowUI(100,'verified ✓');tryVerify();return;}
          }
          n+=BATCH;
          setPowUI(Math.min(95,(n/8192)*100),'computing...');
          await new Promise(r=>setTimeout(r,0));
        }
      }catch(e){powDone=true;setPowUI(100,'verified ✓');tryVerify();}
    }

    function setPowUI(pct,label){
      document.getElementById('c-pow-fill').style.width=pct+'%';
      document.getElementById('c-pow-label').textContent=label;
    }

    function shuffle(a){
      for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
      return a;
    }

    function buildGrid(){
      bearSet.clear(); selected.clear();
      var positions=shuffle([...Array(N_CELLS).keys()]);
      positions.slice(0,N_BEARS).forEach(function(p){bearSet.add(p);});
      var syms=shuffle([...SYMBOLS]); var si=0;
      var grid=document.getElementById('c-grid'); grid.innerHTML='';
      for(var i=0;i<N_CELLS;i++){
        var cell=document.createElement('div');
        cell.className='c-cell'; cell.dataset.i=i;
        if(bearSet.has(i)){var img=document.createElement('img');img.src='assets/bear.png';img.alt='';img.draggable=false;cell.appendChild(img);}
        else{cell.innerHTML=syms[si++%syms.length];}
        cell.addEventListener('click',(function(idx){return function(){onCell(idx);};})(i));
        grid.appendChild(cell);
      }
      syncTally(); setMsg('','');
    }

    function onCell(idx){
      if(document.getElementById('hp').value)return;
      var cell=document.querySelector('.c-cell[data-i="'+idx+'"]');
      if(bearSet.has(idx)){
        if(selected.has(idx))return;
        selected.add(idx); cell.classList.add('selected'); syncTally();
        if(selected.size===N_BEARS)tryVerify();
      }else{
        cell.classList.add('wrong');
        setTimeout(function(){cell.classList.remove('wrong');},450);
        selected.forEach(function(i){document.querySelector('.c-cell[data-i="'+i+'"]').classList.remove('selected');});
        selected.clear(); syncTally();
        setMsg('wRONG — try again','err');
        setTimeout(function(){setMsg('','');},1500);
      }
    }

    function syncTally(){}
    function setMsg(txt,cls){var el=document.getElementById('c-msg');el.textContent=txt;el.className='c-msg'+(cls?' '+cls:'');}

    function runCRTCollapse(onDone){
      var root=document.documentElement;
      var scan=document.createElement('div');
      scan.style.cssText='position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,14,0,0.50) 3px,rgba(0,14,0,0.50) 4px);';
      var vig=document.createElement('div');
      vig.style.cssText='position:fixed;inset:0;z-index:9997;pointer-events:none;opacity:0;background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,0.88) 100%);';
      document.body.appendChild(scan); document.body.appendChild(vig);
      var T_RAMP=80,T_SQUEEZE=400,T_HOLD=480;
      function lerp(a,b,t){return a+(b-a)*t;}
      function easeOut(t){return 1-Math.pow(1-t,3);}
      function smooth(t){return t*t*(3-2*t);}
      var startTs=null,done=false;
      function tick(ts){
        if(!startTs)startTs=ts; var e=ts-startTs;
        if(e<T_RAMP){scan.style.opacity=String(lerp(0,1,e/T_RAMP));vig.style.opacity=String(lerp(0,0.85,e/T_RAMP));}
        else if(e<T_SQUEEZE){var t=(e-T_RAMP)/(T_SQUEEZE-T_RAMP),et=easeOut(t),pct=lerp(0,50,et);root.style.clipPath='inset('+pct.toFixed(2)+'% 0 '+pct.toFixed(2)+'% 0)';scan.style.opacity='1';vig.style.opacity=String(lerp(0.85,0.97,t));}
        else if(e<T_HOLD){root.style.clipPath='inset(50% 0 50% 0)';scan.style.opacity='1';vig.style.opacity='0.97';}
        else{if(!done){done=true;onDone();}return;}
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    function tryVerify(){
      if(selected.size<N_BEARS)return;
      if(document.getElementById('hp').value)return;
      if(Date.now()-openTs<800)return;
      if(!powDone){setMsg('completing verification...','');return;}
      setMsg('VeRIFIED ✓','ok');
      localStorage.setItem('captcha_passed','1');
      sessionStorage.setItem('crt_transition','1');
      setTimeout(function(){
        runCRTCollapse(function(){
          document.documentElement.style.background='#000';
          document.body.style.background='#000';
          window.location.href='home.html';
        });
      },300);
    }

    /* Back button — CRT exit to index.html */
    document.getElementById('c-back').addEventListener('click', function(){
      var busy=false;
      if(busy)return; busy=true;
      var scan2=document.createElement('div');
      scan2.style.cssText='position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,14,0,0.50) 3px,rgba(0,14,0,0.50) 4px);opacity:0;z-index:9998;pointer-events:none;';
      var vig2=document.createElement('div');
      vig2.style.cssText='position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,0.88) 100%);opacity:0;z-index:9997;pointer-events:none;';
      document.body.appendChild(scan2);document.body.appendChild(vig2);
      var TR=60,TS=320,s0=null;
      function lerp(a,b,t){return a+(b-a)*t;}
      function smooth(t){var c=Math.min(1,Math.max(0,t));return c*c*(3-2*c);}
      function run(ts){
        if(!s0)s0=ts;var e=ts-s0;
        if(e<TR){scan2.style.opacity=String(lerp(0,1,e/TR));vig2.style.opacity=String(lerp(0,0.95,e/TR));}
        else if(e<TR+TS){var t=(e-TR)/TS,p=lerp(0,50,smooth(t));document.documentElement.style.clipPath='inset('+p.toFixed(2)+'% 0 '+p.toFixed(2)+'% 0)';scan2.style.opacity='1';vig2.style.opacity='0.95';}
        else{document.documentElement.style.clipPath='inset(50% 0 50% 0)';document.documentElement.style.background='#000';document.body.style.background='#000';sessionStorage.setItem('crt_transition','1');window.location.href='index.html';return;}
        requestAnimationFrame(run);
      }
      requestAnimationFrame(run);
    });

    buildGrid();
    runPoW();
  })();
  </script>

  <!-- CRT boot -->
  <script>
  (function(){
    var isIAB=/Instagram|FBAN|FBAV|Snapchat|Twitter|Line\/|WhatsApp/i.test(navigator.userAgent);
    if(isIAB)return;
    if(!sessionStorage.getItem('crt_transition'))return;
    sessionStorage.removeItem('crt_transition');
    var scan=document.getElementById('crt-scan');
    var vig=document.getElementById('crt-vignette');
    var topCover=document.createElement('div');
    topCover.style.cssText='position:fixed;left:0;right:0;top:0;height:50%;background:#000;z-index:9995;pointer-events:none;';
    var botCover=document.createElement('div');
    botCover.style.cssText='position:fixed;left:0;right:0;bottom:0;height:50%;background:#000;z-index:9995;pointer-events:none;';
    document.body.appendChild(topCover);document.body.appendChild(botCover);
    var T_FLICKER=130,T_EXPAND=780,T_FADE_END=1150,start=null;
    function lerp(a,b,t){return a+(b-a)*t;}
    function easeOut(t){return 1-Math.pow(1-t,3);}
    function smooth(t){return t*t*(3-2*t);}
    function tick(ts){
      if(!start)start=ts;var e=ts-start;
      if(e<T_FLICKER){scan.style.opacity=String(lerp(0,1,e/T_FLICKER));vig.style.opacity='0.95';}
      else if(e<T_EXPAND){var t=(e-T_FLICKER)/(T_EXPAND-T_FLICKER),et=easeOut(t),pct=lerp(50,0,et);topCover.style.height=pct.toFixed(2)+'%';botCover.style.height=pct.toFixed(2)+'%';scan.style.opacity='1.0';vig.style.opacity=String(lerp(0.95,0.55,et));}
      else if(e<T_FADE_END){var t2=(e-T_EXPAND)/(T_FADE_END-T_EXPAND),et2=smooth(t2);topCover.style.height='0%';botCover.style.height='0%';scan.style.opacity=String(lerp(1.0,0,et2));vig.style.opacity=String(lerp(0.55,0,et2));}
      else{topCover.remove();botCover.remove();scan.remove();vig.remove();return;}
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  })();
  </script>
</body>
</html>
