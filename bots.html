    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000; color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh; min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      padding: clamp(80px, 12vh, 120px) clamp(16px, 4vw, 32px);
    }

    .c-back {
      position: fixed; top: 22px; left: 28px;
      background: none; border: none;
      color: rgba(255,255,255,0.38);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.78rem; font-weight: 300;
      letter-spacing: 0.14em; cursor: pointer;
      transition: color 0.15s; z-index: 10;
      padding: 4px 0; text-decoration: none;
    }
    .c-back:hover { color: #fff; }

    .hub {
      width: min(640px, 100%);
      display: flex; flex-direction: column; gap: clamp(28px, 5vh, 48px);
    }

    .hub-header {}
    .hub-eyebrow {
      font-size: 0.6rem; font-weight: 300;
      letter-spacing: 0.32em; color: rgba(255,92,0,0.7);
      text-transform: uppercase; margin-bottom: 0.5rem;
    }
    .hub-title {
      font-size: clamp(1.8rem, 6vw, 3rem);
      font-weight: 700; letter-spacing: 0.06em; line-height: 1;
    }
    .hub-subtitle {
      font-size: 0.75rem; font-weight: 300;
      letter-spacing: 0.12em; color: rgba(255,255,255,0.28);
      margin-top: 0.6rem;
    }

    .hub-rule {
      border: none; border-top: 1px solid rgba(255,255,255,0.08);
    }

    .bot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr));
      gap: 1px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      overflow: hidden;
    }

    .bot-card {
      background: #000;
      padding: clamp(18px, 3vh, 28px) clamp(18px, 3vw, 24px);
      display: flex; flex-direction: column; gap: 10px;
      position: relative;
      transition: background 0.15s;
    }
    .bot-card.unlocked { cursor: pointer; }
    .bot-card.unlocked:hover { background: rgba(255,255,255,0.025); }
    .bot-card.locked { opacity: 0.45; cursor: default; }

    .bot-tier-badge {
      font-size: 0.42rem; font-weight: 600;
      letter-spacing: 0.2em; padding: 2px 7px;
      border-radius: 2px; text-transform: uppercase;
      align-self: flex-start;
    }

    .bot-status {
      font-size: 0.48rem; font-weight: 700;
      letter-spacing: 0.26em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 2px; align-self: flex-start;
    }
    .bot-status.soon {
      color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .bot-status.active {
      color: rgba(110,230,110,0.75);
      background: rgba(110,230,110,0.06);
      border: 1px solid rgba(110,230,110,0.18);
    }
    .bot-status.locked-st {
      color: rgba(255,80,80,0.5);
      background: rgba(255,80,80,0.04);
      border: 1px solid rgba(255,80,80,0.12);
    }

    .bot-name {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      font-weight: 700; letter-spacing: 0.12em;
      color: rgba(255,255,255,0.72);
    }

    .bot-desc {
      font-size: 0.72rem; font-weight: 300;
      letter-spacing: 0.06em; line-height: 1.75;
      color: rgba(255,255,255,0.28);
    }

    .bot-limit {
      font-size: 0.52rem; font-weight: 300;
      letter-spacing: 0.14em; color: rgba(255,255,255,0.2);
      margin-top: auto;
    }
    .bot-upgrade {
      display: inline-block; font-size: 0.52rem; font-weight: 700;
      letter-spacing: 0.18em; color: #FF5C00;
      text-decoration: none; margin-top: auto;

    /* ── Tier bar ── */
    .tier-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.08); border-radius: 4px;
    }

      letter-spacing: 0.14em; color: #FF5C00;
    }
    .tier-bar-change {

      letter-spacing: 0.14em; color: rgba(255,255,255,0.25);
      text-decoration: none; transition: color 0.15s;
    }
    .tier-bar-change:hover { color: rgba(255,255,255,0.5); }

    .bot-panel-header { display: flex; align-items: center; justify-content: space-between; }
    .bot-panel-name { font-size: clamp(1rem, 3vw, 1.4rem); font-weight: 700; letter-spacing: 0.1em; }

    .bot-panel-info {
      font-size: 0.58rem; font-weight: 300;
      letter-spacing: 0.12em; color: rgba(255,255,255,0.2);

    .bot-chat {

      display: flex; flex-direction: column; gap: 12px;

    .bot-msg {
      font-size: 0.72rem; font-weight: 300; letter-spacing: 0.06em;

      color: rgba(255,255,255,0.45);

    .bot-input {

      border: 1px solid rgba(255,255,255,0.12); border-right: none;

    .bot-send {
      font-family: 'Space Grotesk', sans-serif;

      padding: 0.7rem 1.2rem; background: #FF5C00; color: #000;
      border: 1px solid #FF5C00; border-radius: 0 4px 4px 0;
      cursor: pointer; transition: background 0.15s;
    }
    .bot-send:hover { background: #fff; border-color: #fff; }

    /* ── CURaTOR: custom bot builder ── */
    .custom-bot-section { margin-top: clamp(12px, 2vh, 20px); }
    .custom-bot-section .section-label {
      font-size: 0.58rem; font-weight: 300;
      letter-spacing: 0.28em; color: rgba(255,92,0,0.45);
      margin-bottom: clamp(8px, 1.2vh, 14px); text-transform: uppercase;

    .custom-bot-form { display: flex; flex-direction: column; gap: clamp(10px, 1.5vh, 16px); }

      background: transparent; border: none;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      color: #fff; font-family: 'Space Grotesk', sans-serif;

    .custom-bot-form input::placeholder, .custom-bot-form textarea::placeholder {

      align-self: flex-start; font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.16em;
      padding: 0.65rem 1.4rem; background: transparent; color: #FF5C00;

      cursor: pointer; transition: background 0.15s, border-color 0.15s;

  <!-- Bot operations logic -->
  <script>
  (function(){
    function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    /* ── Bot definitions ── */
    var BOTS = [
      { id:'market-scout',     name:'mARKET sCOUT',      desc:'Monitors public listings across primary and secondary art markets. Flags pricing anomalies and emerging valuations matching your profile.', tier:'aUDIENCE', limit:5 },
      { id:'provenance-check', name:'pROVENANCE cHECK',  desc:'Cross-references provenance records and exhibition histories against open databases. Surfaces discrepancies for review.',                   tier:'aLLY',     limit:20 },
      { id:'security-scan',    name:'sECURITY sCAN',     desc:'Inspects embedded asset metadata and code payloads for anomalies. Flags suspicious patterns in digital artworks.',                         tier:'aLLY',     limit:20 },
      { id:'trade-alert',      name:'tRADE aLERT',       desc:'Delivers structured intelligence on trade activity within your network. Configurable thresholds and delivery cadence.',                    tier:'BRIGaDIER',limit:100 },
      { id:'content-moderator',name:'cONTENT mODERaTOR', desc:'Integrated into the listing flow. Automatically scans text, images, pricing and provenance before publication. All tiers.',              tier:'aUDIENCE',limit:-1 }
    ];

    var TIER_ORDER = ['aUDIENCE','aLLY','BRIGaDIER','CURaTOR'];
    var TIER_COLORS = {
      'aUDIENCE':  { text:'rgba(255,255,255,0.5)',  border:'rgba(255,255,255,0.15)', bg:'rgba(255,255,255,0.03)' },
      'aLLY':      { text:'rgba(110,230,180,0.7)',   border:'rgba(110,230,180,0.2)',  bg:'rgba(110,230,180,0.04)' },
      'BRIGaDIER': { text:'rgba(255,180,60,0.75)',   border:'rgba(255,180,60,0.2)',   bg:'rgba(255,180,60,0.04)' },
      'CURaTOR':   { text:'rgba(255,92,0,0.8)',      border:'rgba(255,92,0,0.25)',    bg:'rgba(255,92,0,0.05)' }
    };

    function tierLevel(t){ var idx=TIER_ORDER.indexOf(t); return idx>=0?idx:-1; }
    function hasAccess(user,req){ return tierLevel(user)>=tierLevel(req); }

    /* ── User tier ── */
    var userTier = 'aUDIENCE';
    try { userTier = localStorage.getItem('arts_tier') || 'aUDIENCE'; } catch(e){}
    document.getElementById('tier-bar-value').textContent = userTier;

    /* ── Usage tracking (daily reset) ── */
    function todayKey(){ return 'arts_bot_usage_'+new Date().toISOString().split('T')[0]; }
    function getUsage(){ try{return JSON.parse(localStorage.getItem(todayKey())||'{}');}catch(e){return {};} }
    function recordUsage(botId){ var u=getUsage(); u[botId]=(u[botId]||0)+1; try{localStorage.setItem(todayKey(),JSON.stringify(u));}catch(e){} return u[botId]; }
    function getUsageCount(botId){ return getUsage()[botId]||0; }

    /* ── Custom bots (CURaTOR) ── */
    function getCustomBots(){ try{return JSON.parse(localStorage.getItem('arts_custom_bots')||'[]');}catch(e){return [];} }
    function saveCustomBots(b){ try{localStorage.setItem('arts_custom_bots',JSON.stringify(b));}catch(e){} }

    /* ── Render bot grid ── */
    var gridEl=document.getElementById('bot-grid');
    var panelEl=document.getElementById('bot-panel');

    function renderBotGrid(){
      gridEl.innerHTML='';
      var allBots=BOTS.slice();
      if(hasAccess(userTier,'CURaTOR')){
        getCustomBots().forEach(function(cb){
          allBots.push({ id:cb.id, name:cb.name, desc:cb.purpose||'cUSTOM bOT', tier:'CURaTOR', limit:-1, custom:true });
        });
      }

      allBots.forEach(function(bot){
        var accessible=hasAccess(userTier,bot.tier);
        var colors=TIER_COLORS[bot.tier]||TIER_COLORS['aUDIENCE'];
        var usage=getUsageCount(bot.id);
        var limitStr=bot.limit===-1?'uNLIMITED':usage+' / '+bot.limit+' tODAY';

        var card=document.createElement('div');
        card.className='bot-card '+(accessible?'unlocked':'locked');
        card.innerHTML=[
          '<span class="bot-tier-badge" style="color:'+colors.text+';background:'+colors.bg+';border:1px solid '+colors.border+'">'+esc(bot.tier)+'</span>',
          accessible?'<span class="bot-status active">aCTIVE</span>':'<span class="bot-status locked-st">lOCKED</span>',
          '<p class="bot-name">'+esc(bot.name)+'</p>',
          '<p class="bot-desc">'+esc(bot.desc)+'</p>',
          accessible?'<p class="bot-limit">'+limitStr+'</p>':'<a href="join.html" class="bot-upgrade">uPGRaDE →</a>'
        ].join('');

        if(accessible){
          card.addEventListener('click',function(e){
            if(e.target.closest('a'))return;
            openBotPanel(bot);
          });
        }
        gridEl.appendChild(card);
      });
    }

    /* ── Bot panel (chat interface) ── */
    var activeBot=null;

    function openBotPanel(bot){
      activeBot=bot;
      document.getElementById('bot-panel-name').textContent=bot.name;
      var usage=getUsageCount(bot.id);
      var limitStr=bot.limit===-1?'uNLIMITED qUERIES':usage+' / '+bot.limit+' qUERIES tODAY';
      document.getElementById('bot-panel-info').textContent=limitStr;
      document.getElementById('bot-chat').innerHTML='';
      document.getElementById('bot-input').value='';
      gridEl.style.display='none';
      document.getElementById('tier-bar').style.display='none';
      document.querySelector('.hub-rule').style.display='none';
      var cbs=document.getElementById('custom-bot-section');
      if(cbs&&!cbs.hidden) cbs.style.display='none';
      panelEl.classList.add('active');
      document.getElementById('bot-input').focus();
    }

    function closeBotPanel(){
      activeBot=null;
      panelEl.classList.remove('active');
      gridEl.style.display='';
      document.getElementById('tier-bar').style.display='';
      document.querySelector('.hub-rule').style.display='';
      var cbs=document.getElementById('custom-bot-section');
      if(cbs&&hasAccess(userTier,'CURaTOR')) cbs.style.display='';
    }

    document.getElementById('bot-panel-close').addEventListener('click',closeBotPanel);

    /* ── Send message (mock — Phase 2: connect to Claude API) ── */
    function sendMessage(){
      if(!activeBot) return;
      var input=document.getElementById('bot-input');
      var text=input.value.trim();
      if(!text) return;

      var usage=getUsageCount(activeBot.id);
      if(activeBot.limit!==-1 && usage>=activeBot.limit){
        appendMsg('bot','— dAILY lIMIT rEaCHED. uPGRaDE yOUR tIER fOR mORE qUERIES.');
        input.value=''; return;
      }

      appendMsg('user',text);
      input.value='';
      recordUsage(activeBot.id);

      var newUsage=getUsageCount(activeBot.id);
      var limitStr=activeBot.limit===-1?'uNLIMITED qUERIES':newUsage+' / '+activeBot.limit+' qUERIES tODAY';
      document.getElementById('bot-panel-info').textContent=limitStr;

      /* REQUIRES BACKEND — Phase 2: replace mock with actual API call to Claude */
      setTimeout(function(){
        var mocks={
          'market-scout':     '[ mOCK ] sCaNNING mARKET dATA... nO aNOMALIES dETECTED. pHASE 2 wILL cONNECT tO lIVE mARKET fEEDS.',
          'provenance-check': '[ mOCK ] cROSS-rEFERENCING pROVENANCE... nO dISCREPANCIES. pHASE 2 wILL qUERY oPEN dATABASES.',
          'security-scan':    '[ mOCK ] iNSPECTING mETADATA... nO sUSPICIOUS pATTERNS. pHASE 2 wILL sCAN aCTUAL fILES.',
          'trade-alert':      '[ mOCK ] mONITORING tRADE aCTIVITY... nO aLERTS. pHASE 2 wILL dELIVER rEAL-tIME nOTIFICATIONS.',
          'content-moderator':'tHIS bOT iS iNTEGRaTED dIRECTLY iNTO tHE lISTiNG fLOW. wHEN yOU sUBMIT a lISTiNG vIA aDD aRT, mODERaTION rUNS aUTOMATICALLY.'
        };
        appendMsg('bot', mocks[activeBot.id] || '[ mOCK ] cUSTOM bOT rESPONSE. pHASE 2 wILL cONNECT tO cLAUDE aPI.');
      }, 800+Math.random()*600);
    }

    function appendMsg(type,text){
      var chatEl=document.getElementById('bot-chat');
      var msg=document.createElement('div');
      msg.className='bot-msg '+type;
      msg.textContent=text;
      chatEl.appendChild(msg);
      chatEl.scrollTop=chatEl.scrollHeight;
    }

    document.getElementById('bot-send').addEventListener('click',sendMessage);
    document.getElementById('bot-input').addEventListener('keydown',function(e){
      if(e.key==='Enter') sendMessage();
    });

    /* ── CURaTOR custom bot builder ── */
    if(hasAccess(userTier,'CURaTOR')){
      document.getElementById('custom-bot-section').hidden=false;
    }
    document.getElementById('btn-create-bot').addEventListener('click',function(){
      var nameInput=document.getElementById('custom-bot-name');
      var purposeInput=document.getElementById('custom-bot-purpose');
      var name=nameInput.value.trim();
      var purpose=purposeInput.value.trim();
      if(!name){ nameInput.focus(); return; }
      var bots=getCustomBots();
      bots.push({ id:'custom_'+Date.now(), name:name, purpose:purpose||'cUSTOM bOT', createdAt:Date.now() });
      saveCustomBots(bots);
      nameInput.value=''; purposeInput.value='';
      renderBotGrid();
    });

    /* ── Initial render ── */
    renderBotGrid();
  })();
  </script>
