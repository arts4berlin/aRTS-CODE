<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[aRTS] — WoRK</title>
  <script>
    if (!sessionStorage.getItem('captcha_passed')) {
      window.location.replace('index.html');
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Column of pills ── */
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 1.8vh, 20px);
      width: clamp(260px, 52vw, 480px);
    }

    /* ── White pill inputs ── */
    .pill {
      width: 100%;
      background: #fff;
      border: none;
      border-radius: clamp(18px, 3.5vw, 30px);
      padding: clamp(14px, 2.4vh, 24px) clamp(18px, 2.8vw, 28px);
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.95rem, 2vw, 1.3rem);
      font-weight: 700;
      color: #000;
      outline: none;
      text-align: center;
    }

    .pill::placeholder {
      color: rgba(0,0,0,0.38);
      letter-spacing: 0.08em;
    }

    .pill:focus {
      box-shadow: 0 0 0 2.5px rgba(255,92,0,0.55);
    }

    /* ── Email row: pill + bear side by side ── */
    .email-row {
      display: flex;
      align-items: center;
      gap: clamp(10px, 1.6vw, 16px);
    }

    .email-row .pill { flex: 1; }

    /* ── Orange bear submit button ── */
    .bear-btn {
      flex-shrink: 0;
      background: #FF5C00;
      border: none;
      border-radius: clamp(18px, 3.5vw, 30px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1 / 1;
      width: clamp(58px, 11vw, 100px);
      padding: 0;
      transition: transform 0.18s, box-shadow 0.18s;
    }

    .bear-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 0 0 3px rgba(255,92,0,0.4);
    }

    .bear-btn img {
      width: 62%;
      height: auto;
      filter: brightness(0);
    }

    /* ── Sent confirmation ── */
    .sent-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(1rem, 3vw, 1.6rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
      z-index: 10;
    }
    .sent-msg.show { opacity: 1; }
  </style>
</head>
<body>

  <form class="contact-form" id="face-form" onsubmit="handleSend(event)">
    <input class="pill" type="text" placeholder="COMPaNY" autocomplete="organization">
    <div class="email-row">
      <input class="pill" type="email" placeholder="@E-MaIL" autocomplete="email">
      <button type="submit" class="bear-btn" aria-label="Send">
        <img src="assets/bear.png" alt="">
      </button>
    </div>
    <input class="pill" type="text" placeholder="INSTa" autocomplete="url">
  </form>

  <p class="sent-msg" id="sent-msg">SENT ✓</p>

  <script>
    function handleSend(e) {
      e.preventDefault();
      const msg = document.getElementById('sent-msg');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 2200);
    }
  </script>

</body>
</html>
