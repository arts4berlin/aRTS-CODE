  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 100;
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .heading {
      text-align: center;
      margin-bottom: clamp(1.4rem, 3vh, 2.2rem);
    }

    .small {
      font-size: 0.82rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      opacity: 0.65;
      display: block;
      margin-bottom: 0.28rem;
    }

    .large {
      font-size: clamp(1.8rem, 4.5vw, 3rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      display: block;
    }

    /* ── Form column ── */
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 1.8vh, 18px);
      width: clamp(280px, 55vw, 460px);
    }

    /* ── Box-style inputs — mirrors button aesthetic ── */
    .field { text-transform: uppercase; }
    .field {
      width: 100%;
      background: transparent;
      border: 2px solid #fff;
      border-radius: 4px;
      padding: clamp(0.75rem, 1.5vh, 1.05rem) clamp(1.2rem, 2vw, 1.8rem);
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1rem, 2vw, 1.1rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      color: #fff;
      outline: none;
      text-align: center;
      transition: border-color 0.15s;
    }
    .field::placeholder          { color: rgba(255,255,255,0.38); }
    .field:focus,
    .field.has-value             { border-color: #FF5C00; }

    .nav-about {
      position: fixed;
      top: 28px; right: 32px;
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    .nav-about:hover { opacity: 1; }

    /* ── Bottom row: E-MaIL + bear side by side ── */
    .send-row        { display: flex; gap: clamp(8px, 1.4vw, 14px); }
    .send-row .field { flex: 1; }

    /* ── Orange bear submit ── */
    .bear-btn {
      flex-shrink: 0;
      background: #FF5C00;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1 / 1;
      width: clamp(48px, 8.5vw, 72px);
      padding: 0;
      position: relative;
      overflow: hidden;
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .bear-btn:hover { transform: scale(1.06); }
    .bear-btn.sent  { transform: scale(1.12); }

    .bear-btn img {
      width: 60%;
      height: auto;
      filter: brightness(0);
      transition: opacity 0.18s, transform 0.18s;
    }
    .bear-btn.sent img { opacity: 0; transform: scale(0); }

    @keyframes checkBounce {
      0%   { opacity: 0; transform: scale(0);    }
      55%  { opacity: 1; transform: scale(1.35); }
      75%  { opacity: 1; transform: scale(0.88); }
      90%  { opacity: 1; transform: scale(1.10); }
      100% { opacity: 1; transform: scale(1);    }
    }
    .bear-check {
      position: absolute;
      color: #000;
      font-size: clamp(1.2rem, 2.6vw, 1.9rem);
      font-weight: 700;
      opacity: 0;
      transform: scale(0);
      pointer-events: none;
      line-height: 1;
    }
    .bear-btn.sent .bear-check {
      animation: checkBounce 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
  
    /* ── dvh fix: excludes iOS Safari address bar ── */
    @supports (height: 100dvh) {
      body { height: 100dvh; }
    }
    /* ── Mobile: safe area + text-size ── */
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    .logo, .nav-about, header { touch-action: manipulation; }
    .btn, button, a { touch-action: manipulation; }
  </style>
</head>
<body>
  <!-- CRT: prevent flash on arrival -->
  <script>(function(){if(!sessionStorage.getItem('crt_transition'))return;document.documentElement.style.clipPath='inset(50% 0 50% 0)';})()</script>

  <a href="connect.html" class="logo">[sEEK]</a>
  <a href="about.html" class="nav-about">aBOUT</a>

  <div class="heading">
    <span class="small">LET'S</span>
    <span class="large">WoRK.</span>
  </div>

  <form class="contact-form" id="work-form" onsubmit="handleSend(event)">
    <input class="field" type="text"  placeholder="" data-ph="COMPaNY" name="company"  autocomplete="organization">
    <input class="field" type="text"  placeholder="" data-ph="INSTa"   name="instagram" autocomplete="url">
    <div class="send-row">
      <input class="field" type="email" placeholder="" data-ph="E-MaIL" name="email"   autocomplete="email">
      <button type="submit" class="bear-btn" aria-label="Send">
        <img src="assets/bear.png" alt="">
        <span class="bear-check">✓</span>
      </button>
    </div>
  </form>

  <script>
    /* ── Placeholder scramble — left-to-right reveal, staggered ── */
    (function () {
      var POOL   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#%&!?';
      var FRAMES = 22, RATE = 44;

      function scramblePh(input, text, delay) {
        setTimeout(function () {
          var step = 0;
          var t = setInterval(function () {
            var out = '';
            for (var i = 0; i < text.length; i++) {
              out += (i < Math.floor(step * text.length / FRAMES))
                ? text[i]
                : POOL[Math.floor(Math.random() * POOL.length)];
            }
            input.placeholder = out;
            if (++step > FRAMES) { clearInterval(t); input.placeholder = text; }
          }, RATE);
        }, delay);
      }

      var fields = document.querySelectorAll('.field[data-ph]');
      fields.forEach(function (f, i) {
        scramblePh(f, f.dataset.ph, 280 + i * 220);
      });
    })();
  </script>
  <script>
    async function handleSend(e) {
      e.preventDefault();
      const btn  = document.querySelector('.bear-btn');
      const form = document.getElementById('work-form');
      const data = new FormData(form);

      btn.disabled = true;
      try {
        const res = await fetch('https://formspree.io/f/xreybnvq', {
          method:  'POST',
          body:    data,
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          btn.classList.add('sent');
          form.reset();
          document.querySelectorAll('.field').forEach(f => f.classList.remove('has-value'));
          setTimeout(() => { btn.classList.remove('sent'); btn.disabled = false; }, 2500);
        } else {
          btn.disabled = false;
        }
      } catch (_) {
        btn.disabled = false;
      }
    }

    /* Orange outline persists while field has a value */
    document.querySelectorAll('.field').forEach(function (f) {
      f.addEventListener('input', function () {
        this.classList.toggle('has-value', this.value.length > 0);
      });
    });

    /* Auto-uppercase typed text in name/subject fields */
    document.querySelectorAll('.field[type="text"]').forEach(function (f) {
      f.addEventListener('input', function () {
        var pos = f.selectionStart;
        f.value = f.value.toUpperCase();
        f.setSelectionRange(pos, pos);
      });
    });
  </script>
  <script>
    (function () {
      function reveal() {
        var c = document.createElement('div');
        c.style.cssText = 'position:fixed;inset:0;background:#000;z-index:99998;pointer-events:none;opacity:1;';
        document.body.appendChild(c);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            c.style.transition = 'opacity 0.22s ease';
            c.style.opacity    = '0';
            setTimeout(function () { if (c.parentNode) c.parentNode.removeChild(c); }, 320);
          });
        });
      }
      window.addEventListener('pageshow', function (e) { if (e.persisted) reveal(); });
    })();
  </script>

  <!-- CRT channel-change transition -->
  <script>
  (function(){
    var scan=null,vig=null,busy=false;
    function mkL(){
      if(scan)return;
      scan=document.createElement('div');
      scan.style.cssText='position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,14,0,0.50) 3px,rgba(0,14,0,0.50) 4px);opacity:0;z-index:99997;pointer-events:none;';
      vig=document.createElement('div');
      vig.style.cssText='position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,0.88) 100%);opacity:0;z-index:99996;pointer-events:none;';
      document.body.appendChild(scan);
      document.body.appendChild(vig);
    }
    function lerp(a,b,t){return a+(b-a)*t;}
    function easeOut3(t){return 1-Math.pow(1-Math.min(1,Math.max(0,t)),3);}
    function smooth(t){var c=Math.min(1,Math.max(0,t));return c*c*(3-2*c);}

    function doEnter(){
      mkL();
      var T1=130,T2=780,T3=1150,s0=null;
      function run(ts){
        if(!s0)s0=ts;
        var e=ts-s0;
        if(e<T1){
          scan.style.opacity=String(lerp(0,1,e/T1));
          vig.style.opacity='0.95';
        }else if(e<T2){
          var t=(e-T1)/(T2-T1),p=lerp(50,0,easeOut3(t));
          document.documentElement.style.clipPath='inset('+p.toFixed(2)+'% 0 '+p.toFixed(2)+'% 0)';
          scan.style.opacity='1';
          vig.style.opacity=String(lerp(0.95,0.55,easeOut3(t)));
        }else if(e<T3){
          var t2=(e-T2)/(T3-T2),et=smooth(t2);
          document.documentElement.style.clipPath='';
          scan.style.opacity=String(lerp(1,0,et));
          vig.style.opacity=String(lerp(0.55,0,et));
        }else{
          document.documentElement.style.clipPath='';
          if(scan&&scan.parentNode)scan.parentNode.removeChild(scan);
          if(vig&&vig.parentNode)vig.parentNode.removeChild(vig);
          scan=null;vig=null;busy=false;return;
        }
        requestAnimationFrame(run);
      }
      requestAnimationFrame(run);
    }

    function doExit(dest){
      if(busy)return;busy=true;
      mkL();
      var TR=60,TS=320,s0=null;
      function run(ts){
        if(!s0)s0=ts;
        var e=ts-s0;
        if(e<TR){
          scan.style.opacity=String(lerp(0,1,e/TR));
          vig.style.opacity=String(lerp(0,0.95,e/TR));
        }else if(e<TR+TS){
          var t=(e-TR)/TS,p=lerp(0,50,smooth(t));
          document.documentElement.style.clipPath='inset('+p.toFixed(2)+'% 0 '+p.toFixed(2)+'% 0)';
          scan.style.opacity='1';
          vig.style.opacity='0.95';
        }else{
          document.documentElement.style.clipPath='inset(50% 0 50% 0)';
          sessionStorage.setItem('crt_transition','1');
          window.location.href=dest;
          return;
        }
        requestAnimationFrame(run);
      }
      requestAnimationFrame(run);
    }

    /* Arrival */
    if(sessionStorage.getItem('crt_transition')){
      sessionStorage.removeItem('crt_transition');
      doEnter();
    }

    /* Exit interceptor */
    document.addEventListener('click',function(ev){
      var a=ev.target.closest('a[href]');
      if(!a)return;
      var h=a.getAttribute('href');
      if(!h||h.charAt(0)==='#'||/^(https?:|mailto:|tel:|\/\/)/.test(h))return;
      if(ev.metaKey||ev.ctrlKey||ev.shiftKey||ev.altKey)return;
      ev.preventDefault();
      doExit(h);
    },true);
  })();
  </script>

  <!-- Nav & logo hover -->
  <script>
  (function(){
    var DELAY = 40;

    /* Nav links — lowercase left→right on enter, recapitalise right→left on leave */
    function navHover(el){
      var orig = el.textContent;
      var timers=[], state=0;
      function clr(){ timers.forEach(clearTimeout); timers.length=0; }
      function render(n){
        var s=orig[0];
        for(var i=1;i<orig.length;i++) s+=(i<=n ? orig[i].toLowerCase() : orig[i]);
        el.textContent=s;
      }
      el.addEventListener('mouseenter',function(){
        clr();
        var from=state;
        for(var i=0;i<orig.length-1-from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from+i+1);},i*DELAY));
        })(i);
      });
      el.addEventListener('mouseleave',function(){
        clr();
        var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    }
    document.querySelectorAll('nav a, a.nav-about').forEach(navHover);

    /* Logo [aXXX] — collapse to [a] by default, expand on hover */
    document.querySelectorAll('a.logo').forEach(function(logo){
      var m=logo.textContent.match(/^\[a([^\]]+)\]$/);
      if(!m) return;
      var inner=m[1];
      logo.textContent='[a]';
      var timers=[], state=0;
      function clr(){ timers.forEach(clearTimeout); timers.length=0; }
      function render(n){ logo.textContent='[a'+inner.slice(0,n)+']'; }
      logo.addEventListener('mouseenter',function(){
        clr();
        var from=state;
        for(var i=from;i<inner.length;i++)(function(i){
          timers.push(setTimeout(function(){render(state=i+1);},(i-from)*DELAY));
        })(i);
      });
      logo.addEventListener('mouseleave',function(){
        clr();
        var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    });
  })();
  </script>
