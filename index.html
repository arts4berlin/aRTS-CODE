<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[aRTS]</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── CRT: content starts clipped via JS inline style ── */

    /* White flash overlay */
    #crt-flash {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      z-index: 9999;
      pointer-events: none;
    }

    /* Scanline overlay */
    #crt-scan {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(8,2,0,0.20) 3px, rgba(8,2,0,0.20) 4px
      );
      opacity: 0;
      z-index: 9998;
      pointer-events: none;
    }

    .logo {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 100;
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .captcha-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px 60px;
      position: relative;
      z-index: 2;
    }

    .bear {
      width: clamp(160px, 28vw, 280px);
      margin-bottom: 2.4rem;
      display: block;
    }

    .question {
      text-align: center;
      margin-bottom: 2rem;
    }

    .question .small {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      display: block;
      margin-bottom: 0.2rem;
    }

    .question .large {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      display: block;
    }

    .buttons { display: flex; align-items: stretch; }

    .btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      cursor: pointer;
      padding: 0.85rem 2.6rem;
      border: 2px solid #fff;
      transition: background 0.15s, color 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-yes  { background: #fff; color: #000; }
    .btn-yes:hover  { background: #ddd; border-color: #ddd; }
    .btn-captcha { background: transparent; color: #fff; }
    .btn-captcha:hover { background: #fff; color: #000; }

    /* ─── CAPTCHA OVERLAY ──────────────────────────────────────────── */

    /* honeypot – must stay invisible */
    #hp {
      position: absolute;
      width: 0; height: 0;
      opacity: 0; pointer-events: none;
    }

    .c-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 400;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .c-overlay.open { opacity: 1; pointer-events: all; }

    .c-modal {
      border: 2px solid #fff;
      background: #000;
      padding: 1.8rem 1.8rem 1.4rem;
      width: min(340px, 90vw);
      position: relative;
    }

    .c-close {
      position: absolute;
      top: 11px; right: 14px;
      background: none; border: none;
      color: #fff; font-family: inherit;
      font-size: 0.9rem; line-height: 1;
      cursor: pointer; opacity: 0.45;
      transition: opacity 0.15s;
    }
    .c-close:hover { opacity: 1; }

    .c-eyebrow {
      font-size: 0.63rem;
      font-weight: 300;
      letter-spacing: 0.24em;
      opacity: 0.6;
    }

    .c-rule {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.16);
      margin: 0.65rem 0 0.9rem;
    }

    .c-instruction {
      font-size: 0.88rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      margin-bottom: 0.85rem;
    }

    /* grid */
    .c-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
    }

    .c-cell {
      aspect-ratio: 1;
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      user-select: none;
      overflow: hidden;
    }
    .c-cell:hover {
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.04);
    }
    .c-cell.selected {
      border: 2px solid #fff;
      background: rgba(255,255,255,0.08);
    }
    .c-cell.wrong {
      border-color: rgba(255,50,50,0.7);
      animation: cShake 0.38s ease;
    }
    .c-cell img {
      width: 62%; height: 62%;
      object-fit: contain;
      pointer-events: none;
      display: block;
    }
    .c-cell svg {
      width: 44%; height: 44%;
      display: block;
      pointer-events: none;
    }

    @keyframes cShake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      60%      { transform: translateX(6px); }
      80%      { transform: translateX(-3px); }
    }

    /* footer */
    .c-footer {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 0.85rem;
    }
    .c-pow { flex: 1; }
    .c-pow-track {
      height: 2px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
    }
    .c-pow-fill {
      height: 100%;
      background: #fff;
      width: 0%;
      transition: width 0.2s ease;
    }
    .c-pow-label {
      display: block;
      font-size: 0.59rem;
      letter-spacing: 0.12em;
      font-weight: 300;
      opacity: 0.4;
      margin-top: 4px;
    }
    .c-tally {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      opacity: 0.5;
      white-space: nowrap;
    }
    .c-msg {
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      font-weight: 600;
      text-align: center;
      min-height: 1.4em;
      margin-top: 0.6rem;
    }
    .c-msg.ok  { color: #00e676; }
    .c-msg.err { color: rgba(255,70,70,0.9); }
  </style>
</head>
<body>

  <main class="captcha-wrap">
    <img src="assets/bear.png" alt="aRTS bear" class="bear">
    <div class="question">
      <span class="small">aRE YOU</span>
      <span class="large">a ROBOT ¿</span>
    </div>
    <div class="buttons">
      <button class="btn btn-yes" onclick="window.location.href='robot.html'">YES</button>
      <button class="btn btn-captcha">CaPTCHa</button>
    </div>
  </main>

  <!-- honeypot: bots fill this, humans don't -->
  <input type="text" id="hp" name="website" autocomplete="off" tabindex="-1" aria-hidden="true">

  <!-- CAPTCHA OVERLAY -->
  <div id="c-overlay" class="c-overlay" role="dialog" aria-modal="true" aria-labelledby="c-eyebrow">
    <div class="c-modal">
      <button class="c-close" id="c-close" aria-label="Close">✕</button>
      <p class="c-eyebrow" id="c-eyebrow">vERIFY HUMaNITY</p>
      <hr class="c-rule">
      <p class="c-instruction">click aLL [aRTS] bears</p>
      <div class="c-grid" id="c-grid" role="group" aria-label="Select all bears"></div>
      <div class="c-footer">
        <div class="c-pow">
          <div class="c-pow-track"><div class="c-pow-fill" id="c-pow-fill"></div></div>
          <span class="c-pow-label" id="c-pow-label">computing...</span>
        </div>
        <span class="c-tally" id="c-tally">0 / 3</span>
      </div>
      <div class="c-msg" id="c-msg"></div>
    </div>
  </div>

  <!-- CRT turn-on overlays -->
  <div id="crt-flash"></div>
  <div id="crt-scan"></div>

  <!-- ── CAPTCHA logic ───────────────────────────────────────────── -->
  <script>
  (function () {
    'use strict';

    /* Impostor symbols — all clearly non-bear shapes */
    const SYMBOLS = [
      `<svg viewBox="0 0 40 40"><polygon points="20,4 37,35 3,35" fill="#fff"/></svg>`,
      `<svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="15" fill="#fff"/></svg>`,
      `<svg viewBox="0 0 40 40"><text x="20" y="32" text-anchor="middle" font-size="30" fill="#fff" font-family="Arial,sans-serif" font-weight="700">A</text></svg>`,
      `<svg viewBox="0 0 40 40"><polygon points="20,2 24,14 38,14 27,22 31,34 20,26 9,34 13,22 2,14 16,14" fill="#fff"/></svg>`,
      `<svg viewBox="0 0 40 40"><polygon points="20,3 37,20 20,37 3,20" fill="#fff"/></svg>`,
      `<svg viewBox="0 0 40 40"><rect x="16" y="4" width="8" height="32" fill="#fff"/><rect x="4" y="16" width="32" height="8" fill="#fff"/></svg>`,
    ];

    const N_BEARS = 3;
    const N_CELLS = 9;

    let bearSet  = new Set();
    let selected = new Set();
    let openTs   = 0;
    let powDone  = false;
    let powRan   = false;

    /* unique challenge token per page load */
    const token = Math.random().toString(36).slice(2) + Date.now().toString(36);

    async function runPoW() {
      const enc   = new TextEncoder();
      const BATCH = 128;
      let n = 0;

      while (!powDone) {
        const jobs = Array.from({ length: BATCH }, (_, i) =>
          crypto.subtle.digest('SHA-256', enc.encode(token + ':' + (n + i)))
        );
        const results = await Promise.all(jobs);

        for (let i = 0; i < results.length; i++) {
          const b = new Uint8Array(results[i]);
          if (b[0] === 0 && b[1] < 8) {
            powDone = true;
            setPowUI(100, 'verified ✓');
            tryVerify();
            return;
          }
        }

        n += BATCH;
        setPowUI(Math.min(95, (n / 8192) * 100), 'computing...');
        await new Promise(r => setTimeout(r, 0));
      }
    }

    function setPowUI(pct, label) {
      document.getElementById('c-pow-fill').style.width = pct + '%';
      document.getElementById('c-pow-label').textContent = label;
    }

    function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function buildGrid() {
      bearSet.clear();
      selected.clear();

      const positions = shuffle([...Array(N_CELLS).keys()]);
      positions.slice(0, N_BEARS).forEach(p => bearSet.add(p));

      const syms = shuffle([...SYMBOLS]);
      let si = 0;

      const grid = document.getElementById('c-grid');
      grid.innerHTML = '';

      for (let i = 0; i < N_CELLS; i++) {
        const cell = document.createElement('div');
        cell.className = 'c-cell';
        cell.dataset.i = i;

        if (bearSet.has(i)) {
          const img = document.createElement('img');
          img.src   = 'assets/bear.png';
          img.alt   = '';
          img.draggable = false;
          cell.appendChild(img);
        } else {
          cell.innerHTML = syms[si++ % syms.length];
        }

        cell.addEventListener('click', () => onCell(i));
        grid.appendChild(cell);
      }

      syncTally();
      setMsg('', '');
    }

    function onCell(idx) {
      if (document.getElementById('hp').value) return;

      const cell = document.querySelector(`.c-cell[data-i="${idx}"]`);

      if (bearSet.has(idx)) {
        if (selected.has(idx)) return;
        selected.add(idx);
        cell.classList.add('selected');
        syncTally();
        if (selected.size === N_BEARS) tryVerify();
      } else {
        cell.classList.add('wrong');
        setTimeout(() => cell.classList.remove('wrong'), 450);
        selected.forEach(i => {
          document.querySelector(`.c-cell[data-i="${i}"]`).classList.remove('selected');
        });
        selected.clear();
        syncTally();
        setMsg('wRONG  —  try again', 'err');
        setTimeout(() => setMsg('', ''), 1500);
      }
    }

    function syncTally() {
      document.getElementById('c-tally').textContent = selected.size + ' / ' + N_BEARS;
    }

    function setMsg(txt, cls) {
      const el = document.getElementById('c-msg');
      el.textContent = txt;
      el.className = 'c-msg' + (cls ? ' ' + cls : '');
    }

    function tryVerify() {
      if (selected.size < N_BEARS)              return;
      if (document.getElementById('hp').value)  return;
      if (Date.now() - openTs < 800)            return;

      if (!powDone) {
        setMsg('completing verification...', '');
        return;
      }

      setMsg('VeRIFIED  ✓', 'ok');
      sessionStorage.setItem('captcha_passed', '1');

      // — Splash transition: captcha blooms open into the page —
      setTimeout(() => {
        const ov    = document.getElementById('c-overlay');
        const modal = document.querySelector('.c-modal');

        // Modal expands and dissolves (portal-open feel)
        modal.style.transition = 'transform 0.42s cubic-bezier(0.22,1,0.36,1), opacity 0.42s ease';
        modal.style.transform  = 'scale(1.6)';
        modal.style.opacity    = '0';

        // Overlay fills solid black (absorbing the page)
        ov.style.transition  = 'background 0.42s ease';
        ov.style.background  = 'rgba(0,0,0,1)';

        // Navigate once animation settles
        setTimeout(() => { window.location.href = 'home.html'; }, 460);
      }, 480);
    }

    function openOverlay() {
      openTs = Date.now();
      buildGrid();
      document.getElementById('c-overlay').classList.add('open');
      if (!powRan) { powRan = true; runPoW(); }
    }

    function closeOverlay() {
      document.getElementById('c-overlay').classList.remove('open');
    }

    document.querySelector('.btn-captcha').addEventListener('click', openOverlay);
    document.getElementById('c-close').addEventListener('click', closeOverlay);
    document.getElementById('c-overlay').addEventListener('click', e => {
      if (e.target.id === 'c-overlay') closeOverlay();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeOverlay();
    });

  })();
  </script>

  <!-- ── CRT turn-on animation ── -->
  <script>
  (function () {
    const flash = document.getElementById('crt-flash');
    const scan  = document.getElementById('crt-scan');
    const body  = document.body;

    // Boot: clip content to a center horizontal line
    body.style.clipPath = 'inset(50% 0 50% 0)';

    // Phases (ms) — slightly slower for that warm analog feel:
    // 0   – 150 : white flash blooms in
    // 150 – 220 : flash peak (full white)
    // 220 – 950 : clip expands; flash dissolves slowly into page colors
    // 950 – 1300: scanlines fade out (phosphor afterglow)
    // 1300+     : done

    const T_FLASH_IN  = 150;
    const T_FLASH_OUT = 220;
    const T_EXPAND    = 950;
    const T_SCAN_OUT  = 1300;

    let start = null;
    function lerp(a, b, t) { return a + (b - a) * t; }
    function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
    // S-curve that starts slow, peaks, and ends slow — good for a gentle dissolve
    function smoothstep(t) { return t * t * (3 - 2 * t); }

    function tick(ts) {
      if (!start) start = ts;
      const e = ts - start;

      if (e < T_FLASH_IN) {
        // Flash blooms in — content still at center line
        const t = e / T_FLASH_IN;
        flash.style.background = '#fff';
        flash.style.opacity = String(lerp(0, 1, ease(t)));
        body.style.clipPath = 'inset(50% 0 50% 0)';

      } else if (e < T_FLASH_OUT) {
        // Brief peak — pure white
        flash.style.background = '#fff';
        flash.style.opacity = '1';
        body.style.clipPath = 'inset(50% 0 50% 0)';

      } else if (e < T_EXPAND) {
        // Clip expands; flash dissolves slowly into dark page colors with warm phosphor tint
        const t   = (e - T_FLASH_OUT) / (T_EXPAND - T_FLASH_OUT);
        const pct = lerp(50, 0, easeOut(t));
        body.style.clipPath = `inset(${pct.toFixed(2)}% 0 ${pct.toFixed(2)}% 0)`;

        // Dissolve with S-curve: lingers bright, then melts away
        const fd = smoothstep(t);
        // Shift flash color white → warm cream as it fades (phosphor afterglow)
        const wG = Math.round(lerp(255, 238, fd));
        const wB = Math.round(lerp(255, 210, fd));
        flash.style.background = `rgb(255,${wG},${wB})`;
        flash.style.opacity    = String(lerp(1, 0, fd));
        scan.style.opacity     = String(lerp(0, 0.85, ease(Math.min(t * 2, 1))));

      } else if (e < T_SCAN_OUT) {
        // Fully revealed — scanlines fade out like phosphor glow dying
        const t = (e - T_EXPAND) / (T_SCAN_OUT - T_EXPAND);
        body.style.clipPath = '';
        flash.style.opacity = '0';
        scan.style.opacity  = String(lerp(0.85, 0, ease(t)));

      } else {
        body.style.clipPath = '';
        body.classList.remove('crt-boot');
        flash.remove();
        scan.remove();
        return;
      }

      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  })();
  </script>
</body>
</html>
