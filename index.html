  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }

    #crt-wrap { min-height: 100vh; display: flex; flex-direction: column; }

    .captcha-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 24px 60px; position: relative; z-index: 2;
    }

    /* ── Tagline above bear ── */
    .entry-tagline {
      font-size: 0.55rem;
      font-weight: 300;
      letter-spacing: 0.32em;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase;
      margin-bottom: clamp(16px, 3vh, 28px);
      opacity: 0;
      animation: fadeIn 0.5s ease 0.1s forwards;
    }

    .bear {
      width: clamp(140px, 24vw, 240px);
      margin-bottom: clamp(24px, 4vh, 40px);
      display: block;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.2s forwards;
    }

    .question {
      text-align: center;
      margin-bottom: clamp(20px, 3vh, 32px);
      opacity: 0;
      animation: fadeIn 0.5s ease 0.35s forwards;
    }
    .question .small {
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      display: block;
      margin-bottom: 0.3rem;
      color: rgba(255,255,255,0.55);
    }
    .question .large {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      display: block;
    }

    .buttons {
      display: flex;
      align-items: stretch;
      opacity: 0;
      animation: fadeIn 0.5s ease 0.5s forwards;
    }
    .buttons .btn:first-child { border-radius: 4px 0 0 4px; border-right: 1px solid rgba(255,255,255,0.18); }
    .buttons .btn:last-child  { border-radius: 0 4px 4px 0; border-left: none; }

    .btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.82rem, 2vw, 0.96rem);
      font-weight: 600;
      letter-spacing: 0.14em;
      cursor: pointer;
      padding: 0.85rem clamp(1.6rem, 4vw, 2.6rem);
      border: 2px solid #fff;
      transition: background 0.18s, color 0.18s, box-shadow 0.18s, border-color 0.18s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-yes     { background: #fff; color: #000; }
    .btn-yes:hover { background: rgba(255,255,255,0.85); }
    .btn-captcha { background: transparent; color: #fff; }
    .btn-captcha:hover { background: #fff; color: #000; }

    /* ── Footer hint ── */
    .entry-hint {
      margin-top: clamp(32px, 5vh, 52px);
      font-size: 0.56rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.18);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 0.4s ease 0.7s forwards;
    }

    #q-mark { cursor: default; display: inline; color: inherit; transition: color 0.18s; }
    #q-mark:hover { color: #FF5C00; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; background: #000; }
    .btn, button, a { touch-action: manipulation; }
    * { -webkit-user-select: none; user-select: none; }
    html { touch-action: manipulation; }

    /* ── Day mode ── */
    html[data-theme="day"] { background: #fff; }
    [data-theme="day"] body { background: #fff; color: #000; }
    [data-theme="day"] .entry-tagline { color: rgba(0,0,0,0.28); }
    [data-theme="day"] .question .small { color: rgba(0,0,0,0.55); }
    [data-theme="day"] .entry-hint { color: rgba(0,0,0,0.18); }
    [data-theme="day"] .btn { border-color: #000; }
    [data-theme="day"] .btn-yes { background: #000; color: #fff; }
    [data-theme="day"] .btn-yes:hover { background: #333; border-color: #333; }
    [data-theme="day"] .btn-captcha { color: #000; }
    [data-theme="day"] .btn-captcha:hover { background: #000; color: #fff; }
    [data-theme="day"] .buttons .btn:first-child { border-right-color: rgba(0,0,0,0.18); }
  </style>

  <div id="crt-wrap">
    <main class="captcha-wrap">
      <p class="entry-tagline" data-i18n="index.tagline">kUNST · hANDEL · vERBINDUNG — bERLIN</p>

      <div class="question">
        <span class="small" data-i18n="index.small">bIST DU</span>
        <span class="large" data-i18n-html="index.large.html">ein ROBOTER <span id="q-mark">¿</span></span>
      </div>
      <div class="buttons">
        <button class="btn btn-yes" onclick="window.location.href='pi.html'" data-i18n="index.yes">JA</button>
        <button class="btn btn-captcha" onclick="window.location.href='captcha.html'" data-i18n="index.captcha">CaPTCHa</button>
      </div>
      <p class="entry-hint">4-arts.com</p>
    </main>
  </div>

  <script>
  (function () {
    /* q-mark scramble */
    var qm = document.getElementById('q-mark');
    var POOL = '?!@#%&ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    var qtimer = null;
    qm.addEventListener('mouseenter', function(){
      qtimer = setInterval(function(){ qm.textContent = POOL[Math.floor(Math.random()*POOL.length)]; }, 55);
    });
    qm.addEventListener('mouseleave', function(){ clearInterval(qtimer); qm.textContent = '¿'; });

    /* CaPTCHa button scramble — only on hover, never blocks clicks */
    (function(){
      var btn = document.querySelector('.btn-captcha');
      var TARGET = 'CaPTCHa';
      var SPOOL = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#%&!?';
      var FRAMES=18,RATE=45,timer=null;
      function runScramble(){
        clearInterval(timer); var step=0;
        timer=setInterval(function(){
          var out='';
          for(var i=0;i<TARGET.length;i++) out+=(i<Math.floor(step*TARGET.length/FRAMES))?TARGET[i]:SPOOL[Math.floor(Math.random()*SPOOL.length)];
          btn.textContent=out;
          if(++step>FRAMES){clearInterval(timer);btn.textContent=TARGET;}
        },RATE);
      }
      if(window.matchMedia('(hover: none)').matches){
        /* Touch: run scramble once on load, no repeat — let clicks work cleanly */
        setTimeout(runScramble, 1200);
      } else {
        btn.addEventListener('mouseenter', runScramble);
        btn.addEventListener('mouseleave', function(){ clearInterval(timer); btn.textContent=TARGET; });
      }
    })();
  })();
  </script>
