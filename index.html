<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="icon" href="assets/favicon-64.png" sizes="64x64" type="image/png">
  <link rel="icon" href="assets/favicon.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="assets/favicon-180.png">
  <meta property="og:type"         content="website">
  <meta property="og:url"          content="https://4-arts.com/">
  <meta property="og:title"        content="[aRTS]">
  <meta property="og:description"  content="TRaDE + CONNeCT — now in BERLIN">
  <meta property="og:image"        content="https://4-arts.com/assets/og.png">
  <meta name="twitter:card"        content="summary">
  <meta name="twitter:title"       content="[aRTS]">
  <meta name="twitter:description" content="TRaDE + CONNeCT — now in BERLIN">
  <meta name="twitter:image"       content="https://4-arts.com/assets/og.png">
  <title>[aRTS]</title>
  <script>
    document.documentElement.style.background = '#000';
    /* Already verified — skip straight to home */
    if (localStorage.getItem('captcha_passed')) {
      window.location.replace('home.html');
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
  <link rel="prefetch" href="captcha.html">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
      cursor: crosshair;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wordmark {
      font-size: clamp(2.8rem, 10vw, 7rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      line-height: 1;
      opacity: 0;
      animation: wFade 0.7s 0.2s ease forwards;
      user-select: none;
      -webkit-user-select: none;
    }

    .sub {
      position: fixed;
      bottom: clamp(28px, 5vh, 48px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      opacity: 0;
      white-space: nowrap;
      animation: wFade 0.5s 0.7s ease forwards;
      user-select: none;
      -webkit-user-select: none;
    }

    @keyframes wFade {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 0.45; transform: translateY(0); }
    }
    .wordmark { animation: wFadeB 0.7s 0.2s ease forwards; }
    @keyframes wFadeB {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @supports (height: 100dvh) { html, body { height: 100dvh; } }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    * { -webkit-user-select: none; user-select: none; touch-action: manipulation; }
  </style>
</head>
<body>
  <span class="wordmark">[aRTS]</span>
  <span class="sub">BERLIN · TRaDE + CONNeCT</span>

  <script>
  (function () {
    /* Navigate to captcha on any interaction, or auto after 1.8s */
    var gone = false;
    function go() {
      if (gone) return;
      gone = true;

      /* CRT exit */
      var scan = document.createElement('div');
      scan.style.cssText = 'position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,14,0,0.50) 3px,rgba(0,14,0,0.50) 4px);opacity:0;z-index:99997;pointer-events:none;';
      document.body.appendChild(scan);

      var s0 = null, TR = 60, TS = 320;
      function run(ts) {
        if (!s0) s0 = ts;
        var e = ts - s0;
        var p = Math.min(1, e < TR ? 0 : (e - TR) / TS);
        scan.style.opacity = String(Math.min(1, e / TR));
        document.documentElement.style.clipPath = 'inset(' + (p * 50).toFixed(2) + '% 0 ' + (p * 50).toFixed(2) + '% 0)';
        if (e < TR + TS) {
          requestAnimationFrame(run);
        } else {
          document.documentElement.style.clipPath = 'inset(50% 0 50% 0)';
          document.documentElement.style.background = '#000';
          sessionStorage.setItem('crt_transition', '1');
          window.location.href = 'captcha.html';
        }
      }
      requestAnimationFrame(run);
    }

    /* Auto-advance */
    setTimeout(go, 1800);

    /* Or on any tap/click */
    document.addEventListener('click',     go, { once: true });
    document.addEventListener('touchstart', go, { once: true, passive: true });
    document.addEventListener('keydown',   go, { once: true });
  })();
  </script>
</body>
</html>
