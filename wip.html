<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="icon" href="assets/favicon-64.png" sizes="64x64" type="image/png">
  <link rel="icon" href="assets/favicon.png" sizes="32x32" type="image/png">

  <link rel="apple-touch-icon" href="assets/favicon-180.png">
  <meta property="og:type"         content="website">
  <meta property="og:url"          content="https://4-arts.com/">
  <meta property="og:title"        content="[aRTS]">
  <meta property="og:description"  content="TRaDE + CONNeCT — now in BERLIN">
  <meta property="og:image"        content="https://4-arts.com/assets/og.png">
  <meta name="twitter:card"        content="summary">
  <meta name="twitter:title"       content="[aRTS]">
  <meta name="twitter:description" content="TRaDE + CONNeCT — now in BERLIN">
  <meta name="twitter:image"       content="https://4-arts.com/assets/og.png">
  <title>[aRTS] — W.I.P.</title>
  <link rel="preload" as="image" href="assets/bear.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Label row: W.I.P. ── */
    .label-row {
      display: flex;
      gap: clamp(0.6rem, 2vw, 1.2rem);
      align-items: baseline;
      margin-bottom: clamp(2rem, 5vh, 4rem);
      opacity: 0;
      animation: fadeUp 0.7s ease 0.1s forwards;
    }

    .label {
      font-size: clamp(1.1rem, 3vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.14em;
      color: #fff;
    }

    /* ── Bear grin ── */
    .bear-wrap {
      width: clamp(180px, 46vw, 420px);
      opacity: 0;
      animation: fadeUp 0.75s cubic-bezier(0.34, 1.56, 0.64, 1) 0.28s forwards;
    }

    .bear-wrap img {
      width: 100%;
      height: auto;
      filter: brightness(0) invert(1);
      display: block;
    }

    /* ── Hint ── */
    .hint {
      margin-top: clamp(1rem, 2.5vh, 2rem);
      font-size: clamp(0.65rem, 1.5vw, 0.82rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.28);
      opacity: 0;
      animation: fadeUp 0.6s ease 0.55s forwards;
    }

    /* ── Back button ── */
    .btn-back {
      margin-top: clamp(1.6rem, 3.5vh, 3rem);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: clamp(180px, 38vw, 300px);
      height: clamp(48px, 8vh, 72px);
      border: 2px solid #FF5C00;
      border-radius: 4px;
      background: transparent;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.8rem, 2vw, 1rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-decoration: none;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.18s, color 0.18s;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.8s forwards;
    }
    .btn-back:hover { background: #FF5C00; color: #000; }

    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0);    }
    }

    /* ── dvh fix: excludes iOS Safari address bar ── */
    @supports (height: 100dvh) {
      body { height: 100dvh; }
    }
    /* ── Mobile: safe area + text-size ── */
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    .btn, button, a { touch-action: manipulation; }
  </style>
</head>
<body>

  <div class="label-row">
    <span class="label">W.</span>
    <span class="label">I.</span>
    <span class="label">P.</span>
  </div>

  <div class="bear-wrap">
    <img src="assets/bear.png" alt="">
  </div>

  <p class="hint">... cOMING SOON ...</p>

  <a href="home.html" class="btn-back">gO bACK</a>

  <!-- CRT channel-change transition -->
  <script>
  (function(){
    var wrap = document.documentElement;

    /* Arrival */
    if(sessionStorage.getItem('crt_transition')){
      wrap.style.clipPath='inset(50% 0 50% 0)';
    }

    function doEnter(){
      sessionStorage.removeItem('crt_transition');
      var t0=null, DUR=380;
      function run(ts){
        if(!t0) t0=ts;
        var pct=Math.min((ts-t0)/DUR,1);
        var p=(1-pct)*50;
        wrap.style.clipPath='inset('+p.toFixed(2)+'% 0 '+p.toFixed(2)+'% 0)';
        if(pct<1) requestAnimationFrame(run);
        else wrap.style.clipPath='';
      }
      requestAnimationFrame(run);
    }

    function doExit(dest){
      var scan=document.createElement('div');
      scan.style.cssText='position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,0.03) 0px,rgba(255,255,255,0.03) 1px,transparent 1px,transparent 2px);pointer-events:none;z-index:9999;opacity:0;transition:opacity 0.08s';
      document.body.appendChild(scan);
      var t0=null, DUR=340;
      function run(ts){
        if(!t0) t0=ts;
        var pct=Math.min((ts-t0)/DUR,1);
        var p=pct<0.5?pct*100:(1-pct)*100;
        if(pct<1){
          wrap.style.clipPath='inset('+p.toFixed(2)+'% 0 '+p.toFixed(2)+'% 0)';
          scan.style.opacity='1';
        }else{
          wrap.style.clipPath='inset(50% 0 50% 0)';
          sessionStorage.setItem('crt_transition','1');
          window.location.href=dest;
          return;
        }
        requestAnimationFrame(run);
      }
      requestAnimationFrame(run);
    }

    if(sessionStorage.getItem('crt_transition')){
      doEnter();
    }

    /* Exit interceptor */
    document.addEventListener('click',function(ev){
      var a=ev.target.closest('a[href]');
      if(!a)return;
      var h=a.getAttribute('href');
      if(!h||h.charAt(0)==='#'||/^(https?:|mailto:|tel:|\/\/)/.test(h))return;
      if(ev.metaKey||ev.ctrlKey||ev.shiftKey||ev.altKey)return;
      ev.preventDefault();
      doExit(h);
    },true);
  })();
  </script>

</body>
</html>
