<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="icon" href="assets/favicon-64.png" sizes="64x64" type="image/png">
  <link rel="icon" href="assets/favicon.png" sizes="32x32" type="image/png">

  <link rel="apple-touch-icon" href="assets/favicon-180.png">
  <meta property="og:type"         content="website">
  <meta property="og:url"          content="https://4-arts.com/">
  <meta property="og:title"        content="[aRTS]">
  <meta property="og:description"  content="TRaDE + CONNeCT — now in BERLIN">
  <meta property="og:image"        content="https://4-arts.com/assets/og-banner.png">
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="[aRTS]">
  <meta name="twitter:description" content="TRaDE + CONNeCT — now in BERLIN">
  <meta name="twitter:image"       content="https://4-arts.com/assets/og-banner.png">
  <title>[aRTS] — W.I.P.</title>
  <script>
    document.documentElement.style.background = '#000';
    if(localStorage.getItem('arts_theme')==='day'){document.documentElement.style.background='#fff';document.documentElement.setAttribute('data-theme','day');}
  </script>
  <link rel="preload" as="image" href="assets/bear.png">
  <link href="assets/fonts/space-grotesk.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Bear ── */
    .bear-wrap {
      width: clamp(140px, 36vw, 300px);
      opacity: 0;
      animation: fadeUp 0.75s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;
    }
    .bear-wrap img {
      width: 100%;
      height: auto;
      filter: brightness(0) invert(1);
      display: block;
    }

    /* ── Text block ── */
    .wip-text {
      margin-top: clamp(24px, 4vh, 40px);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(10px, 1.5vh, 16px);
      opacity: 0;
      animation: fadeUp 0.6s ease 0.45s forwards;
    }
    .wip-label {
      font-size: 0.55rem;
      font-weight: 300;
      letter-spacing: 0.32em;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase;
    }
    .wip-title {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1.15;
    }
    .wip-desc {
      font-size: clamp(0.68rem, 1.4vw, 0.78rem);
      font-weight: 300;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.45);
      line-height: 1.7;
      max-width: 340px;
    }

    /* ── Progress dots ── */
    .wip-dots {
      display: flex;
      gap: 6px;
      margin-top: clamp(16px, 2.5vh, 28px);
      opacity: 0;
      animation: fadeUp 0.5s ease 0.7s forwards;
    }
    .wip-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
    }
    .wip-dot.active {
      background: #FF5C00;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Back button ── */
    .btn-back {
      margin-top: clamp(24px, 3.5vh, 40px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.7rem clamp(1.4rem, 4vw, 2.4rem);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 3px;
      background: transparent;
      color: rgba(255,255,255,0.55);
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.72rem, 1.6vw, 0.84rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-decoration: none;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.9s forwards;
    }
    .btn-back:hover { border-color: #FF5C00; color: #fff; }

    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0);    }
    }

    @supports (height: 100dvh) {
      body { height: 100dvh; }
    }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    .btn, button, a { touch-action: manipulation; }
    * { -webkit-user-select: none; user-select: none; }
    input, textarea, select, [contenteditable] { -webkit-user-select: text; user-select: text; }
    html { touch-action: manipulation; }

    /* ── Day mode ── */
    html[data-theme="day"] { background: #fff; }
    [data-theme="day"] body { background: #fff; color: #000; }
    [data-theme="day"] .wip-label { color: rgba(0,0,0,0.38); }
    [data-theme="day"] .wip-desc { color: rgba(0,0,0,0.50); }
    [data-theme="day"] .wip-dot { background: rgba(0,0,0,0.14); }
    [data-theme="day"] .btn-back { color: rgba(0,0,0,0.55); border-color: rgba(0,0,0,0.14); }
    [data-theme="day"] .btn-back:hover { border-color: #FF5C00; color: #000; }
    [data-theme="day"] .bear-wrap img { filter: brightness(0); }
  </style>
</head>
<body>

  <div class="bear-wrap">
    <img src="assets/bear.png" alt="">
  </div>

  <div class="wip-text">
    <p class="wip-label">wORK iN pROGRESS</p>
    <h1 class="wip-title">bUILDING tHIS.</h1>
    <p class="wip-desc">This part of aRTS isn't ready yet. We'd rather ship it right than ship it fast.</p>
  </div>

  <div class="wip-dots">
    <span class="wip-dot active"></span>
    <span class="wip-dot"></span>
    <span class="wip-dot"></span>
    <span class="wip-dot"></span>
    <span class="wip-dot"></span>
  </div>

  <a href="home.html" class="btn-back">gO bACK</a>

<script src="theme.js?v=4"></script>
<script src="consent.js"></script>
<script src="auth.js"></script>
</body>
</html>
