    /* ── Mobile full-screen overlay ── */

      .nav-overlay { opacity: 1; }

  <!-- CRT overlays — outside wrapper so filters don't break fixed positioning -->
  <div id="crt-scan"></div>
  <div id="crt-vignette"></div>

  <script>
  (function () {
    const scan     = document.getElementById('crt-scan');
    const vignette = document.getElementById('crt-vignette');
    const wrap     = document.getElementById('crt-wrap');

    const T_FLICKER  =  130;
    const T_EXPAND   =  780;
    const T_FADE_END = 1150;

    function lerp(a, b, t) { return a + (b - a) * t; }
    function easeOut(t)    { return 1 - Math.pow(1 - t, 3); }
    function smoothstep(t) { return t * t * (3 - 2 * t); }

    function setRGB(px, alpha) {
      if (alpha < 0.01 || px < 0.1) { wrap.style.filter = ''; return; }
      const p = px.toFixed(1), a = alpha.toFixed(3), b = (px * 0.5).toFixed(1);
      wrap.style.filter =
        `drop-shadow(-${p}px 0 ${b}px rgba(255,20,20,${a})) ` +
        `drop-shadow(${p}px 0 ${b}px rgba(20,30,255,${a})) ` +
        `drop-shadow(0 -${b}px ${b}px rgba(20,255,20,${(alpha * 0.4).toFixed(3)}))`;
    }

    function bootCRT() {
      /* Start collapsed to a center line — expands as the tube warms up */
      wrap.style.clipPath = 'inset(50% 0 50% 0)';

      let start = null;
      function tick(ts) {
        if (!start) start = ts;
        const e = ts - start;

        if (e < T_FLICKER) {
          // Flicker burst: strong RGB + scanlines, clip stays at center line
          scan.style.opacity     = String(lerp(0, 1.0, e / T_FLICKER));
          vignette.style.opacity = '0.95';
          setRGB(9, 0.75);

        } else if (e < T_EXPAND) {
          // Tube warms up: clip expands, RGB fades out
          const t   = (e - T_FLICKER) / (T_EXPAND - T_FLICKER);
          const et  = easeOut(t);
          const pct = lerp(50, 0, et);
          wrap.style.clipPath    = `inset(${pct.toFixed(2)}% 0 ${pct.toFixed(2)}% 0)`;
          setRGB(lerp(9, 0, smoothstep(t)), lerp(0.75, 0, smoothstep(t)));
          scan.style.opacity     = '1.0';
          vignette.style.opacity = String(lerp(0.95, 0.55, et));

        } else if (e < T_FADE_END) {
          // Afterglow: scanlines + vignette dissolve
          const t  = (e - T_EXPAND) / (T_FADE_END - T_EXPAND);
          const et = smoothstep(t);
          wrap.style.clipPath    = '';
          wrap.style.filter      = '';
          scan.style.opacity     = String(lerp(1.0, 0, et));
          vignette.style.opacity = String(lerp(0.55, 0, et));

        } else {
          // Done — clean up
          wrap.style.clipPath    = '';
          wrap.style.filter      = '';
          scan.remove();
          vignette.remove();
          return;
        }

        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    /* Play the CRT boot when arriving from captcha verification */
    if (sessionStorage.getItem('crt_transition')) {
      sessionStorage.removeItem('crt_transition');
      bootCRT();
    }

    /* Bfcache restore — simple fade-in */
    window.addEventListener('pageshow', function (e) {
      if (e.persisted) {
        const c = document.createElement('div');
        c.style.cssText = 'position:fixed;inset:0;background:#000;z-index:99998;pointer-events:none;opacity:1;';
        document.body.appendChild(c);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            c.style.transition = 'opacity 0.22s ease';
            c.style.opacity    = '0';
            setTimeout(function () { if (c.parentNode) c.parentNode.removeChild(c); }, 320);
          });
        });
      }
    });
  })();
  </script>

  <!-- Easter egg: bear × 7 → 77% off -->
  <script>
  (function () {
    var bear  = document.querySelector('.bear');
    var clicks = 0;
    var MAGIC  = 7;
    var POOL   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#%&!?';

    function rand() { return POOL[Math.floor(Math.random() * POOL.length)]; }

    function scrambleTo(el, target, cb) {
      var FRAMES = 22, RATE = 40, step = 0;
      var t = setInterval(function () {
        var settled = Math.floor((step / FRAMES) * target.length);
        el.textContent = target.split('').map(function (ch, i) {
          return i < settled ? ch : rand();
        }).join('');
        step++;
        if (step > FRAMES) { clearInterval(t); el.textContent = target; if (cb) cb(); }
      }, RATE);
    }

    function showEgg() {
      /* Overlay */
      var ov = document.createElement('div');
      ov.style.cssText = [
        'position:fixed;inset:0;z-index:99999;background:#000;',
        'display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;',
        'cursor:pointer;opacity:0;transition:opacity 0.25s ease;',
        'font-family:"Space Grotesk",sans-serif;',
      ].join('');

      /* Scanlines over overlay */
      var sl = document.createElement('div');
      sl.style.cssText = 'position:absolute;inset:0;pointer-events:none;' +
        'background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,14,0,0.45) 3px,rgba(0,14,0,0.45) 4px);';
      ov.appendChild(sl);

      /* Big number */
      var num = document.createElement('div');
      num.style.cssText = 'font-size:clamp(5rem,22vw,14rem);font-weight:700;color:#FF5C00;line-height:1;letter-spacing:0.05em;';
      num.textContent   = '??';
      ov.appendChild(num);

      /* "// OFF" label */
      var off = document.createElement('div');
      off.style.cssText = 'font-size:clamp(1rem,3vw,1.6rem);font-weight:300;color:rgba(255,255,255,0.5);letter-spacing:0.3em;';
      off.textContent   = '// pAY';
      ov.appendChild(off);

      /* Divider */
      var hr = document.createElement('div');
      hr.style.cssText = 'width:clamp(180px,30vw,340px);height:1px;background:rgba(255,92,0,0.3);margin:0.5rem 0;';
      ov.appendChild(hr);

      /* Code */
      var code = document.createElement('div');
      code.style.cssText = 'font-size:clamp(1.1rem,3.5vw,2rem);font-weight:700;color:#FF5C00;letter-spacing:0.22em;opacity:0;transition:opacity 0.4s ease 0.2s;';
      code.textContent   = '[aRTS-77]';
      ov.appendChild(code);

      /* Dismiss hint */
      var hint = document.createElement('div');
      hint.style.cssText = 'font-size:0.72rem;font-weight:300;color:rgba(255,255,255,0.25);letter-spacing:0.18em;margin-top:1.4rem;opacity:0;transition:opacity 0.4s ease 0.5s;';
      hint.textContent   = 'tap anywhere to close';
      ov.appendChild(hint);

      document.body.appendChild(ov);

      /* Fade overlay in */
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          ov.style.opacity = '1';
          /* Scramble "??" → "77" */
          setTimeout(function () {
            scrambleTo(num, '77', function () {
              /* Reveal % */
              setTimeout(function () {
                scrambleTo(num, '77%', function () {
                  code.style.opacity = '1';
                  hint.style.opacity = '1';
                });
              }, 180);
            });
          }, 200);
        });
      });

      /* Dismiss */
      ov.addEventListener('click', function () {
        ov.style.opacity = '0';
        setTimeout(function () { if (ov.parentNode) ov.parentNode.removeChild(ov); }, 300);
      });
    }

    if (!bear) return;
    bear.addEventListener('click', function () {
      clicks++;
      if (clicks === MAGIC) {
        clicks = 0;
        showEgg();
      }
    });
  })();
  </script>

  <!-- CRT exit transition -->
  <script>
  (function(){
    var scan=null,vig=null,busy=false;
    function mkL(){
      if(scan)return;
      scan=document.createElement('div');
      scan.style.cssText='position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,14,0,0.50) 3px,rgba(0,14,0,0.50) 4px);opacity:0;z-index:99997;pointer-events:none;';
      vig=document.createElement('div');
      vig.style.cssText='position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,0.88) 100%);opacity:0;z-index:99996;pointer-events:none;';
      document.body.appendChild(scan);
      document.body.appendChild(vig);
    }
    function lerp(a,b,t){return a+(b-a)*t;}
    function smooth(t){var c=Math.min(1,Math.max(0,t));return c*c*(3-2*c);}
    function doExit(dest){
      if(busy)return;busy=true;
      mkL();
      var TR=60,TS=320,s0=null;
      function run(ts){
        if(!s0)s0=ts;
        var e=ts-s0;
        if(e<TR){
          scan.style.opacity=String(lerp(0,1,e/TR));
          vig.style.opacity=String(lerp(0,0.95,e/TR));
        }else if(e<TR+TS){
          var t=(e-TR)/TS,p=lerp(0,50,smooth(t));
          document.documentElement.style.clipPath='inset('+p.toFixed(2)+'% 0 '+p.toFixed(2)+'% 0)';
          scan.style.opacity='1';
          vig.style.opacity='0.95';
        }else{
          document.documentElement.style.clipPath='inset(50% 0 50% 0)';
          document.documentElement.style.background='#000';
          document.body.style.background='#000';
          sessionStorage.setItem('crt_transition','1');
          window.location.href=dest;
          return;
        }
        requestAnimationFrame(run);
      }
      requestAnimationFrame(run);
    }
    document.addEventListener('click',function(ev){
      var a=ev.target.closest('a[href]');
      if(!a)return;
      var h=a.getAttribute('href');
      if(!h||h.charAt(0)==='#'||/^(https?:|mailto:|tel:|\/\/)/.test(h))return;
      if(ev.metaKey||ev.ctrlKey||ev.shiftKey||ev.altKey)return;
      ev.preventDefault();
      doExit(h);
    },true);
  })();
  </script>

  <!-- Nav & logo hover -->
  <script>
  (function(){
    var DELAY = 40;

    /* Nav links — lowercase left→right on enter, recapitalise right→left on leave */
    function navHover(el){
      var orig = el.textContent;
      var timers=[], state=0;
      function clr(){ timers.forEach(clearTimeout); timers.length=0; }
      function render(n){
        var s=orig[0];
        for(var i=1;i<orig.length;i++) s+=(i<=n ? orig[i].toLowerCase() : orig[i]);
        el.textContent=s;
      }
      el.addEventListener('mouseenter',function(){
        clr();
        var from=state;
        for(var i=0;i<orig.length-1-from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from+i+1);},i*DELAY));
        })(i);
      });
      el.addEventListener('mouseleave',function(){
        clr();
        var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    }
    document.querySelectorAll('nav a, a.nav-about').forEach(navHover);

    /* ── Idle static glitch — nav feels alive ── */
    /* One random char in one random nav link briefly corrupts every ~4s   */
    (function(){
      var links   = Array.from(document.querySelectorAll('nav a'));
      var origTxt = links.map(function(el){ return el.textContent; });
      var glyphs  = '▓░▒│╌·×÷¬±';
      function tick(){
        var li  = Math.floor(Math.random() * links.length);
        var el  = links[li];
        var txt = origTxt[li];
        var ci  = 1 + Math.floor(Math.random() * (txt.length - 1)); // skip index 0
        var arr = txt.split('');
        arr[ci] = glyphs[Math.floor(Math.random() * glyphs.length)];
        el.textContent = arr.join('');
        setTimeout(function(){ el.textContent = txt; }, 90);
        setTimeout(tick, 2600 + Math.random() * 3800);
      }
      setTimeout(tick, 1200 + Math.random() * 1800);
    })();

    /* ── [aRTS] home mark — expand to [aRTS LOGIN] or [aRTS ID] if logged in ── */
    (function(){
      var mark   = document.getElementById('home-mark');
      if (!mark) return;
      /* If member hash stored → already logged in → show ID instead of LOGIN */
      var loggedIn = false;
      try { loggedIn = !!localStorage.getItem('arts_id_hash'); } catch(e) {}
      var SUFFIX = loggedIn ? ' ID' : ' LOGIN';
      /* Subtle visual distinction when already logged in */
      if(loggedIn){ mark.style.opacity = '1'; mark.title = 'mEMBER iD'; }
      var timers = [], state = 0;
      function clr(){ timers.forEach(clearTimeout); timers.length = 0; }
      function render(n){ mark.textContent = '[aRTS' + SUFFIX.slice(0, n) + ']'; }
      mark.addEventListener('mouseenter', function(){
        clr();
        var from = state;
        for (var i = from; i < SUFFIX.length; i++)(function(i){
          timers.push(setTimeout(function(){ render(state = i + 1); }, (i - from) * DELAY));
        })(i);
      });
      mark.addEventListener('mouseleave', function(){
        clr();
        var from = state;
        for (var i = 0; i < from; i++)(function(i){
          timers.push(setTimeout(function(){ render(state = from - i - 1); }, i * DELAY));
        })(i);
      });
    })();

    /* Logo [a] — expand on hover via data-inner attribute; avoids flash */
    document.querySelectorAll('a.logo[data-inner]').forEach(function(logo){
      var inner=logo.dataset.inner;
      var timers=[], state=0;
      function clr(){ timers.forEach(clearTimeout); timers.length=0; }
      function render(n){ logo.textContent='[a'+inner.slice(0,n)+']'; }
      logo.addEventListener('mouseenter',function(){
        clr();
        var from=state;
        for(var i=from;i<inner.length;i++)(function(i){
          timers.push(setTimeout(function(){render(state=i+1);},(i-from)*DELAY));
        })(i);
      });
      logo.addEventListener('mouseleave',function(){
        clr();
        var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    });
  })();
  </script>

  <!-- Hamburger toggle -->
  <script>
  (function(){
    var burger  = document.getElementById('burger');
    var overlay = document.getElementById('nav-overlay');
    var closer  = document.getElementById('burger-close');

    /* Capture overlay nav links + original mixed-case labels once */
    var oLinks  = Array.from(overlay.querySelectorAll('a'));
    var oLabels = oLinks.map(function(el){ return el.textContent; });

    /* ── RGB power-on flash (mobile CRT aesthetic) ── */
    function rgbPowerOn(){
      var steps = [
        [0,   'brightness(9) saturate(0.1)'],
        [55,  'brightness(5) hue-rotate(0deg)   saturate(3)'],
        [110, 'brightness(3) hue-rotate(120deg) saturate(2.5)'],
        [165, 'brightness(2) hue-rotate(240deg) saturate(1.5)'],
        [220, 'brightness(1.2) saturate(0.9)'],
        [300, '']
      ];
      steps.forEach(function(s){
        setTimeout(function(){
          if (overlay.classList.contains('is-open')) overlay.style.filter = s[1];
        }, s[0]);
      });
    }

    /* ── Decap cascade: all-lowercase → mixed-case left-to-right, staggered per link ── */
    function decapCascade(){
      oLinks.forEach(function(el, li){
        var target = oLabels[li];
        el.textContent = target.toLowerCase();          /* start: all lowercase */
        var base = li * 100 + 120;                      /* slower stagger per link */
        Array.from(target).forEach(function(ch, i){
          setTimeout(function(){
            if (!overlay.classList.contains('is-open')) return;
            var chars = el.textContent.split('');
            chars[i] = ch;                              /* pop to target case   */
            el.textContent = chars.join('');
          }, base + i * 50);                            /* slower per-char cadence */
        });
      });
    }

    function openMenu(){
      overlay.style.display = 'flex';
      void overlay.offsetHeight;                        /* force reflow for iOS */
      requestAnimationFrame(function(){
        overlay.classList.add('is-open');
        rgbPowerOn();
        decapCascade();
      });
      burger.classList.add('is-open');
    }

    function closeMenu(){
      overlay.style.filter = '';
      oLinks.forEach(function(el, i){ el.textContent = oLabels[i]; }); /* restore labels */
      overlay.classList.remove('is-open');
      burger.classList.remove('is-open');
      /* Mobile: no CSS transition → near-instant hide. Desktop: opacity 0.22s */
      var dur = window.innerWidth <= 520 ? 30 : 230;
      setTimeout(function(){ overlay.style.display = 'none'; }, dur);
    }

    burger.addEventListener('click', openMenu);
    closer.addEventListener('click', closeMenu);

    /* Close on tap outside any link */
    overlay.addEventListener('click', function(e){
      if (e.target === overlay) closeMenu();
    });
  })();
  </script>

  <!-- ── Easter egg: type KNUP ── -->
  <script>(function(){
    var SEQ = 'knup', buf = '';

    var WORDS = [
      'BUY IT','USE IT','BREAK IT','FIX IT',
      'TRASH IT','CHANGE IT','MAIL —','UPGRADE IT',
      'CHARGE IT','POINT IT','ZOOM IT','PRESS IT',
      'SNAP IT','WORK IT','QUICK — ERASE IT',
      'WRITE IT','CUT IT','PASTE IT','SAVE IT',
      'LOAD IT','CHECK IT','QUICK — REWRITE IT',
      'PLUG IT','PLAY IT','BURN IT','RIP IT',
      'DRAG AND DROP IT','ZIP —','UNZIP IT',
      'LOCK IT','FILL IT','CALL IT','FIND IT',
      'VIEW IT','CODE IT','JAM —','UNLOCK IT',
      'SURF IT','SCROLL IT','PAUSE IT','CLICK IT',
      'CROSS IT','CRACK IT','SWITCH —','UPDATE IT',
      'NAME IT','READ IT','TUNE IT','PRINT IT',
      'SCAN IT','SEND IT','FAX IT','RENAME IT',
      'TOUCH IT','BRING IT','PAY IT','WATCH IT',
      'TURN IT','LEAVE IT','START —','FORMAT IT'
    ];

    document.addEventListener('keydown', function(e){
      if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      buf = (buf + e.key.toLowerCase()).slice(-SEQ.length);
      if(buf === SEQ){ buf = ''; launch(); }
    });

    function launch(){
      /* ── BPM: Technologic runs at ~120 — 8th-note grid = 250ms ── */
      var BPM = 120, MS = Math.round(60000 / BPM / 2); /* 250ms */

      /* ── styles ── */
      var s = document.createElement('style');
      s.textContent =
        /* RGB aberration — one full cycle = 1 word duration, stays in sync */
        '@keyframes tRgb{' +
          '0%  {text-shadow: 3px 0 1px rgba(255,20,20,0.92), -3px 0 1px rgba(20,200,255,0.92)}' +
          '33% {text-shadow:-3px 0 1px rgba(20,255,20,0.92),  3px 0 1px rgba(200,20,255,0.92)}' +
          '66% {text-shadow: 3px 0 1px rgba(20,60,255,0.92), -3px 0 1px rgba(255,220,20,0.92)}' +
          '100%{text-shadow: 3px 0 1px rgba(255,20,20,0.92), -3px 0 1px rgba(20,200,255,0.92)}' +
        '}' +
        /* Pop: snap in, hold, fade cleanly — no skew jitter */
        '@keyframes tPop{' +
          '0%  {opacity:0; transform:scale(1.08)}' +
          '9%  {opacity:1; transform:scale(1)}' +
          '82% {opacity:1; transform:scale(1)}' +
          '100%{opacity:0; transform:scale(0.94)}' +
        '}' +
        /* Overlay entrance */
        '@keyframes tFadeIn{0%{opacity:0}100%{opacity:1}}' +
        '#_techEgg{position:fixed;inset:0;background:#000;z-index:99999;' +
          'display:flex;flex-direction:column;align-items:center;justify-content:center;' +
          'cursor:pointer;overflow:hidden;' +
          'animation:tFadeIn 0.18s ease forwards;}' +
        /* CRT scanlines on overlay */
        '#_techEgg::after{content:"";position:absolute;inset:0;pointer-events:none;' +
          'background:repeating-linear-gradient(to bottom,' +
            'transparent 0px,transparent 3px,rgba(0,14,0,0.45) 3px,rgba(0,14,0,0.45) 4px);' +
          'z-index:1;}' +
        /* Giant KNUP watermark */
        '#_techEgg::before{content:"KNUP";position:absolute;top:50%;left:50%;' +
          'transform:translate(-50%,-50%);z-index:0;' +
          'font-family:"Space Grotesk",sans-serif;font-size:clamp(6rem,30vw,18rem);' +
          'font-weight:700;color:rgba(255,255,255,0.012);letter-spacing:0.1em;' +
          'pointer-events:none;user-select:none;}' +
        '#_techWord{position:relative;z-index:2;' +
          'font-family:"Space Grotesk",sans-serif;' +
          'font-size:clamp(1.8rem,8vw,5rem);font-weight:700;letter-spacing:0.18em;' +
          'color:#fff;text-align:center;padding:0 6vw;line-height:1.1;}' +
        '#_techHint{position:absolute;bottom:28px;z-index:2;' +
          'font-family:"Space Grotesk",sans-serif;' +
          'font-size:0.52rem;letter-spacing:0.22em;color:rgba(255,255,255,0.15);' +
          'text-transform:uppercase;}';
      document.head.appendChild(s);

      /* ── overlay ── */
      var ov   = document.createElement('div'); ov.id = '_techEgg';
      var wEl  = document.createElement('div'); wEl.id = '_techWord';
      var hint = document.createElement('div'); hint.id = '_techHint';
      hint.textContent = 'tAP · eSC · cLOSE';
      ov.appendChild(wEl); ov.appendChild(hint);
      document.body.appendChild(ov);

      /* ── sequencer — rAF-based reset for clean per-word animation ── */
      var idx = 0, timer, stopped = false;

      function tick(){
        if(stopped || idx >= WORDS.length){ if(!stopped) stop(500); return; }
        var word = WORDS[idx++];
        wEl.style.animation = 'none';
        /* rAF gives browser one frame to commit 'none' before restarting */
        requestAnimationFrame(function(){
          requestAnimationFrame(function(){
            if(stopped) return;
            wEl.textContent = word;
            wEl.style.animation =
              'tRgb ' + MS + 'ms linear infinite, ' +
              'tPop ' + MS + 'ms ease both';
            timer = setTimeout(tick, MS);
          });
        });
      }

      function stop(delay){
        stopped = true;
        clearTimeout(timer);
        setTimeout(function(){
          ov.style.transition = 'opacity 0.38s ease';
          ov.style.opacity = '0';
          setTimeout(function(){
            if(ov.parentNode) ov.parentNode.removeChild(ov);
            if(s.parentNode)  s.parentNode.removeChild(s);
          }, 420);
        }, delay || 0);
      }

      tick();
      ov.addEventListener('click', function(){ stop(); });
      document.addEventListener('keydown', function esc(e){
        if(e.key === 'Escape'){ stop(); document.removeEventListener('keydown', esc); }
      });
    }
  })();</script>

  <!-- ── Easter egg: type ZENO — Zeno's Dichotomy Paradox ── -->
  <script>(function(){
    var SEQ = 'zeno', buf = '';

    document.addEventListener('keydown', function(e){
      if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      buf = (buf + e.key.toLowerCase()).slice(-SEQ.length);
      if(buf === SEQ){ buf = ''; launchZeno(); }
    });

    function launchZeno(){
      var s = document.createElement('style');
      s.textContent =
        '@keyframes zFade{0%{opacity:0}100%{opacity:1}}' +
        '@keyframes zPulse{0%,100%{opacity:0.22}50%{opacity:0.45}}' +
        /* Overlay */
        '#_zenoEgg{position:fixed;inset:0;background:#000;z-index:99999;' +
          'display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;' +
          'cursor:pointer;overflow:hidden;animation:zFade 0.28s ease forwards;}' +
        /* CRT scanlines */
        '#_zenoEgg::after{content:"";position:absolute;inset:0;pointer-events:none;' +
          'background:repeating-linear-gradient(to bottom,' +
            'transparent 0px,transparent 3px,rgba(0,14,0,0.42) 3px,rgba(0,14,0,0.42) 4px);}' +
        /* Watermark — faint orange entity tint */
        '#_zenoEgg::before{content:"ZENO";position:absolute;top:50%;left:50%;' +
          'transform:translate(-50%,-50%);z-index:0;' +
          'font-family:"Space Grotesk",sans-serif;font-size:clamp(6rem,30vw,18rem);' +
          'font-weight:700;color:rgba(255,92,0,0.018);letter-spacing:0.1em;' +
          'pointer-events:none;user-select:none;}' +
        '#_zenoQuote{font-family:"Space Grotesk",sans-serif;font-size:clamp(0.72rem,2vw,0.9rem);' +
          'font-weight:300;letter-spacing:0.18em;color:rgba(255,255,255,0.38);' +
          'text-align:center;max-width:min(80vw,540px);line-height:1.7;' +
          'margin-bottom:clamp(36px,6vh,64px);text-transform:uppercase;' +
          'position:relative;z-index:1;}' +
        '#_zenoName{font-family:"Space Grotesk",sans-serif;font-size:clamp(0.52rem,1.4vw,0.66rem);' +
          'font-weight:300;letter-spacing:0.32em;color:rgba(255,255,255,0.22);' +
          'margin-bottom:clamp(48px,8vh,80px);text-transform:uppercase;' +
          'position:relative;z-index:1;}' +
        /* Progress track */
        '#_zenoTrack{position:relative;width:min(72vw,520px);height:1px;' +
          'background:rgba(255,255,255,0.10);z-index:1;}' +
        '#_zenoBar{position:absolute;left:0;top:0;height:1px;width:0%;' +
          'background:#fff;' +
          'transition:width 0.55s cubic-bezier(0.25,0.46,0.45,0.94),background 0.6s ease;}' +
        '#_zenoBar::after{content:"";position:absolute;right:-1px;top:-2px;' +
          'width:3px;height:5px;background:inherit;' +
          'box-shadow:0 0 6px 2px rgba(255,255,255,0.6);}' +
        /* Giant percentage / fraction counter */
        '#_zenoPct{font-family:"Space Grotesk",sans-serif;' +
          'font-size:clamp(3rem,12vw,7rem);font-weight:700;letter-spacing:0.04em;' +
          'color:#fff;margin-top:clamp(32px,5vh,56px);line-height:1;' +
          'text-shadow:0 0 40px rgba(255,255,255,0.12);' +
          'transition:color 0.65s ease,text-shadow 0.65s ease;' +
          'position:relative;z-index:1;}' +
        '#_zenoSub{font-family:"Space Grotesk",sans-serif;font-size:clamp(0.5rem,1.3vw,0.62rem);' +
          'font-weight:300;letter-spacing:0.3em;color:rgba(255,255,255,0.22);' +
          'margin-top:0.6rem;text-transform:uppercase;animation:zPulse 2.2s ease infinite;' +
          'position:relative;z-index:1;}' +
        '#_zenoHint{position:absolute;bottom:28px;font-family:"Space Grotesk",sans-serif;' +
          'font-size:0.5rem;letter-spacing:0.22em;color:rgba(255,255,255,0.12);' +
          'text-transform:uppercase;}' +
        /* ── Fraction mode: orange shift ── */
        '._zenoFrac #_zenoPct{color:#FF5C00;text-shadow:0 0 40px rgba(255,92,0,0.32);}' +
        '._zenoFrac #_zenoBar{background:#FF5C00;}';
      document.head.appendChild(s);

      var ov    = document.createElement('div'); ov.id = '_zenoEgg';
      var quote = document.createElement('p');   quote.id = '_zenoQuote';
      var name  = document.createElement('p');   name.id  = '_zenoName';
      var track = document.createElement('div'); track.id = '_zenoTrack';
      var bar   = document.createElement('div'); bar.id   = '_zenoBar';
      var pct   = document.createElement('div'); pct.id   = '_zenoPct';
      var sub   = document.createElement('div'); sub.id   = '_zenoSub';
      var hint  = document.createElement('div'); hint.id  = '_zenoHint';

      quote.textContent = 'That which is in locomotion must arrive at the half-way stage before it arrives at the goal.';
      name.textContent  = '— Zeno of Elea · 490 BC';
      sub.textContent   = 'approaching…';
      hint.textContent  = 'tAP · eSC · cLOSE';
      track.appendChild(bar);
      ov.appendChild(quote); ov.appendChild(name);
      ov.appendChild(track); ov.appendChild(pct);
      ov.appendChild(sub);   ov.appendChild(hint);
      document.body.appendChild(ov);

      /* ── Superscript helper for fraction display ── */
      function toSup(n){
        return String(n).replace(/[0-9]/g, function(c){
          return ['⁰','¹','²','³','⁴','⁵','⁶','⁷','⁸','⁹'][parseInt(c)];
        });
      }

      /* ── Zeno's halving: each step covers half the remaining distance ── */
      var current    = 0;
      var stepIdx    = 0;
      var STEPS      = 35;       /* deep into fraction territory                          */
      var DELAY      = 340;      /* snappy base — paradox builds quickly                  */
      var THRESHOLD  = 99.99999; /* beyond here: switch from % to fraction display       */
      var inFraction = false;

      function fmt(v){ return v.toFixed(v < 10 ? 4 : v < 99 ? 3 : 5) + '%'; }

      function step(){
        if(stopped) return;
        var remaining = 100 - current;
        current += remaining / 2;   /* halve remaining distance */
        stepIdx++;

        bar.style.width = current + '%';

        /* ── Visual paradox: density tick marks on the track ──
           Each step adds a mark at the current position. Marks pile up
           near 100%, making the infinite series visible as increasing density. */
        var tk = document.createElement('div');
        tk.style.cssText = 'position:absolute;left:' + current.toFixed(4) + '%;top:-3px;' +
          'width:1px;height:7px;background:rgba(255,92,0,' + (inFraction ? '0.75' : '0.45') + ');' +
          'transform:translateX(-50%);pointer-events:none;border-radius:1px;';
        track.appendChild(tk);

        /* Enter fraction mode when percentage becomes philosophically absurd */
        if(!inFraction && current > THRESHOLD){
          inFraction = true;
          ov.classList.add('_zenoFrac');
          sub.textContent = '∞  —  approaching';
          /* Make existing tick marks orange when entering fraction mode */
          Array.from(track.querySelectorAll('div')).forEach(function(t){
            t.style.background = 'rgba(255,92,0,0.55)';
          });
        }

        /* Display: % in normal mode, 1/2ⁿ in fraction mode */
        pct.textContent = inFraction
          ? '1/2' + toSup(stepIdx)
          : fmt(current);

        /* Each step takes slightly longer — the paradox deepens */
        if(stepIdx < STEPS){
          timer = setTimeout(step, DELAY + stepIdx * 18);
        } else {
          sub.textContent = 'undefined.';
          sub.style.animationPlayState = 'paused';
          sub.style.opacity = '0.38';
        }
      }

      var stopped = false, timer;
      setTimeout(step, 800);   /* brief pause — let quote breathe before paradox begins */

      function close(){
        stopped = true; clearTimeout(timer);
        ov.style.transition = 'opacity 0.34s ease';
        ov.style.opacity = '0';
        setTimeout(function(){
          if(ov.parentNode) ov.parentNode.removeChild(ov);
          if(s.parentNode)  s.parentNode.removeChild(s);
        }, 380);
      }
      ov.addEventListener('click', close);
      document.addEventListener('keydown', function esc(e){
        if(e.key === 'Escape'){ close(); document.removeEventListener('keydown', esc); }
      });
    }
  })();</script>
