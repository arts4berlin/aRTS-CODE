  <script>
  (function(){
    var form   = document.getElementById('report-form');
    var btn    = document.getElementById('btn-send');
    var errEl  = document.getElementById('err-msg');

    /* Pre-fill email if member is logged in */
    try {
      var storedEmail = localStorage.getItem('arts_email');
      if(storedEmail) document.getElementById('r-email').value = storedEmail;
    } catch(e) {}

    form.addEventListener('submit', async function(e){
      e.preventDefault();
      errEl.textContent = '';

      var email = document.getElementById('r-email').value.trim();
      var cat   = document.getElementById('r-category').value;
      var msg   = document.getElementById('r-msg').value.trim();

      if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
        errEl.textContent = '— vALID eMAIL rEQUIRED'; return;
      }
      if(!cat)   { errEl.textContent = '— sELECT a cATEGORY'; return; }
      if(!msg)   { errEl.textContent = '— dESCRIBE tHE iSSUE'; return; }

      btn.disabled    = true;
      btn.textContent = 'sENDING\u2026';
      form.style.opacity = '0.4';
      form.style.pointerEvents = 'none';

      try {
        /* TODO: Replace with your Formspree endpoint for arts4berlin@outlook.com */
        var res = await fetch('https://formspree.io/f/xaqpqzea', {
          method:  'POST',
          headers: { 'Accept': 'application/json' },
          body:    new FormData(form)
        });

        if(res.ok){
          /* Award moderation XP */
          try {
            if(localStorage.getItem('arts_id_hash')){
              var cur=parseInt(localStorage.getItem('arts_points')||'0',10);
              localStorage.setItem('arts_points',String(cur+50));
              var pending=JSON.parse(sessionStorage.getItem('arts_xp_pending')||'[]');
              pending.push({label:'mODERATION',pts:50});
              sessionStorage.setItem('arts_xp_pending',JSON.stringify(pending));
            }
          } catch(xpe){}
          var wrap = document.getElementById('report-form-wrap');
          wrap.style.transition = 'opacity 0.22s ease';
          wrap.style.opacity = '0';
          setTimeout(function(){
            wrap.hidden = true;
            var suc = document.getElementById('success');
            suc.style.opacity = '0';
            suc.style.display = 'flex';
            requestAnimationFrame(function(){
              requestAnimationFrame(function(){ suc.style.opacity = '1'; });
            });
          }, 240);
        } else {
          errEl.textContent = '— sEND fAILED \u00b7 tRY aGAIN';
          btn.disabled    = false;
          btn.textContent = 'sEND rEPORT';
          form.style.opacity = '1';
          form.style.pointerEvents = '';
        }
      } catch(err){
        errEl.textContent = '— nETWORK eRROR \u00b7 cHECK cONNECTION';
        btn.disabled    = false;
        btn.textContent = 'sEND rEPORT';
        form.style.opacity = '1';
        form.style.pointerEvents = '';
      }
    });
  })();

  <!-- Nav & logo hover -->
  <script>
  (function(){
    var DELAY=40;
    function navHover(el){
      var orig=el.textContent,timers=[],state=0;
      function clr(){timers.forEach(clearTimeout);timers.length=0;}
      function render(n){var s=orig[0];for(var i=1;i<orig.length;i++)s+=(i<=n?orig[i].toLowerCase():orig[i]);el.textContent=s;}
      el.addEventListener('mouseenter',function(){clr();var from=state;for(var i=0;i<orig.length-1-from;i++)(function(i){timers.push(setTimeout(function(){render(state=from+i+1);},i*DELAY));})(i);});
      el.addEventListener('mouseleave',function(){clr();var from=state;for(var i=0;i<from;i++)(function(i){timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));})(i);});
    }
    document.querySelectorAll('nav a').forEach(navHover);
    document.querySelectorAll('a.logo[data-inner]').forEach(function(logo){
      var inner=logo.dataset.inner,timers=[],state=0;
      function clr(){timers.forEach(clearTimeout);timers.length=0;}
      function render(n){logo.textContent='[a'+inner.slice(0,n)+']';}
      logo.addEventListener('mouseenter',function(){clr();var from=state;for(var i=from;i<inner.length;i++)(function(i){timers.push(setTimeout(function(){render(state=i+1);},(i-from)*DELAY));})(i);});
      logo.addEventListener('mouseleave',function(){clr();var from=state;for(var i=0;i<from;i++)(function(i){timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));})(i);});
    });
  })();
  </script>

  <!-- Mobile burger menu -->

    if(!burger||!overlay)return;
    burger.addEventListener('click',function(){overlay.classList.add('is-open');});
    close.addEventListener('click',function(){overlay.classList.remove('is-open');});
    overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.classList.remove('is-open');});
  })();
  </script>
