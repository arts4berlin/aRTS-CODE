  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .site-logo {
      position: fixed;
      top: 28px; left: 32px;
      z-index: 100;
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .nav-about {
      position: fixed;
      top: 28px; right: 32px;
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    .nav-about:hover { opacity: 1; }

    /* ── Label row ── */
    .label-row {
      display: flex;
      gap: clamp(0.6rem, 2vw, 1.2rem);
      align-items: baseline;
      margin-bottom: clamp(2rem, 5vh, 4rem);
      opacity: 0;
      animation: fadeUp 0.7s ease 0.1s forwards;
    }

    .label {
      font-size: clamp(1.1rem, 3vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.14em;
      color: #fff;
    }

    /* ── Bear grin ── */
    .bear-wrap {
      width: clamp(180px, 46vw, 420px);
      opacity: 0;
      animation: fadeUp 0.75s cubic-bezier(0.34, 1.56, 0.64, 1) 0.28s forwards;
    }

    .bear-wrap img {
      width: 100%;
      height: auto;
      filter: brightness(0) invert(1);
      display: block;
    }

    /* ── Hint ── */
    .hint {
      margin-top: clamp(1rem, 2.5vh, 2rem);
      font-size: clamp(0.65rem, 1.5vw, 0.82rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.28);
      opacity: 0;
      animation: fadeUp 0.6s ease 0.55s forwards;
    }

    /* ── Back button ── */
    .btn-back {
      margin-top: clamp(1.6rem, 3.5vh, 3rem);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: clamp(180px, 38vw, 300px);
      height: clamp(48px, 8vh, 72px);
      border: 2px solid #FF5C00;
      border-radius: 4px;
      background: transparent;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.8rem, 2vw, 1rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-decoration: none;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.18s, color 0.18s;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.8s forwards;
    }
    .btn-back:hover { background: #FF5C00; color: #000; }

    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0);    }
    }

    /* ── dvh fix ── */
    @supports (height: 100dvh) {
      body { height: 100dvh; }
    }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; background: #000; }
    .btn, button, a { touch-action: manipulation; }

    /* ── Global: no text selection; no double-tap zoom (pinch zoom kept) ── */
    * { -webkit-user-select: none; user-select: none; }
    input, textarea, select, [contenteditable] { -webkit-user-select: text; user-select: text; }
    html { touch-action: manipulation; }

    /* ── Day mode ── */
    html[data-theme="day"] { background: #fff; }
    [data-theme="day"] body { background: #fff; color: #000; }
    [data-theme="day"] .site-logo { color: #000; }
    [data-theme="day"] .nav-about { color: #000; }
    [data-theme="day"] .label { color: #000; }
    [data-theme="day"] .hint { color: rgba(0,0,0,0.48); }
    [data-theme="day"] .btn-back { color: #000; }
    [data-theme="day"] .btn-back:hover { background: #FF5C00; color: #fff; }
    [data-theme="day"] .bear-wrap img { filter: brightness(0); }

  <!-- Nav & logo hover -->
  <script>
  (function(){
    var DELAY = 40;
    function navHover(el){
      var orig=el.textContent, timers=[], state=0;
      function clr(){ timers.forEach(clearTimeout); timers.length=0; }
      function render(n){
        var s=orig[0];
        for(var i=1;i<orig.length;i++) s+=(i<=n ? orig[i].toLowerCase() : orig[i]);
        el.textContent=s;
      }
      el.addEventListener('mouseenter',function(){
        clr(); var from=state;
        for(var i=0;i<orig.length-1-from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from+i+1);},i*DELAY));
        })(i);
      });
      el.addEventListener('mouseleave',function(){
        clr(); var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    }
    document.querySelectorAll('a.nav-about').forEach(navHover);
logo.addEventListener('mouseleave',function(){
        clr(); var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    });
  })();
  </script>
