  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
    }

    /* ── Fixed header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 26px 32px;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 60%, transparent);
    }

    .logo {
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 2.4rem;
    }

    nav a {
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      opacity: 0.85;
      transition: opacity 0.15s;
    }
    nav a:hover { opacity: 1; }
    nav a.active { opacity: 1; font-weight: 600; }

    /* ── Main column ── */
    main {
      padding-top: clamp(78px, 12vh, 110px);
      padding-bottom: clamp(80px, 10vh, 130px);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .art-col {
      width: min(92vw, 680px);
      display: flex;
      flex-direction: column;
    }

    /* Piece index label */
    .piece-index {
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      margin-bottom: clamp(14px, 2.2vh, 22px);
    }

    /* Artwork image */
    .piece-img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Title block sits right below image */
    .title-block {
      margin-top: clamp(28px, 4vh, 44px);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
    }

    .piece-title {
      font-size: clamp(2.2rem, 6.5vw, 3.8rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      line-height: 1;
      color: #fff;
    }

    .piece-year {
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.26em;
      color: rgba(255,255,255,0.22);
      text-transform: uppercase;
      align-self: center;
      flex-shrink: 0;
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: clamp(28px, 4vh, 48px) 0;
    }

    /* Price block */
    .price-block {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .price {
      font-size: clamp(1.9rem, 6.5vw, 3.8rem);
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #fff;
      line-height: 1;
    }
    .price .euro { color: #FF5C00; }

    .status {
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      color: rgba(255,255,255,0.32);
      text-transform: uppercase;
      align-self: center;
    }

    /* Inquiry buttons */
    .inquiry-row {
      margin-top: clamp(28px, 4vh, 48px);
      display: flex;
      align-items: stretch;
    }

    .btn-inq {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.82rem, 2.2vw, 0.98rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-decoration: none;
      padding: 0.85rem clamp(1.4rem, 4vw, 2.6rem);
      border: 2px solid #fff;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn-inq:first-child { border-radius: 4px 0 0 4px; border-right: 1px solid rgba(255,255,255,0.25); }
    .btn-inq:last-child  { border-radius: 0 4px 4px 0; border-left: none; }
    .btn-inq-fill  { background: #fff; color: #000; }
    .btn-inq-fill:hover  { background: #FF5C00; border-color: #FF5C00; color: #000; }
    .btn-inq-ghost { background: transparent; color: #fff; }
    .btn-inq-ghost:hover { background: #fff; color: #000; }

    /* Add art link */
    .add-art-link {
      margin-top: clamp(16px, 2.2vh, 26px);
      text-align: right;
    }
    .add-art-link a {
      font-size: 0.64rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      color: #FF5C00;
      text-decoration: none;
      transition: color 0.15s;
    }
    .add-art-link a:hover { color: #ff7a2e; }

    /* ── Multi-piece gallery: section separator ── */
    .piece-section + .piece-section {
      margin-top: clamp(70px, 11vh, 130px);
      padding-top: clamp(50px, 8vh, 100px);
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    /* Loading / empty states */
    .art-state {
      width: min(92vw, 680px);
      padding-top: clamp(78px, 12vh, 110px);
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      color: rgba(255,255,255,0.2);
    }

    /* ── Mobile ── */
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; background: #000; }
    header, nav, a, button { touch-action: manipulation; }

    @media (max-width: 520px) {
      header { padding: 18px 16px; }
      nav    { gap: clamp(0.7rem, 3.5vw, 1.4rem); }
      nav a  { font-size: clamp(0.7rem, 2.2vw, 0.85rem); }
    }
  
    /* ── Global: no text selection; no double-tap zoom (pinch zoom kept) ── */
    * { -webkit-user-select: none; user-select: none; }
    input, textarea, select, [contenteditable] { -webkit-user-select: text; user-select: text; }
    html { touch-action: manipulation; }
</style>

<body>

  <script>(function(){document.documentElement.style.background='#000';if(!sessionStorage.getItem('crt_transition'))return;document.documentElement.style.clipPath='inset(50% 0 50% 0)';})()</script>

  <main id="art-main">
    <!-- Pieces injected by JS from data/pieces.json -->

  <!-- Dynamic piece renderer -->
  <script>
  (function(){
    function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function renderPiece(p, idx, total){
      var priceHtml = p.price && p.price !== '—'
        ? esc(p.price) + ' <span class="euro">' + esc(p.currency || '€') + '</span>'
        : '<span style="opacity:0.4">—</span>';
      var mediaRow = p.media
        ? '<p class="piece-index" style="margin-top:clamp(14px,2vh,22px);letter-spacing:.2em;opacity:.18">'+ esc(p.media) +'</p>'
        : '';
      return [
        '<div class="art-col piece-section">',
          '<p class="piece-index">aRT #'+ esc(String(p.id).padStart(3,'0')) +'</p>',
          p.image
            ? '<img class="piece-img" src="'+ esc(p.image) +'" alt="'+ esc(p.title) +' — [aRTS]"'+(idx===0?' fetchpriority="high"':' loading="lazy"')+'>'
            : '<div class="piece-img" style="background:rgba(255,255,255,.04);aspect-ratio:4/3"></div>',
          '<div class="title-block">',
            '<h1 class="piece-title">'+ esc(p.title) +'</h1>',
            '<span class="piece-year">'+ esc(p.year || '') +'</span>',
          '</div>',
          mediaRow,
          '<div class="divider"></div>',
          '<div class="price-block">',
            '<span class="price">'+ priceHtml +'</span>',
            '<span class="status">'+ esc(p.status || 'aVAILABLE') +'</span>',
          '</div>',
          '<div class="inquiry-row">',
            '<a href="inquire.html?piece=' + encodeURIComponent(p.title) + '" class="btn-inq btn-inq-fill">iNQUiRE</a>',
            '<a href="assets.html" class="btn-inq btn-inq-ghost">BaCK</a>',
          '</div>',
          (idx === total - 1)
            ? '<p class="add-art-link"><a href="add.html">+ aDD yOUR aRT</a></p>'
            : '',
        '</div>'
      ].join('');
    }

    fetch('data/pieces.json?v=' + Date.now())
      .then(function(r){ return r.ok ? r.json() : Promise.reject(r.status); })
      .then(function(pieces){
        var main  = document.getElementById('art-main');
        var shown = pieces.filter(function(p){ return p.status !== 'pENDING'; });
        if (!shown.length) {
          main.innerHTML = '<p class="art-state">nO piECES yET — <a href="add.html" style="color:#FF5C00;text-decoration:none">+ aDD yOURS</a></p>';
          return;
        }
        main.innerHTML = shown.map(function(p, i){ return renderPiece(p, i, shown.length); }).join('');
        bindEuroScramble(main);
      })
      .catch(function(){
        /* Fallback to hardcoded piece if JSON unavailable */
        var main = document.getElementById('art-main');
        main.innerHTML = renderPiece({id:'000',title:'pIETRO',year:'2025',price:'88.888.888',currency:'€',status:'aVAILABLE',image:'assets/piece-001.jpg',media:'pLASTER · mOUNTED cANVAS · fLOATING fRAME'}, 0, 1);
        bindEuroScramble(main);
      });

    /* ── € hover: scramble through world currencies, return to € ── */
    function bindEuroScramble(container){
      var CURRENCIES = ['¥','£','$','₿','₽','¢','₩','₺','₴','₦','₫','₱','฿','₸','₾','﷼','₡'];
      var FRAMES = 14, RATE = 42;
      container.addEventListener('mouseover', function(e){
        var el = e.target.closest('.euro');
        if (!el || el._scrambling) return;
        el._scrambling = true;
        var step = 0;
        var t = setInterval(function(){
          if (step < FRAMES - 1){
            el.textContent = CURRENCIES[Math.floor(Math.random() * CURRENCIES.length)];
          } else {
            el.textContent = '€';
            el._scrambling = false;
            clearInterval(t);
          }
          step++;
        }, RATE);
      });
    }
  })();
  </script>

  <script>
    (function () {
      function reveal() {
        var c = document.createElement('div');
        c.style.cssText = 'position:fixed;inset:0;background:#000;z-index:99998;pointer-events:none;opacity:1;';
        document.body.appendChild(c);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            c.style.transition = 'opacity 0.22s ease';
            c.style.opacity    = '0';
            setTimeout(function () { if (c.parentNode) c.parentNode.removeChild(c); }, 320);
          });
        });
      }
      window.addEventListener('pageshow', function (e) { if (e.persisted) reveal(); });
    })();
  </script>

  <!-- CRT channel-change transition -->
  <script>
  (function(){
    var scan=null,vig=null,busy=false;
    function mkL(){
      if(scan)return;
      scan=document.createElement('div');
      scan.style.cssText='position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,14,0,0.50) 3px,rgba(0,14,0,0.50) 4px);opacity:0;z-index:99997;pointer-events:none;';
      vig=document.createElement('div');
      vig.style.cssText='position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,0.88) 100%);opacity:0;z-index:99996;pointer-events:none;';
      document.body.appendChild(scan);
      document.body.appendChild(vig);
    }
    function lerp(a,b,t){return a+(b-a)*t;}
    function easeOut3(t){return 1-Math.pow(1-Math.min(1,Math.max(0,t)),3);}
    function smooth(t){var c=Math.min(1,Math.max(0,t));return c*c*(3-2*c);}

    function doEnter(){
      mkL();
      var T1=130,T2=780,T3=1150,s0=null;
      function run(ts){
        if(!s0)s0=ts;
        var e=ts-s0;
        if(e<T1){
          scan.style.opacity=String(lerp(0,1,e/T1));
          vig.style.opacity='0.95';
        }else if(e<T2){
          var t=(e-T1)/(T2-T1),p=lerp(50,0,easeOut3(t));
          document.documentElement.style.clipPath='inset('+p.toFixed(2)+'% 0 '+p.toFixed(2)+'% 0)';
          scan.style.opacity='1';
          vig.style.opacity=String(lerp(0.95,0.55,easeOut3(t)));
        }else if(e<T3){
          var t2=(e-T2)/(T3-T2),et=smooth(t2);
          document.documentElement.style.clipPath='';
          scan.style.opacity=String(lerp(1,0,et));
          vig.style.opacity=String(lerp(0.55,0,et));
        }else{
          document.documentElement.style.clipPath='';
          if(scan&&scan.parentNode)scan.parentNode.removeChild(scan);
          if(vig&&vig.parentNode)vig.parentNode.removeChild(vig);
          scan=null;vig=null;busy=false;return;
        }
        requestAnimationFrame(run);
      }
      requestAnimationFrame(run);
    }

    function doExit(dest){
      if(busy)return;busy=true;
      mkL();
      var TR=60,TS=320,s0=null;
      function run(ts){
        if(!s0)s0=ts;
        var e=ts-s0;
        if(e<TR){
          scan.style.opacity=String(lerp(0,1,e/TR));
          vig.style.opacity=String(lerp(0,0.95,e/TR));
        }else if(e<TR+TS){
          var t=(e-TR)/TS,p=lerp(0,50,smooth(t));
          document.documentElement.style.clipPath='inset('+p.toFixed(2)+'% 0 '+p.toFixed(2)+'% 0)';
          scan.style.opacity='1';
          vig.style.opacity='0.95';
        }else{
          document.documentElement.style.clipPath='inset(50% 0 50% 0)';
          document.documentElement.style.background='#000';
          document.body.style.background='#000';
          sessionStorage.setItem('crt_transition','1');
          window.location.href=dest;
          return;
        }
        requestAnimationFrame(run);
      }
      requestAnimationFrame(run);
    }

    if(sessionStorage.getItem('crt_transition')){
      sessionStorage.removeItem('crt_transition');
      doEnter();
    }

    document.addEventListener('click',function(ev){
      var a=ev.target.closest('a[href]');
      if(!a)return;
      var h=a.getAttribute('href');
      if(!h||h.charAt(0)==='#'||/^(https?:|mailto:|tel:|\/\/)/.test(h))return;
      if(ev.metaKey||ev.ctrlKey||ev.shiftKey||ev.altKey)return;
      ev.preventDefault();
      doExit(h);
    },true);
  })();
  </script>

  <!-- Nav & logo hover -->
  <script>
  (function(){
    var DELAY = 40;
    function navHover(el){
      var orig = el.textContent;
      var timers=[], state=0;
      function clr(){ timers.forEach(clearTimeout); timers.length=0; }
      function render(n){
        var s=orig[0];
        for(var i=1;i<orig.length;i++) s+=(i<=n ? orig[i].toLowerCase() : orig[i]);
        el.textContent=s;
      }
      el.addEventListener('mouseenter',function(){
        clr(); var from=state;
        for(var i=0;i<orig.length-1-from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from+i+1);},i*DELAY));
        })(i);
      });
      el.addEventListener('mouseleave',function(){
        clr(); var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    }
    document.querySelectorAll('nav a, a.nav-about').forEach(navHover);
    document.querySelectorAll('a.logo[data-inner]').forEach(function(logo){
      var inner=logo.dataset.inner;
      var timers=[], state=0;
      function clr(){ timers.forEach(clearTimeout); timers.length=0; }
      function render(n){ logo.textContent='[a'+inner.slice(0,n)+']'; }
      logo.addEventListener('mouseenter',function(){
        clr(); var from=state;
        for(var i=from;i<inner.length;i++)(function(i){
          timers.push(setTimeout(function(){render(state=i+1);},(i-from)*DELAY));
        })(i);
      });
      logo.addEventListener('mouseleave',function(){
        clr(); var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    });
  })();
  </script>
