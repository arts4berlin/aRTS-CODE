<!DOCTYPE html>
<html lang="en">
<head>

  <script>
    document.documentElement.style.background = '#000';

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 26px 32px;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(0,0,0,0.92) 60%, transparent);
    }
    .logo {
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1;
    }
    nav { display: flex; align-items: center; gap: 2.4rem; }
    nav a {
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      opacity: 0.85;
      transition: opacity 0.15s;
    }
    nav a:hover { opacity: 1; }

    /* ── Main ── */
    main {
      padding-top: clamp(88px, 13vh, 120px);
      padding-bottom: clamp(80px, 10vh, 130px);
      padding-left: clamp(16px, 4vw, 48px);
      padding-right: clamp(16px, 4vw, 48px);
    }

    /* ── Section header ── */
    .listing-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: clamp(28px, 4vh, 48px);
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }
    .listing-label {
      font-size: 0.64rem;
      font-weight: 300;
      letter-spacing: 0.32em;
      color: rgba(255,255,255,0.22);
      text-transform: uppercase;
    }
    .listing-count {
      font-size: 0.64rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      color: rgba(255,92,0,0.55);
    }

    /* ── Grid ── */
    .art-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 380px), 1fr));
      gap: clamp(20px, 3vw, 36px);
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .piece-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,92,0,0.18);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
      position: relative;
    }
    .piece-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,92,0,0.055) 0%, transparent 65%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s;
    }
    .piece-card:hover {
      border-color: rgba(255,92,0,0.48);
      box-shadow:
        0 0 0 1px rgba(255,92,0,0.10),
        0 0 36px rgba(255,92,0,0.10),
        0 8px 32px rgba(0,0,0,0.55);
      transform: translateY(-3px);
    }
    .piece-card:hover::before { opacity: 1; }

    /* ── Image ── */
    .card-img-wrap {
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: rgba(255,255,255,0.03);
      border-radius: 14px 14px 0 0;
      position: relative;
    }
    .card-img-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 55%, rgba(0,0,0,0.55) 100%);
    }
    .piece-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .piece-card:hover .piece-img { transform: scale(1.04); }

    /* ── Card body ── */
    .card-body {
      padding: clamp(18px, 3vh, 26px) clamp(18px, 3vw, 26px);
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: clamp(10px, 1.5vh, 16px);
    }

    .card-index {
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.30em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
    }

    .card-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      line-height: 1;
      color: #fff;
    }

    .card-media {
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.22);
      line-height: 1.6;
    }

    .card-rule {
      height: 1px;
      background: rgba(255,92,0,0.12);
      margin: 4px 0;
    }

    .card-price-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .card-price {
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.03em;
      line-height: 1;
    }
    .card-price .euro { color: #FF5C00; }
    .card-status {
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.26em;
      color: rgba(255,255,255,0.30);
      text-transform: uppercase;
      align-self: center;
    }
    .card-status.sold {
      color: rgba(255,92,0,0.5);
    }

    /* ── Buttons ── */
    .card-actions {
      display: flex;
      gap: 0;
      margin-top: auto;
    }
    .btn-inq {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.72rem, 1.8vw, 0.86rem);
      font-weight: 700;
      letter-spacing: 0.16em;
      text-decoration: none;
      padding: 0.8rem 1rem;
      border: 1.5px solid rgba(255,255,255,0.18);
      transition: background 0.18s, color 0.18s, border-color 0.18s;
    }
    .btn-inq:first-child {
      border-radius: 8px 0 0 8px;
      border-right: none;
    }
    .btn-inq:last-child  {
      border-radius: 0 8px 8px 0;
    }
    .btn-inq:only-child  {
      border-radius: 8px;
    }
    .btn-inq-fill  { background: #FF5C00; border-color: #FF5C00; color: #000; }
    .btn-inq-fill:hover  { background: #fff; border-color: #fff; color: #000; }
    .btn-inq-ghost { background: transparent; color: rgba(255,255,255,0.6); }
    .btn-inq-ghost:hover { background: rgba(255,255,255,0.07); color: #fff; border-color: rgba(255,255,255,0.38); }

    /* ── Add art link ── */
    .add-row {
      max-width: 1200px;
      margin: clamp(28px, 4vh, 48px) auto 0;
      text-align: right;
    }
    .add-row a {
      font-size: 0.64rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      color: rgba(255,92,0,0.55);
      text-decoration: none;
      transition: color 0.15s;
    }
    .add-row a:hover { color: #FF5C00; }

    /* ── Loading / empty ── */
    .art-state {
      max-width: 1200px;
      margin: 0 auto;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      color: rgba(255,255,255,0.2);
    }

    /* ── Mobile ── */
    @media (max-width: 520px) {
      header { padding: 18px 16px; }
      nav    { gap: clamp(0.7rem, 3.5vw, 1.4rem); }
      nav a  { font-size: clamp(0.7rem, 2.2vw, 0.85rem); }
    }

    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; background: #000; }
    * { -webkit-user-select: none; user-select: none; }
    input, textarea, select, [contenteditable] { -webkit-user-select: text; user-select: text; }
    html { touch-action: manipulation; }
    header, nav, a, button { touch-action: manipulation; }
  </style>
</head>
<body>
  <script>(function(){document.documentElement.style.background='#000';if(!sessionStorage.getItem('crt_transition'))return;document.documentElement.style.clipPath='inset(50% 0 50% 0)';})()</script>

  <header>
    <a href="home.html" class="logo" data-inner="RTS">[a]</a>
    <nav>
      <a href="about.html">aBOUT</a>
      <a href="articles.html">aRTICLES</a>
      <a href="ask.html">cONNECT</a>
      <a href="work.html">wORK</a>
    </nav>
  </header>

  <main id="art-main">
    <p class="art-state" id="art-loading">LOADING…</p>
  </main>

  <script>
  (function(){
    function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function renderGrid(pieces){
      var shown = pieces.filter(function(p){ return p.status !== 'pENDING'; });
      if (!shown.length) {
        return '<p class="art-state">nO piECES yET — <a href="add.html" style="color:#FF5C00;text-decoration:none">+ aDD yOURS</a></p>';
      }

      var cards = shown.map(function(p, i){
        var isSold = /sold|nOT aVAILABLE/i.test(p.status || '');
        var priceHtml = p.price && p.price !== '—'
          ? esc(p.price) + ' <span class="euro">' + esc(p.currency || '€') + '</span>'
          : '<span style="opacity:0.3">—</span>';
        var imgHtml = p.image
          ? '<img class="piece-img" src="'+ esc(p.image) +'" alt="'+ esc(p.title) +'" '+(i===0?'fetchpriority="high"':'loading="lazy"')+'>'
          : '<div class="piece-img" style="background:rgba(255,255,255,.04);height:100%"></div>';
        var mediaHtml = p.media
          ? '<p class="card-media">'+ esc(p.media) +'</p>'
          : '';
        var inquireHref = 'inquire.html?piece=' + encodeURIComponent(p.title);

        return [
          '<div class="piece-card">',
            '<div class="card-img-wrap">'+ imgHtml +'</div>',
            '<div class="card-body">',
              '<p class="card-index">aRT #'+ esc(String(p.id).padStart(3,'0')) +' · '+ esc(p.year||'') +'</p>',
              '<h2 class="card-title">'+ esc(p.title) +'</h2>',
              mediaHtml,
              '<div class="card-rule"></div>',
              '<div class="card-price-row">',
                '<span class="card-price">'+ priceHtml +'</span>',
                '<span class="card-status'+(isSold?' sold':'')+'">'+esc(p.status||'aVAILABLE')+'</span>',
              '</div>',
              '<div class="card-actions">',
                isSold
                  ? '<a href="'+ inquireHref +'" class="btn-inq btn-inq-ghost" style="border-radius:8px">iNQUiRE</a>'
                  : '<a href="'+ inquireHref +'" class="btn-inq btn-inq-fill">iNQUiRE</a><a href="ask.html" class="btn-inq btn-inq-ghost">cONNECT</a>',
              '</div>',
            '</div>',
          '</div>'
        ].join('');
      }).join('');

      return [
        '<div class="listing-header">',
          '<span class="listing-label">aRT LiSTiNG</span>',
          '<span class="listing-count">'+ shown.length +' piECE'+(shown.length!==1?'S':'')+'</span>',
        '</div>',
        '<div class="art-grid" id="art-grid">'+ cards +'</div>',
        '<div class="add-row"><a href="add.html">+ aDD yOUR aRT</a></div>'
      ].join('');
    }

    var FALLBACK = [{id:'000',title:'pIETRO',year:'2025',price:'88.888.888',currency:'€',status:'aVAILABLE',image:'assets/piece-001.jpg',media:'pLASTER · mOUNTED cANVAS · fLOATING fRAME'}];

    fetch('data/pieces.json?v=' + Date.now())
      .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(pieces){
        var main = document.getElementById('art-main');
        main.innerHTML = renderGrid(pieces);
        bindEuroScramble(main);
      })
      .catch(function(){
        var main = document.getElementById('art-main');
        main.innerHTML = renderGrid(FALLBACK);
        bindEuroScramble(main);
      });

    /* ── € hover: scramble through world currencies ── */
    function bindEuroScramble(container){
      var CURRENCIES = ['¥','£','$','₿','₽','¢','₩','₺','₴','₦','₫','₱','฿','₸','₾','﷼','₡'];
      var FRAMES = 14, RATE = 42;
      container.addEventListener('mouseover', function(e){
        var el = e.target.closest('.euro');
        if (!el || el._sc) return;
        el._sc = true;
        var step = 0;
        var t = setInterval(function(){
          el.textContent = step < FRAMES-1
            ? CURRENCIES[Math.floor(Math.random()*CURRENCIES.length)]
            : '€';
          if (++step >= FRAMES){ clearInterval(t); el._sc=false; }
        }, RATE);
      });
    }
  })();
  </script>

  <script>
  (function(){
    function reveal(){
      var c=document.createElement('div');
      c.style.cssText='position:fixed;inset:0;background:#000;z-index:99998;pointer-events:none;opacity:1;';
      document.body.appendChild(c);
      requestAnimationFrame(function(){requestAnimationFrame(function(){
        c.style.transition='opacity 0.22s ease';c.style.opacity='0';
        setTimeout(function(){if(c.parentNode)c.parentNode.removeChild(c);},320);
      });});
    }
    window.addEventListener('pageshow',function(e){if(e.persisted)reveal();});
  })();
  </script>

  <script>
  (function(){
    var scan=null,vig=null,busy=false;
    function mkL(){
      if(scan)return;
      scan=document.createElement('div');
      scan.style.cssText='position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,14,0,0.50) 3px,rgba(0,14,0,0.50) 4px);opacity:0;z-index:99997;pointer-events:none;';
      vig=document.createElement('div');
      vig.style.cssText='position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,0.88) 100%);opacity:0;z-index:99996;pointer-events:none;';
      document.body.appendChild(scan);document.body.appendChild(vig);
    }
    function lerp(a,b,t){return a+(b-a)*t;}
    function easeOut3(t){return 1-Math.pow(1-Math.min(1,Math.max(0,t)),3);}
    function smooth(t){var c=Math.min(1,Math.max(0,t));return c*c*(3-2*c);}
    function doEnter(){
      mkL();var T1=130,T2=780,T3=1150,s0=null;
      function run(ts){
        if(!s0)s0=ts;var e=ts-s0;
        if(e<T1){scan.style.opacity=String(lerp(0,1,e/T1));vig.style.opacity='0.95';}
        else if(e<T2){var t=(e-T1)/(T2-T1),p=lerp(50,0,easeOut3(t));document.documentElement.style.clipPath='inset('+p.toFixed(2)+'% 0 '+p.toFixed(2)+'% 0)';scan.style.opacity='1';vig.style.opacity=String(lerp(0.95,0.55,easeOut3(t)));}
        else if(e<T3){var t2=(e-T2)/(T3-T2),et=smooth(t2);document.documentElement.style.clipPath='';scan.style.opacity=String(lerp(1,0,et));vig.style.opacity=String(lerp(0.55,0,et));}
        else{document.documentElement.style.clipPath='';if(scan&&scan.parentNode)scan.parentNode.removeChild(scan);if(vig&&vig.parentNode)vig.parentNode.removeChild(vig);scan=null;vig=null;busy=false;return;}
        requestAnimationFrame(run);
      }
      requestAnimationFrame(run);
    }
    function doExit(dest){
      if(busy)return;busy=true;mkL();
      var TR=60,TS=320,s0=null;
      function run(ts){
        if(!s0)s0=ts;var e=ts-s0;
        if(e<TR){scan.style.opacity=String(lerp(0,1,e/TR));vig.style.opacity=String(lerp(0,0.95,e/TR));}
        else if(e<TR+TS){var t=(e-TR)/TS,p=lerp(0,50,smooth(t));document.documentElement.style.clipPath='inset('+p.toFixed(2)+'% 0 '+p.toFixed(2)+'% 0)';scan.style.opacity='1';vig.style.opacity='0.95';}
        else{document.documentElement.style.clipPath='inset(50% 0 50% 0)';document.documentElement.style.background='#000';document.body.style.background='#000';sessionStorage.setItem('crt_transition','1');window.location.href=dest;return;}
        requestAnimationFrame(run);
      }
      requestAnimationFrame(run);
    }
    if(sessionStorage.getItem('crt_transition')){sessionStorage.removeItem('crt_transition');doEnter();}
    document.addEventListener('click',function(ev){
      var a=ev.target.closest('a[href]');if(!a)return;
      var h=a.getAttribute('href');
      if(!h||h.charAt(0)==='#'||/^(https?:|mailto:|tel:|\/\/)/.test(h))return;
      if(ev.metaKey||ev.ctrlKey||ev.shiftKey||ev.altKey)return;
      ev.preventDefault();doExit(h);
    },true);
  })();
  </script>

  <script>
  (function(){
    var DELAY=40;
    function navHover(el){
      var orig=el.textContent,timers=[],state=0;
      function clr(){timers.forEach(clearTimeout);timers.length=0;}
      function render(n){var s=orig[0];for(var i=1;i<orig.length;i++)s+=(i<=n?orig[i].toLowerCase():orig[i]);el.textContent=s;}
      el.addEventListener('mouseenter',function(){clr();var from=state;for(var i=0;i<orig.length-1-from;i++)(function(i){timers.push(setTimeout(function(){render(state=from+i+1);},i*DELAY));})(i);});
      el.addEventListener('mouseleave',function(){clr();var from=state;for(var i=0;i<from;i++)(function(i){timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));})(i);});
    }
    document.querySelectorAll('nav a').forEach(navHover);
    document.querySelectorAll('a.logo[data-inner]').forEach(function(logo){
      var inner=logo.dataset.inner,timers=[],state=0;
      function clr(){timers.forEach(clearTimeout);timers.length=0;}
      function render(n){logo.textContent='[a'+inner.slice(0,n)+']';}
      logo.addEventListener('mouseenter',function(){clr();var from=state;for(var i=from;i<inner.length;i++)(function(i){timers.push(setTimeout(function(){render(state=i+1);},(i-from)*DELAY));})(i);});
      logo.addEventListener('mouseleave',function(){clr();var from=state;for(var i=0;i<from;i++)(function(i){timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));})(i);});
    });
  })();
  </script>
</body>
