<html lang="en">
<head>

  <link href="assets/fonts/space-grotesk.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Page-specific: art gallery layout ── */
    .add-row {
      max-width: var(--content-max);
      margin: clamp(28px, 4vh, 48px) auto 0;
      text-align: right;
    }
    .add-row a {
      font-size: 0.62rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.22em;
      color: var(--c-accent-muted);
      transition: color var(--dur-fast);
    }
    .add-row a:hover { color: var(--c-accent); }

    .art-state {
      max-width: var(--content-max);
      margin: 0 auto;
      font-size: 0.7rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.28em;
      color: var(--c-text-tertiary);
    }

    /* Bid system layout */
    .bid-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: var(--s-2);
      animation: bidFadeIn 0.22s ease;
    }
    @keyframes bidFadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .bid-input-row {
      display: flex;
      align-items: center;
      gap: 0;
    }
    .bid-currency {
      font-family: var(--font);
      font-size: 1.1rem;
      font-weight: var(--fw-bold);
      padding: 0.6rem 0.7rem 0.6rem 0;
      line-height: 1;
    }
    .bid-input {
      flex: 1;
      font-size: 1.1rem;
      font-weight: var(--fw-semi);
      letter-spacing: 0.04em;
      padding: 0.6rem 0;
    }
    .btn-bid-submit {
      font-size: 0.68rem;
      letter-spacing: 0.16em;
      padding: 0.7rem 1.2rem;
      margin-left: var(--s-3);
      white-space: nowrap;
    }
    .btn-bid-submit:disabled { opacity: 0.3; cursor: default; }

    .bid-back {
      font-size: 0.52rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.22em;
      padding: 0;
      align-self: flex-start;
    }
    .bid-error {
      font-size: 0.54rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.18em;
      min-height: 1em;
    }

    .bid-status-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: var(--s-2);
      animation: bidFadeIn 0.22s ease;
    }
    .bid-current {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .bid-current-label {
      font-size: 0.48rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }
    .bid-current-amount {
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      font-weight: var(--fw-bold);
      letter-spacing: 0.03em;
      line-height: 1;
    }

    .bid-timer-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bid-timer-bar-wrap {
      flex: 1;
      height: 3px;
    }
    .bid-timer-text {
      font-family: var(--font);
      font-size: 0.58rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.22em;
      white-space: nowrap;
    }

    .bid-history {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .bid-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .bid-entry-alias {
      font-size: 0.54rem;
      font-weight: var(--fw-semi);
      letter-spacing: 0.14em;
    }
    .bid-entry-amount {
      font-size: 0.68rem;
      font-weight: var(--fw-bold);
      letter-spacing: 0.06em;
    }
    .bid-entry-time {
      font-size: 0.46rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.18em;
    }

    .bid-actions {
      display: flex;
      gap: 0;
    }
    .bid-actions .btn-inq { flex: 1; }

    .bid-closed-label {
      font-size: 0.54rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.26em;
      text-transform: uppercase;
      text-align: center;
      padding: 6px 0;
    }

    /* Detail actions row */
    .detail-actions {
      display: flex;
      gap: 0;
      margin-top: var(--s-2);
    }
    .detail-actions .btn-inq { flex: 1; }

    /* Favorite button in detail (override shared for inline layout) */
    .detail-actions .btn-fav,
    .bid-actions .btn-fav {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: clamp(0.72rem, 1.8vw, 0.82rem);
      font-weight: var(--fw-bold);
      letter-spacing: 0.14em;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--c-border-hover);
      border-radius: 0;
      flex: 1;
      border-left: none;
    }
    .detail-actions .btn-fav svg,
    .bid-actions .btn-fav svg {
      width: 14px; height: 14px;
      stroke-width: 1.5px;
    }

    /* ── Fav button SVG (theme-aware) ── */
    .btn-fav svg { stroke: rgba(255,255,255,0.5); fill: none; transition: fill var(--dur-fast), stroke var(--dur-fast); }
    .btn-fav.is-fav svg { stroke: #fff; fill: #fff; }
    [data-theme="day"] .btn-fav svg { stroke: rgba(0,0,0,0.35); fill: none; }
    [data-theme="day"] .btn-fav.is-fav svg { stroke: var(--c-accent); fill: var(--c-accent); }

    /* Share button */
    .btn-share {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-family: var(--font);
      font-size: clamp(0.62rem, 1.5vw, 0.72rem);
      font-weight: var(--fw-bold);
      letter-spacing: 0.14em;
      padding: 0.75rem 0.7rem;
      border: 1.5px solid var(--c-border-hover);
      border-radius: 0 var(--r-md) var(--r-md) 0;
      background: transparent;
      color: var(--c-text-tertiary);
      cursor: crosshair;
      transition: background var(--dur-normal), color var(--dur-normal), border-color var(--dur-normal);
      border-left: none;
    }
    .btn-share:hover { background: var(--c-accent-subtle); color: var(--c-text); border-color: var(--c-border-strong); }

    /* Page entrance */
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .site-main > * {
      animation: pageIn 0.5s var(--ease-out) backwards;
    }
    .site-main .listing-header { animation-delay: 0.05s; }
    .site-main .art-grid { animation-delay: 0.12s; }
    .site-main .add-row { animation-delay: 0.18s; }

    /* ── Filter bar ── */
    .filter-bar {
      max-width: var(--content-max);
      margin: 0 auto var(--s-3);
      padding: 0 var(--s-3);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .filter-search {
      position: relative;
      width: 100%;
    }
    .filter-search input {
      width: 100%;
      font-family: var(--font);
      font-size: 0.62rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.18em;
      padding: 10px 14px 10px 32px;
      border: 1px solid var(--c-border);
      border-radius: var(--r-sm);
      background: var(--c-bg-surface);
      color: var(--c-text);
      outline: none;
      transition: border-color var(--dur-fast);
      box-sizing: border-box;
    }
    .filter-search input::placeholder { color: var(--c-text-ghost); }
    .filter-search input:focus { border-color: var(--c-accent); }
    .filter-search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.6rem;
      opacity: 0.3;
      pointer-events: none;
    }
    .filter-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filter-pill {
      font-family: var(--font);
      font-size: 0.44rem;
      font-weight: var(--fw-semi);
      letter-spacing: 0.2em;
      padding: 5px 10px;
      border: 1px solid var(--c-border);
      border-radius: 100px;
      background: transparent;
      color: var(--c-text-tertiary);
      cursor: crosshair;
      transition: all var(--dur-fast);
      white-space: nowrap;
    }
    .filter-pill:hover { border-color: var(--c-border-hover); color: var(--c-text-secondary); }
    .filter-pill.active {
      background: var(--c-accent);
      color: #000;
      border-color: var(--c-accent);
    }
    .filter-group-label {
      font-size: 0.38rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.32em;
      color: var(--c-accent);
      margin-right: 4px;
      text-transform: uppercase;
    }
    .filter-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* ── Load More ── */
    .load-more-row {
      text-align: center;
      padding: var(--s-4) 0 var(--s-2);
    }
    .btn-load-more {
      font-family: var(--font);
      font-size: 0.58rem;
      font-weight: var(--fw-semi);
      letter-spacing: 0.22em;
      padding: 12px 32px;
      border: 1px solid var(--c-border);
      border-radius: var(--r-md);
      background: transparent;
      color: var(--c-text-secondary);
      cursor: crosshair;
      transition: all var(--dur-normal);
    }
    .btn-load-more:hover { border-color: var(--c-accent); color: var(--c-accent); }
    .load-more-count {
      font-size: 0.42rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.18em;
      color: var(--c-text-ghost);
      margin-top: 8px;
    }

    /* ── Seed badge ── */
    .seed-badge {
      position: absolute;
      bottom: 8px;
      left: 8px;
      font-family: var(--font);
      font-size: 0.34rem;
      font-weight: var(--fw-semi);
      letter-spacing: 0.16em;
      padding: 2px 6px;
      border-radius: 2px;
      background: rgba(0,0,0,0.55);
      color: rgba(255,255,255,0.6);
      backdrop-filter: blur(4px);
      pointer-events: none;
    }
    [data-theme="day"] .seed-badge {
      background: rgba(255,255,255,0.7);
      color: rgba(0,0,0,0.45);
    }

    [data-theme="day"] .detail-gallery {
      background: linear-gradient(
        135deg,
        rgba(0,0,0,0.03) 0%,
        rgba(0,0,0,0.01) 50%,
        rgba(0,0,0,0.02) 100%
      );
      border-bottom-color: rgba(0,0,0,0.06);
    }
    [data-theme="day"] .detail-gallery::before {
      background: radial-gradient(
        ellipse at 30% 20%,
        rgba(255,255,255,0.5) 0%,
        transparent 60%
      );
    }
    [data-theme="day"] .detail-gallery img {
      box-shadow: 0 4px 24px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.08);
    }

    /* ── AI metadata in detail ── */
    .detail-ai-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 6px 0 2px;
    }
    .ai-tag {
      font-family: var(--font);
      font-size: 0.4rem;
      font-weight: var(--fw-semi);
      letter-spacing: 0.16em;
      padding: 3px 8px;
      border: 1px solid rgba(255,92,0,0.2);
      border-radius: 100px;
      color: var(--c-accent);
      background: rgba(255,92,0,0.06);
    }
    .detail-ai-desc {
      font-size: 0.52rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.04em;
      line-height: 1.7;
      color: var(--c-text-secondary);
      font-style: italic;
      margin: 4px 0;
    }
    .detail-source-link {
      font-size: 0.4rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.18em;
      color: var(--c-text-ghost);
      text-decoration: none;
      transition: color var(--dur-fast);
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .detail-source-link:hover { color: var(--c-accent); }

    /* ── Day mode ── */
    /* All shared components (piece-card, detail-sheet, bid system, listing-header,
       view-toggle, etc.) already inherit day mode through CSS variable swaps in
       styles.css. Only page-specific overrides that can't use vars go here. */

    /* BUY button: JS renders inline background:var(--c-accent);color:#000 —
       black text on orange accent is correct in both modes, no override needed. */
  </style>
</head>

  <script src="bot-data.js"></script>
  <script>
  (function(){
    function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function getUserPieces() {
      try { return JSON.parse(localStorage.getItem('arts_my_pieces') || '[]'); } catch(e) { return []; }
    }
    function isMember() {
      try { return !!localStorage.getItem('arts_id_hash'); } catch(e) { return false; }
    }

    /* ── Pagination state ── */
    var PAGE_SIZE = 24;
    var _showCount = PAGE_SIZE;
    var _filteredPieces = [];
    var _activeFilters = { search: '', style: '', mood: '', period: '' };

    /* ── Extract unique filter values from seed pieces ── */
    function extractFilterOptions(pieces) {
      var styles = {}, moods = {}, periods = {};
      pieces.forEach(function(p) {
        if (p.ai_style) styles[p.ai_style] = (styles[p.ai_style]||0) + 1;
        if (p.ai_mood) moods[p.ai_mood] = (moods[p.ai_mood]||0) + 1;
        if (p.ai_period) periods[p.ai_period] = (periods[p.ai_period]||0) + 1;
      });
      /* Sort by count desc, take top items */
      function topKeys(obj, max) {
        return Object.keys(obj).sort(function(a,b){ return obj[b]-obj[a]; }).slice(0, max);
      }
      return { styles: topKeys(styles, 8), moods: topKeys(moods, 8), periods: topKeys(periods, 8) };
    }

    /* ── Filter logic ── */
    function applyFilters(pieces) {
      var q = _activeFilters.search.toLowerCase();
      return pieces.filter(function(p) {
        if (p.status === 'pENDING') return false;
        if (q) {
          var hay = (p.title + ' ' + (p.artist||'') + ' ' + (p.media||'') + ' ' + (p.ai_style||'') + ' ' + (p.ai_mood||'') + ' ' + (p.ai_period||'') + ' ' + (p.tags||[]).join(' ')).toLowerCase();
          if (hay.indexOf(q) < 0) return false;
        }
        if (_activeFilters.style && (p.ai_style||'').toLowerCase() !== _activeFilters.style.toLowerCase()) return false;
        if (_activeFilters.mood && (p.ai_mood||'').toLowerCase() !== _activeFilters.mood.toLowerCase()) return false;
        if (_activeFilters.period && (p.ai_period||'').toLowerCase() !== _activeFilters.period.toLowerCase()) return false;
        return true;
      });
    }

    /* ── Render filter bar ── */
    function renderFilterBar(opts) {
      function pills(key, values) {
        if (!values.length) return '';
        var label = key === 'style' ? 'Style' : key === 'mood' ? 'Mood' : 'Period';
        var html = '<div class="filter-row"><span class="filter-group-label">' + label + '</span>';
        values.forEach(function(v) {
          var active = _activeFilters[key] === v ? ' active' : '';
          html += '<button class="filter-pill' + active + '" data-filter-key="' + key + '" data-filter-val="' + esc(v) + '">' + esc(v) + '</button>';
        });
        html += '</div>';
        return html;
      }
      return [
        '<div class="filter-bar" id="filter-bar">',
          '<div class="filter-search">',
            '<span class="filter-search-icon">⌕</span>',
            '<input type="text" id="filter-search-input" placeholder="Search artist, style, medium…" value="' + esc(_activeFilters.search) + '">',
          '</div>',
          '<div class="filter-pills">',
            pills('style', opts.styles),
            pills('mood', opts.moods),
            pills('period', opts.periods),
          '</div>',
        '</div>'
      ].join('');
    }

    function renderCard(p, i) {
      var isSold = /sold|not available/i.test(p.status || '');
      var priceHtml = p.price && p.price !== '—'
        ? esc(p.price) + ' <span class="euro">' + esc(p.currency || '€') + '</span>'
        : '<span style="opacity:0.3">—</span>';
      var imgHtml = p.image
        ? '<img class="piece-img" src="'+ esc(p.image) +'" alt="'+ esc(p.title) +'" '+(i===0?'fetchpriority="high"':'loading="lazy"')+'>'
        : '<div class="piece-img" style="background:var(--c-bg-surface);height:100%"></div>';
      var mediaHtml = p.media
        ? '<p class="card-media">'+ esc(p.media) +'</p>'
        : '';

      /* User listing badge */
      var badgeHtml = p.userListing ? '<span class="user-badge">Your listing</span>' : '';
      /* Seed badge */
      var seedBadge = p.seed ? '<span class="seed-badge">CC0 · ' + esc(p.ai_period || 'Archive') + '</span>' : '';
      /* Bot listing badge — shows seller alias */
      var botBadge = p.bot ? '<span class="seed-badge" style="background:rgba(255,92,0,0.12);color:rgba(255,92,0,0.9);">Listed by ' + esc(p.listed_by_alias || 'bot') + '</span>' : '';

      /* Edit / remove row for user's own pieces */
      var userActionsHtml = p.userListing
        ? '<div class="card-user-actions">' +
            '<button class="btn-user-action btn-edit" data-piece-id="' + esc(p.id) + '">Edit</button>' +
            '<button class="btn-user-action btn-remove" data-piece-id="' + esc(p.id) + '">Remove</button>' +
          '</div>'
        : '';

      return [
        '<div class="piece-card">',
          '<div class="card-img-wrap">'+ badgeHtml + seedBadge + botBadge + imgHtml +'</div>',
          '<div class="card-body">',
            '<p class="card-index">aRT #'+ esc(String(p.id).padStart(3,'0')) +' · '+ esc(p.year||'') +'</p>',
            '<h2 class="card-title">'+ esc(p.title) +'</h2>',
            mediaHtml,
            '<div class="card-rule"></div>',
            '<div class="card-price-row">',
              '<span class="card-price">'+ priceHtml +'</span>',
              '<span class="card-status'+(isSold?' sold':'')+'">'+esc(p.status||'Available')+'</span>',
            '</div>',
            '<div class="card-actions">',
              '<button class="btn-inq btn-inq-fill" style="border-radius:var(--r-md)" data-view-id="'+ esc(p.id) +'">View</button>',
            '</div>',
            userActionsHtml,
          '</div>',
        '</div>'
      ].join('');
    }

    function renderGrid(pieces){
      var shown = pieces.slice(0, _showCount);
      if (!_filteredPieces.length && !_activeFilters.search && !_activeFilters.style && !_activeFilters.mood && !_activeFilters.period) {
        if (!_allPieces.filter(function(p){ return p.status !== 'pENDING'; }).length) {
          return '<p class="art-state">No pieces yet — <a href="add.html" style="color:var(--c-accent);text-decoration:none">+ add yours</a></p>';
        }
      }
      if (!pieces.length) {

          var val = pill.dataset.filterVal;

    /* ── Encrypted favourites (Web Crypto API) ── */
    var FAV_KEY = 'arts_favourites_enc';
    var FAV_SALT = new Uint8Array([97,82,84,83,95,102,97,118,95,115,97,108,116,95,118,49]);

    function _isMember() {
      try { return !!localStorage.getItem('arts_id_hash'); } catch(e) { return false; }
    }

    async function _deriveKey() {
      var hash = localStorage.getItem('arts_id_hash');
      if (!hash) return null;
      var enc = new TextEncoder();
      var keyMaterial = await crypto.subtle.importKey('raw', enc.encode(hash), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: FAV_SALT, iterations: 100000, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['encrypt', 'decrypt']
      );
    }

    async function _encryptFavs(data) {
      var key = await _deriveKey();
      if (!key) return;
      var enc = new TextEncoder();
      var iv = crypto.getRandomValues(new Uint8Array(12));
      var ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, enc.encode(JSON.stringify(data)));
      var buf = new Uint8Array(iv.length + ct.byteLength);
      buf.set(iv); buf.set(new Uint8Array(ct), iv.length);
      localStorage.setItem(FAV_KEY, btoa(String.fromCharCode.apply(null, buf)));
    }

    async function _decryptFavs() {
      var key = await _deriveKey();
      if (!key) return { v: 1, items: [] };
      var raw = localStorage.getItem(FAV_KEY);
      if (!raw) return { v: 1, items: [] };
      try {
        var bytes = Uint8Array.from(atob(raw), function(c){ return c.charCodeAt(0); });
        var iv = bytes.slice(0, 12);
        var ct = bytes.slice(12);
        var dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
        return JSON.parse(new TextDecoder().decode(dec));
      } catch(e) { return { v: 1, items: [] }; }
    }

    async function toggleFav(pieceId) {
      var data = await _decryptFavs();
      var idx = -1;
      for (var i = 0; i < data.items.length; i++) {
        if (data.items[i].id === pieceId) { idx = i; break; }
      }
      var added = idx < 0;
      if (added) {
        data.items.push({ id: pieceId, at: Date.now() });
      } else {
        data.items.splice(idx, 1);
      }
      await _encryptFavs(data);
      // Sync to server (non-blocking)
      if (window.artsAuth && artsAuth.isLoggedIn()) {
        (added ? artsAuth.addFavorite(pieceId) : artsAuth.removeFavorite(pieceId)).catch(function(){});
      }
      return added;
    }

    async function isFav(pieceId) {
      var data = await _decryptFavs();
      for (var i = 0; i < data.items.length; i++) {
        if (data.items[i].id === pieceId) return true;
      }
      return false;
    }

    /* ── Bid system ── */
    var BID_KEY = 'arts_bids';
    var BID_DURATION = 24 * 60 * 60 * 1000;
    var _bidTimerInterval = null;

    function getBids() {
      try { return JSON.parse(localStorage.getItem(BID_KEY) || '{}'); } catch(e) { return {}; }
    }
    function saveBids(data) {
      try { localStorage.setItem(BID_KEY, JSON.stringify(data)); } catch(e) {}
    }
    function getPieceBid(pieceId) {
      var all = getBids();
      return all[pieceId] || null;
    }
    function placeBid(pieceId, amount) {
      var all = getBids();
      var existing = all[pieceId];
      var alias = (sessionStorage.getItem('arts_alias_unlocked') && localStorage.getItem('arts_alias')) || 'Anon';
      var now = Date.now();
      if (!existing) {
        existing = {
          bids: [],
          openedAt: now,
          expiresAt: now + BID_DURATION,
          status: 'open'
        };
      }
      existing.bids.push({ alias: alias, amount: amount, ts: now });
      existing.bids.sort(function(a, b) { return b.amount - a.amount; });
      all[pieceId] = existing;
      saveBids(all);
      return existing;
    }
    function getHighestBid(bidData) {
      if (!bidData || !bidData.bids.length) return 0;
      return bidData.bids[0].amount;
    }
    function isBidExpired(bidData) {
      if (!bidData) return false;
      return Date.now() >= bidData.expiresAt;
    }
    function formatCountdown(ms) {
      if (ms <= 0) return '0h 0m 0s';
      var h = Math.floor(ms / 3600000);
      var m = Math.floor((ms % 3600000) / 60000);
      var s = Math.floor((ms % 60000) / 1000);
      return h + 'h ' + m + 'm ' + s + 's';
    }
    function formatBidAmount(n) {
      return n.toLocaleString('de-DE');
    }
    function parseBidInput(str) {
      var cleaned = str.replace(/[^\d.,]/g, '');
      cleaned = cleaned.replace(/\./g, '').replace(',', '.');
      var n = parseFloat(cleaned);
      return isNaN(n) || n <= 0 ? null : n;
    }
    function timeSince(ts) {
      var diff = Date.now() - ts;
      if (diff < 60000) return 'Just now';
      if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
      return Math.floor(diff / 3600000) + 'h ago';
    }

    function stopBidTimer() {
      if (_bidTimerInterval) { clearInterval(_bidTimerInterval); _bidTimerInterval = null; }
    }

    function renderBidInput(pieceId, isCounter) {

            '<button class="btn-bid-submit" id="bid-submit">' + (isCounter ? 'Counterbid' : 'Place bid') + '</button>',
          '</div>',
          '<p class="bid-error" id="bid-error"></p>',
          '<button class="bid-back" id="bid-back">\u2190 Back</button>',
        '</div>'
      ].join('');
    }

    function renderBidStatus(pieceId, piece) {
      var bidData = getPieceBid(pieceId);
      if (!bidData || !bidData.bids.length) return '';
      var expired = isBidExpired(bidData);
      var highest = bidData.bids[0];
      var remaining = Math.max(0, bidData.expiresAt - Date.now());
      var pct = (remaining / BID_DURATION) * 100;

      var historyHtml = bidData.bids.map(function(b) {

      }).join('');

      var inquireHref = 'inquire.html?piece=' + encodeURIComponent(piece.title);

      if (expired) {
        return [

          '</div>',
          '<div class="bid-timer-row">',
            '<div class="bid-timer-bar-wrap"><div class="bid-timer-bar" id="bid-timer-bar" style="width:' + pct.toFixed(1) + '%"></div></div>',
            '<span class="bid-timer-text" id="bid-timer-text">' + formatCountdown(remaining) + '</span>',
          '</div>',
          '<div class="bid-history">' + historyHtml + '</div>',

            '<a href="' + inquireHref + '" class="btn-inq btn-inq-ghost" style="border-radius:0">Inquire</a>',
            '<button class="btn-fav" data-fav-id="' + esc(piece.id) + '" style="border-radius:0 var(--r-md) var(--r-md) 0">',
              '<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>',
              'Favourite',
            '</button>',
          '</div>',
        '</div>'
      ].join('');
    }

    function startBidTimer(pieceId, piece) {
      stopBidTimer();
      _bidTimerInterval = setInterval(function() {
        var bidData = getPieceBid(pieceId);
        if (!bidData) { stopBidTimer(); return; }
        var remaining = Math.max(0, bidData.expiresAt - Date.now());
        var pct = (remaining / BID_DURATION) * 100;
        var barEl = document.getElementById('bid-timer-bar');
        var textEl = document.getElementById('bid-timer-text');
        if (barEl) barEl.style.width = pct.toFixed(1) + '%';
        if (textEl) textEl.textContent = formatCountdown(remaining);
        if (remaining <= 0) {
          stopBidTimer();

        e.stopPropagation();
        if (!_isMember()) {
          btn.textContent = 'Join to save';
          btn.style.color = 'var(--c-accent)';
          setTimeout(function() { window.location.href = 'join.html'; }, 1200);
          return;
        }
        toggleFav(btn.dataset.favId).then(function(added) {
          _updateFavBtn(btn, added);
          if (added) _awardXP(10, 'Favourite');
          _beacon(added ? 'fav' : 'unfav', btn.dataset.favId);
        });
      });

      /* Bid / Counterbid button click (event delegation) */
      detailSheet.addEventListener('click', function(e) {
        var bidBtn = e.target.closest('#btn-bid');
        if (bidBtn) {
          e.stopPropagation();
          var pieceId = _currentDetailPiece ? _currentDetailPiece.id : null;
          if (pieceId && _currentDetailPiece) {
            _beacon('bid', pieceId);
            showBidInput(pieceId, _currentDetailPiece, false);
          }
          return;
        }
        var counterBtn = e.target.closest('#btn-counterbid');
        if (counterBtn) {
          e.stopPropagation();
          var pieceId2 = _currentDetailPiece ? _currentDetailPiece.id : null;
          if (pieceId2 && _currentDetailPiece) showBidInput(pieceId2, _currentDetailPiece, true);
          return;
        }
      });

      /* Buy button click (event delegation) */
      detailSheet.addEventListener('click', function(e) {
        var buyBtn = e.target.closest('#btn-buy');
        if (!buyBtn) return;
        e.stopPropagation();
        var piece = _currentDetailPiece;
        if (!piece) return;

        _beacon('buy', piece.id);
        buyBtn.textContent = 'Processing...';
        buyBtn.disabled = true;

        var buyerHash = localStorage.getItem('arts_id_hash') || '';
        var buyerEmail = localStorage.getItem('arts_email') || '';

        fetch(API_BASE + '/api/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            piece_id: piece.id,
            title: piece.title,
            price: piece.price,
            currency: piece.currency || '€',
            buyer_hash: buyerHash,
            buyer_email: buyerEmail
          })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.url) {
            window.location.href = data.url;
          } else {
            buyBtn.textContent = 'Buy';
            buyBtn.disabled = false;
            var errMsg = (data.error && data.error.message) || data.error || 'Checkout failed — try again';
            alert(errMsg);
          }
        })
        .catch(function() {
          buyBtn.textContent = 'Buy';
          buyBtn.disabled = false;
          alert('Server unavailable — try again later');
        });
      });

      /* Share button click (event delegation) */
      detailSheet.addEventListener('click', function(e) {
        var btn = e.target.closest('.btn-share');
        if (!btn) return;
        e.stopPropagation();
        var piece = _currentDetailPiece;
        if (!piece) return;
        var url = window.location.origin + '/art.html?piece=' + encodeURIComponent(piece.id);
        var title = piece.title + ' \u2014 [aRTS]';
        _beacon('share', piece.id);
        if (navigator.share) {
          navigator.share({ title: title, url: url }).then(function() { _awardXP(30, 'Share'); }).catch(function(){});
        } else {
          navigator.clipboard.writeText(url).then(function() {
            btn.textContent = 'Copied';
            setTimeout(function() { btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v7a2 2 0 002 2h12a2 2 0 002-2v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> Share'; }, 1600);
            _awardXP(30, 'Share');
          }).catch(function(){});
        }
      });
    }

    /* ── XP helper ── */
    function _awardXP(pts, label) {
      try {
        if (!localStorage.getItem('arts_id_hash')) return;
        var cur = parseInt(localStorage.getItem('arts_points') || '0', 10);
        localStorage.setItem('arts_points', String(cur + pts));
        var pending = JSON.parse(sessionStorage.getItem('arts_xp_pending') || '[]');
        pending.push({ label: label, pts: pts });
        sessionStorage.setItem('arts_xp_pending', JSON.stringify(pending));
      } catch(e) {}
    }

    /* ── Impression beacon (fire-and-forget) ── */
    var _detailOpenTs = 0;
    var _detailPieceId = '';

    function _beacon(event, pieceId, extra) {
      var token = window.artsAuth && artsAuth.getToken();
      if (!token) return;
      var payload = Object.assign({
        event: event,
        piece_id: pieceId,
        source_page: 'art'
      }, extra || {});
      fetch(artsAuth.PROXY_BASE + '/api/impression', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify(payload),
        keepalive: true
      }).catch(function(){});
    }

    function openDetail(pieceId) {
      initDetailEls();
      initDetailNav();
      var p = null;
      for (var i = 0; i < _allPieces.length; i++) {
        if (_allPieces[i].id === pieceId) { p = _allPieces[i]; break; }
      }
      if (!p) return;
      _currentDetailPiece = p;
      _detailOpenTs = Date.now();
      _detailPieceId = pieceId;
      _beacon('view', pieceId);

      /* Gallery */
      var imgs = p.images && p.images.length ? p.images : (p.image ? [p.image] : []);
      detailGallery.innerHTML = imgs.map(function(src, idx) {
        return '<img src="' + esc(src) + '" alt="' + esc(p.title) + ' ' + (idx+1) + '" ' + (idx===0?'':'loading="lazy"') + '>';
      }).join('');
      detailDots.innerHTML = imgs.length > 1 ? imgs.map(function(_, idx) {
        return '<span' + (idx===0?' class="active"':'') + '></span>';
      }).join('') : '';

      /* Scroll dot tracking */
      if (imgs.length > 1) {
        detailGallery.onscroll = function() {
          var scrollLeft = detailGallery.scrollLeft;
          var imgWidth = detailGallery.querySelector('img') ? detailGallery.querySelector('img').offsetWidth : 1;
          var activeIdx = Math.round(scrollLeft / imgWidth);
          var dots = detailDots.querySelectorAll('span');
          for (var d = 0; d < dots.length; d++) {
            dots[d].className = d === activeIdx ? 'active' : '';
          }
        };
      }

      var isSold = /sold|not available/i.test(p.status || '');
      var priceHtml = p.price && p.price !== '\u2014'
        ? esc(p.price) + ' <span class="euro">' + esc(p.currency || '\u20ac') + '</span>'
        : '<span style="opacity:0.3">\u2014</span>';

      /* Meta fields */
      var meta = '';
      function addMeta(label, val, cls) {
        if (!val) return;
        meta += '<div class="detail-meta-item"><span class="detail-meta-label">' + label + '</span><span class="detail-meta-val' + (cls?' '+cls:'') + '">' + esc(val) + '</span></div>';
      }
      addMeta('Dimensions', p.dimensions);
      addMeta('Edition', p.edition);
      addMeta('Condition', p.condition);
      addMeta('Provenance', p.provenance);
      addMeta('Certificate', p.certificate ? 'Yes' : (p.certificate === false ? 'No' : ''), p.certificate ? 'cert-yes' : '');
      addMeta('Location', p.location);
      addMeta('Shipping', p.shipping);

      /* Determine bid state for this piece */
      var bidData = getPieceBid(p.id);
      var hasBid = bidData && bidData.bids.length > 0;
      var bidExpired = hasBid && isBidExpired(bidData);
      var actionsHtml;

      if (hasBid) {
        actionsHtml = renderBidStatus(p.id, p);
      } else {
        actionsHtml = renderDefaultActions(p.id, p);
      }

      /* AI metadata for seed pieces */
      var aiMetaHtml = '';
      if (p.seed) {
        var tags = [];
        if (p.ai_style) tags.push(p.ai_style);
        if (p.ai_mood) tags.push(p.ai_mood);
        if (p.ai_period) tags.push(p.ai_period);
        if (p.ai_subjects) p.ai_subjects.forEach(function(s){ tags.push(s); });
        if (tags.length) {
          aiMetaHtml += '<div class="detail-ai-meta">' + tags.map(function(t){ return '<span class="ai-tag">' + esc(t) + '</span>'; }).join('') + '</div>';
        }
        if (p.ai_description) {
          aiMetaHtml += '<p class="detail-ai-desc">' + esc(p.ai_description) + '</p>';
        }
        if (p.source_url) {
          aiMetaHtml += '<a class="detail-source-link" href="' + esc(p.source_url) + '" target="_blank" rel="noopener">View source collection ↗</a>';
        }
      }

      detailInfo.innerHTML = [
        '<p class="detail-index">aRT #' + esc(String(p.id).padStart(3,'0')) + ' \xB7 ' + esc(p.year||'') + '</p>',
        '<h2 class="detail-title">' + esc(p.title) + '</h2>',
        p.artist ? '<p class="detail-artist">' + esc(p.artist) + (p.admin || p.verified ? ' <span class="verified-badge" title="Verified">&#10003;</span>' : '') + '</p>' : '',
        p.media ? '<p class="detail-media">' + esc(p.media) + '</p>' : '',
        aiMetaHtml,
        (window.artsHF && artsHF.enabled() && imgs.length && !p.ai_description) ? '<button class="btn-ai-caption" data-piece-id="'+esc(p.id)+'" style="font-family:\'Space Grotesk\',sans-serif;font-size:0.42rem;font-weight:600;letter-spacing:0.14em;padding:3px 8px;border:1px solid rgba(255,92,0,0.3);border-radius:3px;color:#FF5C00;background:rgba(255,92,0,0.08);cursor:pointer;margin:6px 0;">Generate description <span style="font-size:0.38rem;opacity:0.7;">AI</span></button><p class="ai-caption-result" style="font-size:0.52rem;color:var(--c-text-secondary);font-style:italic;margin:4px 0 0;display:none;"></p>' : '',
        '<div class="detail-rule"></div>',
        meta ? '<div class="detail-meta">' + meta + '</div><div class="detail-rule"></div>' : '',
        '<div class="detail-price-row">',
          '<span class="detail-price">' + priceHtml + '</span>',
          '<span class="detail-status' + (isSold?' sold':'') + '">' + esc(p.status||'Available') + '</span>',
        '</div>',
        actionsHtml
      ].join('');

      /* Start timer if there's an active bid */
      if (hasBid && !bidExpired) {
        startBidTimer(p.id, p);
      }

      /* Update favourite button state */
      var favBtn = detailInfo.querySelector('.btn-fav');
      if (favBtn && _isMember()) {
        isFav(p.id).then(function(active) { _updateFavBtn(favBtn, active); });
      } else if (favBtn) {
        favBtn.classList.remove('is-fav');
      }

      /* AI caption button */
      var capBtn = detailInfo.querySelector('.btn-ai-caption');
      if(capBtn){
        capBtn.addEventListener('click', function(){
          if(!window.artsHF || !artsHF.rateCheck()) return;
          var resultEl = detailInfo.querySelector('.ai-caption-result');
          capBtn.textContent = 'Analyzing…';
          capBtn.disabled = true;
          var imgSrc = imgs[0];
          /* Fetch image as blob for HF API */
          fetch(imgSrc).then(function(r){ return r.blob(); }).then(function(blob){
            return artsHF.image('Salesforce/blip-image-captioning-base', blob);
          }).then(function(data){
            if(data && data[0] && data[0].generated_text){
              resultEl.textContent = '"' + data[0].generated_text + '"';
              resultEl.style.display = '';
              /* Update alt text on gallery images */
              var galleryImgs = detailGallery.querySelectorAll('img');
              galleryImgs.forEach(function(gi){ gi.alt = data[0].generated_text; });
            }
            capBtn.textContent = 'Generate description AI';
            capBtn.disabled = false;
          }).catch(function(){
            capBtn.textContent = 'Unavailable';
            setTimeout(function(){ capBtn.textContent = 'Generate description AI'; capBtn.disabled = false; }, 2000);
          });
        });
      }

      detailBackdrop.hidden = false;
      detailBackdrop._opening = true;
      detailSheet.scrollTop = 0;
      updateDetailNav();
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          detailBackdrop.classList.add('is-open');
          detailBackdrop._opening = false;
        });
      });
      document.body.style.overflow = 'hidden';
    }

    function closeDetail() {
      if (detailBackdrop._opening) return;
      if (_detailPieceId) {
        _beacon('close', _detailPieceId, { duration_ms: Date.now() - _detailOpenTs });
        _detailPieceId = '';
      }
      stopBidTimer();
      _currentDetailPiece = null;
      detailBackdrop.classList.remove('is-open');
      setTimeout(function() {
        detailBackdrop.hidden = true;
        detailGallery.innerHTML = '';
        detailInfo.innerHTML = '';
        document.body.style.overflow = '';
      }, 260);
    }

    /* Detail nav: prev/next */
    var _navInited = false;
    var _navPrev, _navNext, _navPos;
    function initDetailNav(){
      if(_navInited) return;
      _navPrev = document.getElementById('detail-prev');
      _navNext = document.getElementById('detail-next');
      _navPos  = document.getElementById('detail-nav-pos');
      if(!_navPrev) return;
      _navInited = true;
      _navPrev.addEventListener('click', function(){
        var list = _filteredPieces.length ? _filteredPieces : _allPieces;
        var idx = _getNavIdx();
        if(idx > 0) openDetail(list[idx-1].id);
      });
      _navNext.addEventListener('click', function(){
        var list = _filteredPieces.length ? _filteredPieces : _allPieces;
        var idx = _getNavIdx();
        if(idx >= 0 && idx < list.length - 1) openDetail(list[idx+1].id);
      });
    }
    function _getNavIdx(){
      if(!_detailPieceId) return -1;
      var list = _filteredPieces.length ? _filteredPieces : _allPieces;
      for(var i=0;i<list.length;i++){
        if(list[i].id === _detailPieceId) return i;
      }
      return -1;
    }
    function updateDetailNav(){
      if(!_navInited) return;
      var list = _filteredPieces.length ? _filteredPieces : _allPieces;
      var idx = _getNavIdx();
      _navPrev.disabled = idx <= 0;
      _navNext.disabled = idx < 0 || idx >= list.length - 1;
      _navPos.textContent = idx >= 0 ? (idx+1) + ' / ' + list.length : '';
    }

    /* Bind card clicks → open detail */
    function bindCardClicks(container) {
      container.addEventListener('click', function(e) {
        if (e.target.closest('.btn-edit') || e.target.closest('.btn-remove') || e.target.closest('a[href]')) return;
        var card = e.target.closest('.piece-card');
        if (!card) return;
        var viewBtn = card.querySelector('[data-view-id]');
        if (viewBtn) {
          e.preventDefault();
          e.stopPropagation();
          openDetail(viewBtn.dataset.viewId);
        }
      });
    }

    /* ── € hover: scramble through world currencies ── */
    function bindEuroScramble(container){
      var CURRENCIES = ['¥','£','$','₿','₽','¢','₩','₺','₴','₦','₫','₱','฿','₸','₾','﷼','₡'];
      var FRAMES = 14, RATE = 42;
      container.addEventListener('mouseover', function(e){
        var el = e.target.closest('.euro');
        if (!el || el._sc) return;
        el._sc = true;
        var step = 0;
        var t = setInterval(function(){
          el.textContent = step < FRAMES-1
            ? CURRENCIES[Math.floor(Math.random()*CURRENCIES.length)]
            : '€';
          if (++step >= FRAMES){ clearInterval(t); el._sc=false; }
        }, RATE);
      });
    }
  })();
  </script>

  <!-- Nav hover lowercase animation -->
  <script>
  (function(){
    var DELAY=40;
    function navHover(el){
      var orig=el.textContent,timers=[],state=0;
      function clr(){timers.forEach(clearTimeout);timers.length=0;}
      function render(n){var s=orig[0];for(var i=1;i<orig.length;i++)s+=(i<=n?orig[i].toLowerCase():orig[i]);el.textContent=s;}
      el.addEventListener('mouseenter',function(){clr();var from=state;for(var i=0;i<orig.length-1-from;i++)(function(i){timers.push(setTimeout(function(){render(state=from+i+1);},i*DELAY));})(i);});
      el.addEventListener('mouseleave',function(){clr();var from=state;for(var i=0;i<from;i++)(function(i){timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));})(i);});
    }
    document.querySelectorAll('.site-nav a').forEach(navHover);

    /* Idle static glitch */
    (function(){
      var links=Array.from(document.querySelectorAll('.site-nav a'));
      var origTxt=links.map(function(el){return el.textContent;});
      var glyphs='▓░▒│╌·×÷¬±';
      function tick(){
        var li=Math.floor(Math.random()*links.length);
        var el=links[li];
        var txt=origTxt[li];
        var ci=1+Math.floor(Math.random()*(txt.length-1));
        var arr=txt.split('');
        arr[ci]=glyphs[Math.floor(Math.random()*glyphs.length)];
        el.textContent=arr.join('');
        setTimeout(function(){el.textContent=txt;},90);
        setTimeout(tick,2600+Math.random()*3800);
      }
      setTimeout(tick,1200+Math.random()*1800);
    })();
  })();
  </script>

  <!-- Hamburger toggle with decap cascade -->
  <script>
  (function(){
    var burger=document.getElementById('burger');
    var overlay=document.getElementById('nav-overlay');
    var closer=document.getElementById('burger-close');
    if(!burger||!overlay)return;
    var oLinks=Array.from(overlay.querySelectorAll('a'));
    var oLabels=oLinks.map(function(el){return el.textContent;});

    function decapCascade(){
      oLinks.forEach(function(el,li){
        var target=oLabels[li];
        el.textContent=target.toLowerCase();
        var base=li*100+120;
        Array.from(target).forEach(function(ch,i){
          setTimeout(function(){
            if(!overlay.classList.contains('is-open'))return;
            var chars=el.textContent.split('');
            chars[i]=ch;
            el.textContent=chars.join('');
          },base+i*50);
        });
      });
    }

    function openMenu(){
      overlay.classList.add('is-open');
      burger.classList.add('is-open');
      decapCascade();
    }
    function closeMenu(){
      oLinks.forEach(function(el,i){el.textContent=oLabels[i];});
      overlay.classList.remove('is-open');
      burger.classList.remove('is-open');
    }
    burger.addEventListener('click',openMenu);
    closer.addEventListener('click',closeMenu);
    overlay.addEventListener('click',function(e){if(e.target===overlay)closeMenu();});
  })();
  </script>

  <script>
  (function(){
    var lb = document.getElementById('lightbox');
    var lbImg = document.getElementById('lb-img');
    var lbCounter = document.getElementById('lb-counter');
    var lbPrev = document.getElementById('lb-prev');
    var lbNext = document.getElementById('lb-next');
    var imgs = [];
    var idx = 0;

    function openLightbox(srcs, startIdx) {
      imgs = srcs;
      idx = startIdx || 0;
      showImg();
      lb.hidden = false;
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){ lb.classList.add('is-open'); });
      });
      lbPrev.style.display = imgs.length > 1 ? '' : 'none';
      lbNext.style.display = imgs.length > 1 ? '' : 'none';
    }

    function closeLightbox() {
      lb.classList.remove('is-open');
      setTimeout(function(){ lb.hidden = true; lbImg.src = ''; }, 260);
    }

    function showImg() {
      lbImg.src = imgs[idx];
      lbImg.alt = 'Image ' + (idx + 1) + ' of ' + imgs.length;
      lbCounter.textContent = imgs.length > 1 ? (idx + 1) + ' / ' + imgs.length : '';
    }

    function next() { if (imgs.length > 1) { idx = (idx + 1) % imgs.length; showImg(); } }
    function prev() { if (imgs.length > 1) { idx = (idx - 1 + imgs.length) % imgs.length; showImg(); } }

    lb.querySelector('.lightbox-close').addEventListener('click', function(e){ e.stopPropagation(); closeLightbox(); });
    lb.addEventListener('click', function(e){ if (e.target === lb) closeLightbox(); });
    lbPrev.addEventListener('click', function(e){ e.stopPropagation(); prev(); });
    lbNext.addEventListener('click', function(e){ e.stopPropagation(); next(); });

    document.addEventListener('keydown', function(e){
      if (!lb.classList.contains('is-open')) return;
      if (e.key === 'Escape') { e.stopImmediatePropagation(); closeLightbox(); }
      if (e.key === 'ArrowRight') next();
      if (e.key === 'ArrowLeft') prev();
    });

    /* Swipe support for mobile */
    var touchStartX = 0;
    var touchStartY = 0;
    lb.addEventListener('touchstart', function(e){
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    lb.addEventListener('touchend', function(e){
      var dx = e.changedTouches[0].clientX - touchStartX;
      var dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
        if (dx < 0) next(); else prev();
      }
    }, { passive: true });

    /* Listen for clicks on detail gallery images */
    document.addEventListener('click', function(e){
      var img = e.target.closest('.detail-gallery img');
      if (!img) return;
      e.stopPropagation();
      var gallery = img.closest('.detail-gallery');
      var allImgs = Array.from(gallery.querySelectorAll('img'));
      var srcs = allImgs.map(function(i){ return i.src; });
      var clickedIdx = allImgs.indexOf(img);
      openLightbox(srcs, clickedIdx >= 0 ? clickedIdx : 0);
    });
  })();
  </script>
