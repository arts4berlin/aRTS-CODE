<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[aRTS]</title>
  <!-- Robot path — clear session (dead end) -->
  <script> sessionStorage.removeItem('captcha_passed'); </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ── Background polygon canvas ── */
    canvas {
      position: fixed;
      inset: 0;
      display: block;
      opacity: 0.38;
      transition: opacity 0.65s ease;
    }
    canvas.fade { opacity: 0; }

    /* ── Centre stage ── */
    #stage {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* π and I share size / style */
    .glyph {
      position: absolute;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(7rem, 28vh, 17rem);
      color: #FF5C00;
      line-height: 1;
      user-select: none;
      pointer-events: none;
    }

    /* π bounces in */
    @keyframes piBounce {
      0%   { opacity: 0; transform: scale(0);    }
      60%  { opacity: 1; transform: scale(1.12); }
      80%  { opacity: 1; transform: scale(0.94); }
      100% { opacity: 1; transform: scale(1);    }
    }
    #pi-char {
      opacity: 0;
      animation: piBounce 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }
    /* Lock: hand control to JS for blur-morph */
    #pi-char.lock {
      animation: none !important;
      opacity: 1 !important;
      transform: scale(1) !important;
    }

    /* I: invisible until JS reveals it */
    #big-i {
      opacity: 0;
    }

    /* ── 5-slot word strip — centred over the I ── */
    .strip {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      z-index: 11;
      opacity: 0;
      transition: opacity 0.65s ease;
    }

    .s {
      flex-shrink: 0;
      width: 1.5em;
      text-align: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 400;
      user-select: none;
      pointer-events: none;
      transition: opacity 0.11s ease;
    }
    .s-far  { font-size: clamp(0.7rem,  2.4vh, 1.7rem); color: rgba(255,255,255,0.14); }
    .s-near { font-size: clamp(1.1rem,  5vh,   3rem);   color: rgba(255,255,255,0.34); }
    .s-ctr  { font-size: clamp(2.2rem,  9vh,   6rem);   color: #fff; font-weight: 700; }
  </style>
</head>
<body>

  <canvas id="c"></canvas>

  <div id="stage">
    <span class="glyph" id="pi-char">π</span>
    <span class="glyph" id="big-i">I</span>

    <!-- word scroll strip -->
    <div class="strip" id="strip">
      <span class="s s-far"  id="s-2"></span>
      <span class="s s-near" id="s-1"></span>
      <span class="s s-ctr"  id="s0"></span>
      <span class="s s-near" id="s1"></span>
      <span class="s s-far"  id="s2"></span>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    /* ── Route map ── */
    const routes = { work: 'work.html' };

    /* ── Word list ── */
    const words = [
      'work',
      'applying', 'buzzing', 'buying', 'doping', 'trotting',
      'bubbling', 'coping', 'siezing', 'mokka', 'zoning',
      'propping', 'calling', 'questioning', 'viewing',
      'tripping', 'buffering', 'crunching',
    ];
    /* Shuffle */
    for (let i = words.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [words[i], words[j]] = [words[j], words[i]];
    }

    /* ── Flat character stream ── */
    const PAD = 5, GAP = 6;
    const streamChars  = [];
    const streamWordOf = [];
    words.forEach((word, wi) => {
      for (let i = 0; i < PAD; i++) { streamChars.push(' '); streamWordOf.push(-1); }
      for (const ch of word)        { streamChars.push(ch);  streamWordOf.push(wi); }
      for (let i = 0; i < GAP; i++) { streamChars.push(' '); streamWordOf.push(-1); }
    });
    const SLEN = streamChars.length;

    /* ── DOM refs ── */
    const canvas  = document.getElementById('c');
    const ctx     = canvas.getContext('2d');
    const piChar  = document.getElementById('pi-char');
    const bigI    = document.getElementById('big-i');
    const strip   = document.getElementById('strip');
    const stage   = document.getElementById('stage');
    const slots   = [-2, -1, 0, 1, 2].map(d => document.getElementById('s' + d));

    /* ── Timing ── */
    const MORPH_START = 1700;
    const MORPH_DUR   = 580;
    const WORDS_DELAY = 320;   // ms after morph ends before words appear

    /* ── Canvas resize ── */
    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    /* ── Helpers ── */
    function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2; }
    function easeOut2(t)       { return 1 - (1 - t) * (1 - t); }
    function smoothstep(t)     { return t * t * (3 - 2 * t); }
    function clamp(mn, v, mx)  { return Math.max(mn, Math.min(mx, v)); }

    /* ── Blur-crossfade morph: π → I ── */
    function morphPiToI(dur, onDone) {
      piChar.classList.add('lock');
      void piChar.offsetHeight; // flush

      const t0 = performance.now();
      function step(now) {
        const p  = clamp(0, (now - t0) / dur, 1);

        const fp = easeOut2(p);
        piChar.style.opacity = (1 - fp).toFixed(4);
        piChar.style.filter  = `blur(${(fp * 18).toFixed(1)}px)`;

        const pI = clamp(0, (p - 0.18) / 0.82, 1);
        const fi = smoothstep(pI);
        bigI.style.opacity = fi.toFixed(4);
        bigI.style.filter  = `blur(${((1 - fi) * 18).toFixed(1)}px)`;

        if (p < 1) {
          requestAnimationFrame(step);
        } else {
          piChar.style.display = 'none';
          bigI.style.filter    = '';
          bigI.style.opacity   = '1';
          if (onDone) onDone();
        }
      }
      requestAnimationFrame(step);
    }

    /* ── Word scroll ── */
    const shown  = ['', '', '', '', ''];
    const fading = [false, false, false, false, false];
    let scrollPos = 0;
    let lastTs    = null;
    let running   = false;
    const SPEED   = 2.2;

    function charAt(idx) { return streamChars[(idx % SLEN + SLEN) % SLEN]; }
    function wordAt(idx)  { return streamWordOf[(idx % SLEN + SLEN) % SLEN]; }

    function scrollFrame(ts) {
      if (!running) return;
      if (lastTs === null) lastTs = ts;
      const dt = Math.min(ts - lastTs, 50);
      lastTs = ts;

      scrollPos = (scrollPos + SPEED * dt / 1000) % SLEN;
      const ipos = Math.floor(scrollPos);

      slots.forEach((el, si) => {
        const offset   = si - 2;
        const ch       = charAt(ipos + offset);
        const isCenter = offset === 0;
        const next     = (ch === ' ') ? '' : (isCenter ? ch.toUpperCase() : ch);

        if (next !== shown[si] && !fading[si]) {
          fading[si] = true;
          el.style.opacity = '0';
          setTimeout(() => {
            el.textContent = next;
            shown[si] = next;
            el.style.opacity = '';
            fading[si] = false;
          }, 90);
        }
      });

      const wi          = wordAt(ipos);
      const currentWord = wi >= 0 ? words[wi] : null;
      stage.style.cursor = (currentWord && routes[currentWord]) ? 'pointer' : 'default';

      requestAnimationFrame(scrollFrame);
    }

    /* Click to navigate */
    stage.addEventListener('click', () => {
      const ipos = Math.floor(scrollPos);
      const wi   = wordAt(ipos);
      const word = wi >= 0 ? words[wi] : null;
      const dest = word && routes[word];
      if (!dest) return;
      running = false;
      [slots[1], slots[2], slots[3]].forEach(el => {
        el.style.transition = 'color 0.15s ease';
        el.style.color = '#00e676';
      });
      sessionStorage.setItem('captcha_passed', '1');
      setTimeout(() => { window.location.href = dest; }, 480);
    });

    /* ── Main canvas loop ── */
    let startTs = null;
    let morphed = false;

    function canvasFrame(now) {
      if (startTs === null) startTs = now;
      const elapsed = now - startTs;

      const t     = clamp(0, elapsed / MORPH_START, 1);
      const sides = Math.max(3, Math.floor(3 + 57 * easeInOutCubic(t)));
      const rot   = elapsed * 0.00012;

      const W  = canvas.width, H  = canvas.height;
      const cx = W / 2,        cy = H / 2;
      const r  = Math.min(W, H) * 0.30;
      const a  = clamp(0, elapsed / 500, 1);

      ctx.clearRect(0, 0, W, H);

      [0.55, 1.0, 1.5].forEach((s, i) => {
        ctx.beginPath();
        ctx.arc(cx, cy, r * s, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,255,${(0.06 - i * 0.015) * a})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      });

      ctx.save();
      ctx.setLineDash([5, 8]);
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + r * Math.cos(rot), cy + r * Math.sin(rot));
      ctx.strokeStyle = `rgba(255,255,255,${0.10 * a})`;
      ctx.lineWidth = 0.6;
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();

      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,255,255,${0.12 * a})`;
      ctx.lineWidth = 0.8;
      ctx.stroke();

      for (let i = 0; i < sides; i++) {
        const ang = (2 * Math.PI * i / sides) + rot;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + r * Math.cos(ang), cy + r * Math.sin(ang));
        ctx.strokeStyle = `rgba(255,92,0,${0.06 * a})`;
        ctx.lineWidth = 0.4;
        ctx.stroke();
      }

      ctx.beginPath();
      for (let i = 0; i <= sides; i++) {
        const ang = (2 * Math.PI * i / sides) + rot;
        const x = cx + r * Math.cos(ang), y = cy + r * Math.sin(ang);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(255,92,0,${0.85 * a})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      for (let i = 0; i < sides; i++) {
        const ang = (2 * Math.PI * i / sides) + rot;
        ctx.beginPath();
        ctx.arc(cx + r * Math.cos(ang), cy + r * Math.sin(ang), 2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,92,0,${a})`;
        ctx.fill();
      }

      const piApprox = sides * Math.sin(Math.PI / sides);
      const fs = clamp(10, W * 0.011, 13);
      ctx.font         = `300 ${fs}px 'Space Grotesk', sans-serif`;
      ctx.fillStyle    = `rgba(255,255,255,${0.38 * a})`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText(
        `π  ≈  ${piApprox.toFixed(8)}     n = ${sides}`,
        cx, cy + r + clamp(28, r * 0.16, 46)
      );

      /* Trigger morph */
      if (!morphed && elapsed >= MORPH_START) {
        morphed = true;
        canvas.classList.add('fade');
        morphPiToI(MORPH_DUR, () => {
          /* After morph: fade in word strip and start scrolling */
          setTimeout(() => {
            strip.style.opacity = '1';
            running = true;
            requestAnimationFrame(scrollFrame);
          }, WORDS_DELAY);
        });
      }

      /* Canvas only needed through morph */
      if (elapsed < MORPH_START + MORPH_DUR + 200) {
        requestAnimationFrame(canvasFrame);
      }
    }

    requestAnimationFrame(canvasFrame);
  })();
  </script>

</body>
</html>
