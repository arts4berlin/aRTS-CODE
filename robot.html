<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/favicon.png?v=3" sizes="32x32" type="image/png">
  <link rel="icon" href="assets/favicon.svg?v=3" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/favicon-180.png?v=3">
  <meta property="og:type"         content="website">
  <meta property="og:url"          content="https://4-arts.com/">
  <meta property="og:title"        content="[aRTS]">
  <meta property="og:description"  content="aRT · aSSETS · aID — now in BERLIN">
  <meta property="og:image"        content="https://4-arts.com/assets/og.png">
  <meta name="twitter:card"        content="summary">
  <meta name="twitter:title"       content="[aRTS]">
  <meta name="twitter:description" content="aRT · aSSETS · aID — now in BERLIN">
  <meta name="twitter:image"       content="https://4-arts.com/assets/og.png">
  <title>[aRTS]</title>
  <!-- Robot path — clear session (dead end) -->
  <script> sessionStorage.removeItem('captcha_passed'); </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Glyph stage — full-screen flex centre ── */
    #glyph-stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }

    .glyph {
      position: absolute;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(7rem, 30vh, 18rem);
      color: #FF5C00;
      line-height: 1;
      opacity: 0;
      transform: scale(0);
      will-change: transform, opacity;
      user-select: none;
    }

    /* ── Word canvas — transparent, floats above glyph ── */
    #word-canvas {
      position: fixed;
      top: 0; left: 0;
      z-index: 11;
      opacity: 0;
      transition: opacity 0.65s ease;
      pointer-events: none;
    }

    /* ── Invisible click capture overlay ── */
    #word-overlay {
      position: fixed;
      inset: 0;
      z-index: 12;
      cursor: default;
    }
  
    /* ── dvh fix: excludes iOS Safari address bar ── */
    @supports (height: 100dvh) {
      body { height: 100dvh; }
    }
    /* ── Mobile: safe area + text-size ── */
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    .logo, .nav-about, header { touch-action: manipulation; }
    .btn, button, a { touch-action: manipulation; }
  </style>
</head>
<body>

  <div id="glyph-stage">
    <div class="glyph" id="pi-el">π</div>
    <div class="glyph" id="i-el">I</div>
  </div>

  <canvas id="word-canvas"></canvas>
  <div id="word-overlay"></div>

  <script>
  (function () {
    'use strict';

    /* ── Routes & words ── */
    const routes = { work: 'work.html' };
    const words  = [
      'work',
      'applying', 'buzzing', 'buying', 'doping', 'trotting',
      'bubbling', 'coping', 'siezing', 'mokka', 'zoning',
      'propping', 'calling', 'questioning', 'viewing',
      'tripping', 'buffering', 'crunching',
    ];
    /* Shuffle */
    for (let i = words.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [words[i], words[j]] = [words[j], words[i]];
    }

    /* ── Flat character stream ── */
    const GAP = 7;
    const streamChars = [], streamWordOf = [];
    words.forEach((word, wi) => {
      for (let i = 0; i < GAP; i++) { streamChars.push(' '); streamWordOf.push(-1); }
      for (const ch of word)         { streamChars.push(ch);  streamWordOf.push(wi); }
    });
    const SLEN = streamChars.length;

    /* ── DOM refs ── */
    const piEl       = document.getElementById('pi-el');
    const iEl        = document.getElementById('i-el');
    const wordCanvas = document.getElementById('word-canvas');
    const wCtx       = wordCanvas.getContext('2d');
    const overlay    = document.getElementById('word-overlay');

    /* ── Timing (ms) ── */
    const BOUNCE_DUR  = 900;
    const MORPH_START = 1700;
    const MORPH_DUR   = 700;
    const MORPH_END   = MORPH_START + MORPH_DUR;
    const WORDS_DELAY = 500;

    /* ── Helpers ── */
    function lerp(a, b, t)  { return a + (b - a) * t; }
    function clamp01(v)     { return Math.max(0, Math.min(1, v)); }
    function smoothstep(t)  { const c = clamp01(t); return c * c * (3 - 2 * c); }
    function easeOut2(t)    { return 1 - (1 - clamp01(t)) * (1 - clamp01(t)); }

    /* π spring bounce: 0 → 1.12 → 0.94 → 1 */
    function bounceScale(t) {
      if (t <= 0) return 0;
      if (t >= 1) return 1;
      if (t < 0.60) return lerp(0,    1.12, t / 0.60);
      if (t < 0.80) return lerp(1.12, 0.94, (t - 0.60) / 0.20);
                    return lerp(0.94, 1.00, (t - 0.80) / 0.20);
    }

    /* Apply transform + opacity to a glyph element */
    function setGlyph(el, scale, opacity) {
      el.style.transform = `scale(${scale.toFixed(4)})`;
      el.style.opacity   = opacity.toFixed(4);
    }

    /* ── Word canvas ── */
    let CHAR_SLOT          = 56;   /* px per character slot — updated on resize */
    const SCROLL_PX_PER_SEC = 110; /* pixels/sec, right → left                  */

    function updateCharSlot() {
      CHAR_SLOT = Math.max(38, Math.min(70, window.innerWidth * 0.044));
    }

    function resizeWordCanvas() {
      wordCanvas.width  = window.innerWidth;
      wordCanvas.height = window.innerHeight;
      updateCharSlot();
    }
    window.addEventListener('resize', resizeWordCanvas);
    resizeWordCanvas();

    let wordScrollPx   = 0;
    let wordLastTs     = null;
    let wordRunning    = false;
    let currentWordIdx = -1;

    /* Mouse proximity to the I — drives hover magnification */
    let mouseX = -9999, mouseY = -9999;
    overlay.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
    overlay.addEventListener('mouseleave', ()  => { mouseX = -9999; mouseY = -9999; });

    function drawWords() {
      const W = wordCanvas.width, H = wordCanvas.height;
      const cx = W / 2, cy = H / 2;

      wCtx.clearRect(0, 0, W, H);

      const totalPx      = SLEN * CHAR_SLOT;
      const scrolled     = ((wordScrollPx % totalPx) + totalPx) % totalPx;
      const centerCFloat = scrolled / CHAR_SLOT; /* float char-index at centre */
      const FADE_DIST    = W * 0.28;             /* tight fade — words hug the I */

      /* Font size range */
      const MAX_FONT = Math.max(48, Math.min(88, H * 0.10));
      const MIN_FONT = MAX_FONT * 0.18;

      /* Hover-magnification: mouse proximity to I centre */
      const I_RADIUS  = Math.min(W, H) * 0.14;
      const mDist     = Math.hypot(mouseX - cx, mouseY - cy);
      const hoverFrac = Math.max(0, 1 - mDist / I_RADIUS);
      const ctrBoost  = 1 + 1.0 * hoverFrac * hoverFrac; /* up to 2× at centre */

      /* Slots visible on each side of centre */
      const halfSlots = Math.ceil(FADE_DIST / CHAR_SLOT) + 1;
      const startCi   = Math.floor(centerCFloat) - halfSlots;
      const endCi     = Math.floor(centerCFloat) + halfSlots;
      const exactCi   = Math.round(centerCFloat); /* the one character at centre */

      /* Track the word whose first letter is closest to centre */
      const cSIdx = ((exactCi % SLEN) + SLEN) % SLEN;
      currentWordIdx = streamWordOf[cSIdx];

      for (let ci = startCi; ci <= endCi; ci++) {
        const sIdx = ((ci % SLEN) + SLEN) % SLEN;
        const ch   = streamChars[sIdx];
        if (ch === ' ') continue;

        /* x position relative to viewport centre */
        const charX = cx + (ci - centerCFloat) * CHAR_SLOT;
        const dist  = Math.abs(charX - cx);
        if (dist >= FADE_DIST) continue;

        const frac     = 1 - dist / FADE_DIST;
        const frac2    = frac * frac;
        const isCtr    = (ci === exactCi);
        /* Only the centre character is uppercase; others keep natural case */
        const glyph    = isCtr ? ch.toUpperCase() : ch;
        const boost    = isCtr ? ctrBoost : 1;
        const fontSize = (MIN_FONT + (MAX_FONT - MIN_FONT) * frac2) * boost;
        const opacity  = 0.07 + 0.93 * frac2;
        const weight   = frac > 0.82 ? 700 : 400;

        wCtx.save();
        wCtx.font         = `${weight} ${fontSize.toFixed(1)}px 'Space Grotesk', sans-serif`;
        wCtx.fillStyle    = `rgba(255,255,255,${opacity.toFixed(3)})`;
        wCtx.textAlign    = 'center';
        wCtx.textBaseline = 'middle';
        wCtx.fillText(glyph, charX, cy);
        wCtx.restore();
      }

      overlay.style.cursor = (currentWordIdx >= 0 && routes[words[currentWordIdx]])
        ? 'pointer' : 'default';
    }

    function wordFrame(ts) {
      if (!wordRunning) return;
      if (wordLastTs === null) wordLastTs = ts;
      const dt   = Math.min(ts - wordLastTs, 50);
      wordLastTs = ts;

      wordScrollPx += SCROLL_PX_PER_SEC * dt / 1000;
      drawWords();
      requestAnimationFrame(wordFrame);
    }

    overlay.addEventListener('click', () => {
      if (currentWordIdx < 0) return;
      const word = words[currentWordIdx];
      const dest = routes[word];
      if (!dest) return;
      wordRunning = false;
      sessionStorage.setItem('captcha_passed', '1');
      setTimeout(() => { window.location.href = dest; }, 160);
    });

    /* ── Main animation loop ── */
    let startTs = null, morphDone = false;

    function mainFrame(now) {
      if (startTs === null) startTs = now;
      const elapsed = now - startTs;

      if (elapsed < BOUNCE_DUR) {
        /* Phase 1: π springs in */
        setGlyph(piEl, bounceScale(elapsed / BOUNCE_DUR), 1);
        setGlyph(iEl,  0, 0);

      } else if (elapsed < MORPH_START) {
        /* Phase 2: π held steady */
        setGlyph(piEl, 1, 1);
        setGlyph(iEl,  0, 0);

      } else if (elapsed < MORPH_END) {
        /* Phase 3: crossfade π → I (no blur, no glow) */
        const t  = (elapsed - MORPH_START) / MORPH_DUR;
        const et = smoothstep(t);
        setGlyph(piEl, 1,                          1 - et);
        setGlyph(iEl,  lerp(0.82, 1, easeOut2(t)), et);

      } else {
        /* Phase 4: I settled — trigger word strip */
        setGlyph(piEl, 1, 0);
        setGlyph(iEl,  1, 1);

        if (!morphDone) {
          morphDone = true;
          setTimeout(() => {
            wordCanvas.style.opacity = '1';
            wordRunning = true;
            requestAnimationFrame(wordFrame);
          }, WORDS_DELAY);
        }
        return; /* stop main loop */
      }

      requestAnimationFrame(mainFrame);
    }

    requestAnimationFrame(mainFrame);
  })();
  </script>

</body>
</html>
