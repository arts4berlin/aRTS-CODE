  </script>
  <script>

  <link href="assets/fonts/space-grotesk.css" rel="stylesheet">

<body>

  <!-- ── Header ── -->
  <header class="site-header">

      <div class="taste-actions">
        <button class="taste-btn taste-btn-nope" id="taste-nope" aria-label="Dislike">✕</button>
        <button class="taste-btn taste-btn-love" id="taste-love" aria-label="Love">♥</button>
        <button class="taste-btn taste-btn-like" id="taste-like" aria-label="Like">✓</button>

<script src="consent.js"></script>
  <script src="auth.js"></script>
  <script src="btn-fx.js"></script>
  <script src="taste.js"></script>
  <script>
    window.artsCornerAdd({ label: 'hOME', href: 'home.html' });
  </script>

  <!-- Burger toggle -->
  <script>
  (function(){
    var b=document.getElementById('burger'),o=document.getElementById('nav-overlay');
    if(b&&o){b.addEventListener('click',function(){o.classList.toggle('open');b.classList.toggle('open');});}
    o.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){o.classList.remove('open');b.classList.remove('open');});});
  })();
  </script>
