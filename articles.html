  <script>
    (function () {
      function reveal() {
        var c = document.createElement('div');
        var _bg = document.documentElement.getAttribute('data-theme') === 'day' ? '#fff' : '#000';
        c.style.cssText = 'position:fixed;inset:0;background:' + _bg + ';z-index:99998;pointer-events:none;opacity:1;';
        document.body.appendChild(c);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            c.style.transition = 'opacity 0.22s ease';
            c.style.opacity    = '0';
            setTimeout(function () { if (c.parentNode) c.parentNode.removeChild(c); }, 320);
          });
        });
      }
      window.addEventListener('pageshow', function (e) { if (e.persisted) reveal(); });
    })();
  </script>

  <!-- Nav & logo hover -->
  <script>
  (function(){
    var DELAY = 40;
    function navHover(el){
      var orig = el.textContent;
      var timers=[], state=0;
      function clr(){ timers.forEach(clearTimeout); timers.length=0; }
      function render(n){
        var s=orig[0];
        for(var i=1;i<orig.length;i++) s+=(i<=n ? orig[i].toLowerCase() : orig[i]);
        el.textContent=s;
      }
      el.addEventListener('mouseenter',function(){
        clr(); var from=state;
        for(var i=0;i<orig.length-1-from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from+i+1);},i*DELAY));
        })(i);
      });
      el.addEventListener('mouseleave',function(){
        clr(); var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    }
    document.querySelectorAll('nav a, a.nav-about').forEach(navHover);
logo.addEventListener('mouseleave',function(){
        clr(); var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    });
  })();
  </script>

  <!-- Mobile burger menu -->
  <script>
  (function(){
    var burger=document.getElementById('burger'),overlay=document.getElementById('nav-overlay'),close=document.getElementById('burger-close');
    if(!burger||!overlay)return;
    burger.addEventListener('click',function(){overlay.classList.add('is-open');});
    close.addEventListener('click',function(){overlay.classList.remove('is-open');});
    overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.classList.remove('is-open');});
  })();
  </script>
<script>
  /* ── Article publish XP hook (call when article is created) ── */
  function awardArticleXP() {
    try {
      if (!localStorage.getItem('arts_id_hash')) return;
      var ptsCfg=null;try{ptsCfg=JSON.parse(localStorage.getItem('arts_points_config'));}catch(e){}
      var artPts=(ptsCfg&&ptsCfg.events&&ptsCfg.events.article_view!=null)?ptsCfg.events.article_view:150;
      var cur = parseInt(localStorage.getItem('arts_points') || '0', 10);
      localStorage.setItem('arts_points', String(cur + artPts));
      var pending = JSON.parse(sessionStorage.getItem('arts_xp_pending') || '[]');
      pending.push({ label: 'aRTICLE', pts: artPts });
      sessionStorage.setItem('arts_xp_pending', JSON.stringify(pending));
    } catch(e) {}
  }
</script>
