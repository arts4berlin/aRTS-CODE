  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;

      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
    }

    /* ── Fixed header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 26px 32px;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 60%, transparent);
    }

    .logo {
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1;
      cursor: crosshair;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 2.4rem;
    }

    nav a {
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      opacity: 0.85;
      cursor: crosshair;
      transition: opacity 0.15s;

    nav a:hover { opacity: 1; }
    nav a.active { opacity: 1; font-weight: 600; }

    /* ── Article list ── */
    main {
      padding-top: clamp(100px, 14vh, 130px);

      padding-right: clamp(24px, 8vw, 120px);
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: clamp(32px, 5vw, 56px);
    }

    .section-label {
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      margin-bottom: clamp(16px, 3vh, 28px);
    }

    .article-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .article-item {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1.5rem;
      padding: clamp(16px, 2.5vh, 22px) 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      text-decoration: none;
      color: #fff;
      transition: color 0.15s;
      cursor: default;
    }
    .article-item:first-child { border-top: 1px solid rgba(255,255,255,0.08); }
    .article-item.linked { cursor: pointer; }
    .article-item.linked:hover .article-title { color: #FF5C00; }

    .article-title {
      font-size: clamp(0.95rem, 2.2vw, 1.15rem);
      font-weight: 600;
      letter-spacing: 0.06em;
      transition: color 0.15s;
      flex: 1;
    }

    .article-meta {
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.28);
      white-space: nowrap;
    }

    /* Placeholder state */
    .article-item.wip .article-title { color: rgba(255,255,255,0.22); }
    .article-item.wip .article-meta  { color: rgba(255,255,255,0.12); }

    /* ── dvh fix ── */
    @supports (height: 100dvh) { body { min-height: 100dvh; } }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    .logo, .nav-about, header { touch-action: manipulation; }
    .btn, button, a { touch-action: manipulation; }

    /* ── Mobile hamburger + overlay ── */
    .burger { display:none; flex-direction:column; align-items:center; justify-content:center; background:none; border:none; cursor:pointer; padding:6px; z-index:101; }
    .burger span { display:block; width:18px; height:1.5px; background:#fff; border-radius:1px; margin:2px 0; }
    .burger .burger-label { font-family:'Space Grotesk',sans-serif; font-size:0.42rem; font-weight:700; letter-spacing:0.18em; color:rgba(255,255,255,0.48); margin-top:2px; line-height:1; display:none; width:auto; height:auto; background:none; border-radius:0; }
    .mobile-id { display:none; text-decoration:none; font-family:'Space Grotesk',sans-serif; font-size:0.78rem; font-weight:700; letter-spacing:0.12em; color:#FF5C00; }
    .nav-overlay { position:fixed; inset:0; background:#000; z-index:9990; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:clamp(1.2rem,4vh,2rem); opacity:0; visibility:hidden; pointer-events:none; transition:opacity 0.22s ease, visibility 0s 0.22s; }
    .nav-overlay.is-open { opacity:1; visibility:visible; pointer-events:auto; transition:opacity 0.22s ease, visibility 0s; }
    .nav-overlay a { display:block; text-decoration:none; color:#fff; font-size:clamp(1.3rem,7vw,2rem); font-weight:700; letter-spacing:0.16em; opacity:0.85; line-height:1; padding:0.55em 1.6em; transition:opacity 0.12s, color 0.12s; touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
    .nav-overlay a:active, .nav-overlay a:hover { opacity:1; color:#FF5C00; }
    .nav-overlay .overlay-close { position:absolute; top:18px; right:16px; }

    @media (max-width: 520px) {
      header { padding: 18px 16px; }
      nav { display: none; }
      .burger { display:flex; gap:0; }
      .burger span:not(.burger-label) { display:none; }
      .burger .burger-label { display:block; font-size:1rem; font-weight:300; letter-spacing:0.05em; color:rgba(255,255,255,0.88); margin-top:0; }
      .overlay-close .burger-label { font-size:1.1rem; opacity:0.72; }
      .mobile-id { display:block; }
      .nav-overlay, .nav-overlay.is-open { transition:none; }
    }
  
    /* ── Global: no text selection; no double-tap zoom (pinch zoom kept) ── */
    * { -webkit-user-select: none; user-select: none; }
    input, textarea, select, [contenteditable] { -webkit-user-select: text; user-select: text; }
    html { touch-action: manipulation; }

  <script>
    (function () {
      function reveal() {
        var c = document.createElement('div');
        c.style.cssText = 'position:fixed;inset:0;background:#000;z-index:99998;pointer-events:none;opacity:1;';
        document.body.appendChild(c);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            c.style.transition = 'opacity 0.22s ease';
            c.style.opacity    = '0';
            setTimeout(function () { if (c.parentNode) c.parentNode.removeChild(c); }, 320);
          });
        });
      }
      window.addEventListener('pageshow', function (e) { if (e.persisted) reveal(); });
    })();
  </script>

  <!-- Nav & logo hover -->
  <script>
  (function(){
    var DELAY = 40;
    function navHover(el){
      var orig = el.textContent;
      var timers=[], state=0;
      function clr(){ timers.forEach(clearTimeout); timers.length=0; }
      function render(n){
        var s=orig[0];
        for(var i=1;i<orig.length;i++) s+=(i<=n ? orig[i].toLowerCase() : orig[i]);
        el.textContent=s;
      }
      el.addEventListener('mouseenter',function(){
        clr(); var from=state;
        for(var i=0;i<orig.length-1-from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from+i+1);},i*DELAY));
        })(i);
      });
      el.addEventListener('mouseleave',function(){
        clr(); var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    }
    document.querySelectorAll('nav a, a.nav-about').forEach(navHover);
    document.querySelectorAll('a.logo[data-inner]').forEach(function(logo){
      var inner=logo.dataset.inner;
      var timers=[], state=0;
      function clr(){ timers.forEach(clearTimeout); timers.length=0; }
      function render(n){ logo.textContent='[a'+inner.slice(0,n)+']'; }
      logo.addEventListener('mouseenter',function(){
        clr(); var from=state;
        for(var i=from;i<inner.length;i++)(function(i){
          timers.push(setTimeout(function(){render(state=i+1);},(i-from)*DELAY));
        })(i);
      });
      logo.addEventListener('mouseleave',function(){
        clr(); var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    });
  })();
  </script>

  <!-- Mobile burger menu -->
  <script>
  (function(){
    var burger=document.getElementById('burger'),overlay=document.getElementById('nav-overlay'),close=document.getElementById('burger-close');
    if(!burger||!overlay)return;
    burger.addEventListener('click',function(){overlay.classList.add('is-open');});
    close.addEventListener('click',function(){overlay.classList.remove('is-open');});
    overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.classList.remove('is-open');});
  })();
  </script>

  function awardArticleXP() {
    try {
      if (!localStorage.getItem('arts_id_hash')) return;
      var cur = parseInt(localStorage.getItem('arts_points') || '0', 10);
      localStorage.setItem('arts_points', String(cur + 150));
      var pending = JSON.parse(sessionStorage.getItem('arts_xp_pending') || '[]');
      pending.push({ label: 'aRTICLE', pts: 150 });
      sessionStorage.setItem('arts_xp_pending', JSON.stringify(pending));
    } catch(e) {}
