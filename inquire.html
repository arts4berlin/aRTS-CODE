  <style>
    /* ── Page-specific: inquire form ── */
    .form-col {
      width: min(92vw, 560px);
      display: flex;
      flex-direction: column;
    }

    .section-label {
      font-size: 0.62rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.28em;
      color: var(--c-text-ghost);
      text-transform: uppercase;
      margin-bottom: clamp(6px, 1vh, 10px);
    }

    .form-title {
      font-size: clamp(2rem, 6vw, 3.4rem);
      font-weight: var(--fw-bold);
      letter-spacing: 0.08em;
      line-height: 1;
      color: var(--c-text);
      margin-bottom: clamp(20px, 3.5vh, 36px);
    }

    .piece-ref {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: clamp(12px, 1.8vh, 18px) 0;
      border-bottom: 1px solid var(--c-border);
      margin-bottom: clamp(24px, 4vh, 38px);
    }

    .piece-ref-label {
      font-size: 0.58rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.22em;
      color: var(--c-text-ghost);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .piece-ref-name {
      font-size: 0.9rem;
      font-weight: var(--fw-bold);
      letter-spacing: 0.1em;
      color: var(--c-accent);
      word-break: break-all;
    }

    /* Form fields */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: clamp(18px, 2.8vh, 28px);
    }

    .field label {
      font-size: 0.58rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.24em;
      color: var(--c-text-ghost);
      text-transform: uppercase;
    }

    .field input,
    .field textarea {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--c-border);
      color: var(--c-text);
      font-family: var(--font);
      font-size: clamp(0.85rem, 2.2vw, 1rem);
      font-weight: var(--fw-light);
      letter-spacing: 0.04em;
      padding: 0.5rem 0;
      outline: none;
      width: 100%;
      transition: border-color var(--dur-fast);
      resize: none;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: var(--c-text-ghost);
    }

    .field input:focus,
    .field textarea:focus {
      border-bottom-color: var(--c-text-tertiary);
    }

    .field textarea { min-height: 110px; line-height: 1.6; }

    /* Error + Submit */
    .error-msg {
      font-size: 0.65rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.16em;
      color: var(--c-error);
      min-height: 1.2em;
      margin-bottom: clamp(10px, 1.5vh, 16px);
    }

    .submit-row {
      display: flex;
      align-items: center;
      gap: 1.4rem;
      margin-top: clamp(10px, 1.5vh, 18px);
    }

    .btn-send {
      font-family: var(--font);
      font-size: clamp(0.82rem, 2vw, 0.96rem);
      font-weight: var(--fw-bold);
      letter-spacing: 0.18em;
      cursor: pointer;
      padding: 0.85rem clamp(1.6rem, 4vw, 2.8rem);
      background: var(--c-text);
      color: var(--c-bg);
      border: 2px solid var(--c-text);
      border-radius: 4px;
      transition: background var(--dur-fast), border-color var(--dur-fast), color var(--dur-fast);
    }
    .btn-send:hover   { background: var(--c-accent); border-color: var(--c-accent); color: var(--c-bg); }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

    .back-link {
      font-size: 0.62rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.14em;
      color: var(--c-text-ghost);
      text-decoration: none;
      transition: color var(--dur-fast);
    }
    .back-link:hover { color: var(--c-text-secondary); }

    /* ── Success state — hidden until JS shows it ── */
    #success {
      display: none;
      flex-direction: column;
      gap: clamp(10px, 1.5vh, 16px);
      transition: opacity 0.22s ease;
    }

    .success-check {
      font-size: clamp(2.2rem, 7vw, 3.2rem);
      color: var(--c-accent);
      line-height: 1;
    }

    .success-sub {
      font-size: 0.65rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.22em;
      color: var(--c-text-ghost);
      text-transform: uppercase;
      line-height: 1.8;
    }

    .divider-thin {
      width: 100%;
      height: 1px;
      background: var(--c-border);
      margin: clamp(14px, 2vh, 22px) 0;
    }

    /* Page entrance */
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .site-main > * {
      animation: pageIn 0.5s var(--ease-out) backwards;
    }
    .site-main .form-col { animation-delay: 0.05s; }

    /* ── Day mode overrides ── */
    [data-theme="day"] .form-title { color: var(--c-text); }
    [data-theme="day"] .field input,
    [data-theme="day"] .field textarea {
      color: var(--c-text);
      border-bottom-color: var(--c-border);
    }
    [data-theme="day"] .field input:focus,
    [data-theme="day"] .field textarea:focus {
      border-bottom-color: var(--c-text-secondary);
    }
    [data-theme="day"] .field input::placeholder,
    [data-theme="day"] .field textarea::placeholder {
      color: var(--c-text-ghost);
    }
    [data-theme="day"] .btn-send {
      background: var(--c-text);
      color: var(--c-bg);
      border-color: var(--c-text);
    }
    [data-theme="day"] .btn-send:hover {
      background: var(--c-accent);
      border-color: var(--c-accent);
    }
    [data-theme="day"] .piece-ref-name { color: var(--c-accent); }
    [data-theme="day"] .success-check { color: var(--c-accent); }
    [data-theme="day"] .piece-ref {
      border-bottom-color: var(--c-border);
    }
    [data-theme="day"] .divider-thin {
      background: var(--c-border);
    }
    [data-theme="day"] .error-msg {
      color: var(--c-error);
    }
  </style>

  <script>
  (function(){
    /* ── Pre-fill piece reference from URL ?piece=TITLE ── */
    var params  = new URLSearchParams(window.location.search);
    var piece   = params.get('piece') || '';
    var refName = document.getElementById('piece-ref-name');
    var fPiece  = document.getElementById('f-piece');
    var refRow  = document.getElementById('piece-ref-row');

    if(piece){
      refName.textContent = piece;
      fPiece.value        = piece;
    } else {
      refRow.style.display = 'none';
    }

    /* ── Pre-fill name/email from member store if logged in ── */
    try {
      if (sessionStorage.getItem('arts_alias_unlocked')) {
        var alias = localStorage.getItem('arts_alias');
        if(alias) document.getElementById('f-name').value = alias;
      }
    } catch(e) {}

    /* ── Check if piece is admin-listed (routes to admin inbox) ── */
    var isAdminPiece = false;
    var ADMIN_ENDPOINT = 'https://formspree.io/f/xaqpqzea'; /* TODO: Replace with separate admin Formspree endpoint */
    var PUBLIC_ENDPOINT = 'https://formspree.io/f/xaqpqzea';
    if(piece){
      fetch('data/pieces.json?v=' + Date.now())
        .then(function(r){ return r.ok ? r.json() : []; })
        .then(function(pieces){
          var match = pieces.find(function(p){ return p.title === piece; });
          if(match && match.admin){
            isAdminPiece = true;
            /* Update subject for admin routing */
            document.querySelector('input[name="_subject"]').value = '[aRTS] — aDMIN iNQUIRY';
          }
        })
        .catch(function(){});
    }

    /* ── Form submission via Formspree (AJAX) ── */
    var form   = document.getElementById('inq-form');
    var btn    = document.getElementById('btn-send');
    var errEl  = document.getElementById('err-msg');

    form.addEventListener('submit', async function(e){
      e.preventDefault();
      errEl.textContent = '';

      var name  = document.getElementById('f-name').value.trim();
      var email = document.getElementById('f-email').value.trim();
      var msg   = document.getElementById('f-msg').value.trim();

      /* Basic client-side validation */
      if(!name)  { errEl.textContent = '— nAME rEQUIRED'; return; }
      if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
        errEl.textContent = '— vALID eMAIL rEQUIRED'; return;
      }
      if(!msg)   { errEl.textContent = '— mESSAGE rEQUIRED'; return; }

      btn.disabled    = true;
      btn.textContent = 'sENDING…';
      /* Dim the form fields while request is in-flight */
      form.style.opacity = '0.4';
      form.style.pointerEvents = 'none';

      try {
        var endpoint = isAdminPiece ? ADMIN_ENDPOINT : PUBLIC_ENDPOINT;
        var res = await fetch(endpoint, {
          method:  'POST',
          headers: { 'Accept': 'application/json' },
          body:    new FormData(form)
        });

        if(res.ok){
          /* Fade out form, fade in success */
          var wrap = document.getElementById('inq-form-wrap');
          wrap.style.transition = 'opacity 0.22s ease';
          wrap.style.opacity = '0';
          setTimeout(function(){
            wrap.hidden = true;
            var suc = document.getElementById('success');
            suc.style.opacity = '0';
            suc.style.display = 'flex';
            requestAnimationFrame(function(){
              requestAnimationFrame(function(){ suc.style.opacity = '1'; });
            });
          }, 240);
        } else {
          errEl.textContent = '— sEND fAILED · tRY aGAIN';
          btn.disabled    = false;
          btn.textContent = 'sEND iNQUIRY';
          form.style.opacity = '1';
          form.style.pointerEvents = '';
        }
      } catch(err){
        errEl.textContent = '— nETWORK eRROR · cHECK cONNECTION';
        btn.disabled    = false;
        btn.textContent = 'sEND iNQUIRY';
        form.style.opacity = '1';
        form.style.pointerEvents = '';
      }
    });
  })();
  </script>

  <!-- Nav hover lowercase animation -->
  <script>
  (function(){
    var DELAY=40;
    function navHover(el){
      var orig=el.textContent,timers=[],state=0;
      function clr(){timers.forEach(clearTimeout);timers.length=0;}
      function render(n){var s=orig[0];for(var i=1;i<orig.length;i++)s+=(i<=n?orig[i].toLowerCase():orig[i]);el.textContent=s;}
      el.addEventListener('mouseenter',function(){clr();var from=state;for(var i=0;i<orig.length-1-from;i++)(function(i){timers.push(setTimeout(function(){render(state=from+i+1);},i*DELAY));})(i);});
      el.addEventListener('mouseleave',function(){clr();var from=state;for(var i=0;i<from;i++)(function(i){timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));})(i);});
    }
    document.querySelectorAll('.site-nav a').forEach(navHover);

    /* Idle static glitch */
    (function(){
      var links=Array.from(document.querySelectorAll('.site-nav a'));
      var origTxt=links.map(function(el){return el.textContent;});
      var glyphs='▓░▒│╌·×÷¬±';
      function tick(){
        var li=Math.floor(Math.random()*links.length);
        var el=links[li];
        var txt=origTxt[li];
        var ci=1+Math.floor(Math.random()*(txt.length-1));
        var arr=txt.split('');
        arr[ci]=glyphs[Math.floor(Math.random()*glyphs.length)];
        el.textContent=arr.join('');
        setTimeout(function(){el.textContent=txt;},90);
        setTimeout(tick,2600+Math.random()*3800);
      }
      setTimeout(tick,1200+Math.random()*1800);
    })();

    /* Logo [a] expand */
    document.querySelectorAll('a.site-logo[data-inner]').forEach(function(logo){
      var inner=logo.dataset.inner;
      var timers=[],state=0;
      function clr(){timers.forEach(clearTimeout);timers.length=0;}
      function render(n){logo.textContent='[a'+inner.slice(0,n)+']';}
      logo.addEventListener('mouseenter',function(){
        clr();var from=state;
        for(var i=from;i<inner.length;i++)(function(i){
          timers.push(setTimeout(function(){render(state=i+1);},(i-from)*DELAY));
        })(i);
      });
      logo.addEventListener('mouseleave',function(){
        clr();var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    });
  })();
  </script>

  <!-- Page transition -->
  <script>
  (function(){
    document.addEventListener('click',function(ev){
      var a=ev.target.closest('a[href]');if(!a)return;
      var h=a.getAttribute('href');
      if(!h||h.charAt(0)==='#'||/^(https?:|mailto:|tel:|\/\/)/.test(h))return;
      if(ev.metaKey||ev.ctrlKey||ev.shiftKey||ev.altKey)return;
      ev.preventDefault();
      document.body.style.transition='opacity 0.2s ease, transform 0.2s ease';
      document.body.style.opacity='0';
      document.body.style.transform='scale(0.99)';
      setTimeout(function(){ window.location.href=h; },220);
    },true);
  })();
  </script>
