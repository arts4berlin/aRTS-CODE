  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 26px 32px;

      text-decoration: none;

      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    nav { display: flex; align-items: center; gap: 2.4rem; }
    nav a {
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      opacity: 0.85;
      transition: opacity 0.15s;
    }
    nav a:hover { opacity: 1; }

    main {
      padding-top: clamp(90px, 14vh, 120px);
      padding-bottom: clamp(80px, 10vh, 130px);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .form-col {
      width: min(92vw, 560px);
      display: flex;
      flex-direction: column;
    }

    .section-label {
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      margin-bottom: clamp(6px, 1vh, 10px);
    }

    .form-title {
      font-size: clamp(2rem, 6vw, 3.4rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1;
      color: #fff;
      margin-bottom: clamp(20px, 3.5vh, 36px);
    }

    .piece-ref {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: clamp(12px, 1.8vh, 18px) 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: clamp(24px, 4vh, 38px);
    }

    .piece-ref-label {
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.22);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .piece-ref-name {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #FF5C00;
      word-break: break-all;
    }

    /* Form fields */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: clamp(18px, 2.8vh, 28px);
    }

    .field label {
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.24em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
    }

    .field input,
    .field textarea {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.85rem, 2.2vw, 1rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      padding: 0.5rem 0;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
      resize: none;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: rgba(255,255,255,0.08);
    }

    .field input:focus,
    .field textarea:focus {
      border-bottom-color: rgba(255,255,255,0.35);
    }

    .field textarea { min-height: 110px; line-height: 1.6; }

    /* Error + Submit */
    .error-msg {
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.16em;
      color: rgba(255,80,80,0.8);
      min-height: 1.2em;
      margin-bottom: clamp(10px, 1.5vh, 16px);
    }

    .submit-row {
      display: flex;
      align-items: center;
      gap: 1.4rem;
      margin-top: clamp(10px, 1.5vh, 18px);
    }

    .btn-send {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.82rem, 2vw, 0.96rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      cursor: pointer;
      padding: 0.85rem clamp(1.6rem, 4vw, 2.8rem);
      background: #fff;
      color: #000;
      border: 2px solid #fff;
      border-radius: 4px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-send:hover   { background: #FF5C00; border-color: #FF5C00; }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

    .back-link {
      font-size: 0.62rem;

      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.22);
      text-decoration: none;
      transition: color 0.15s;
    }
    .back-link:hover { color: rgba(255,255,255,0.55); }

    /* ── Success state — hidden until JS shows it ── */
    #success {
      display: none;          /* JS sets display:flex on success */
      flex-direction: column;
      gap: clamp(10px, 1.5vh, 16px);
      transition: opacity 0.22s ease;
    }

    .success-check {
      font-size: clamp(2.2rem, 7vw, 3.2rem);
      color: #FF5C00;
      line-height: 1;
    }

    .success-sub {
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase;
      line-height: 1.8;

    .divider-thin {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: clamp(14px, 2vh, 22px) 0;
    }

    /* ── Mobile ── */
    html { background: #000; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    header, nav, a, button { touch-action: manipulation; }

    @media (max-width: 520px) {
      header { padding: 18px 16px; }
      nav    { gap: clamp(0.7rem, 3.5vw, 1.4rem); }
      nav a  { font-size: clamp(0.7rem, 2.2vw, 0.85rem); }
    }
  
    /* ── Global: no text selection; no double-tap zoom (pinch zoom kept) ── */
    * { -webkit-user-select: none; user-select: none; }
    input, textarea, select, [contenteditable] { -webkit-user-select: text; user-select: text; }
    html { touch-action: manipulation; }
</style>

<body>
  <script>(function(){document.documentElement.style.background='#000';if(!sessionStorage.getItem('crt_transition'))return;document.documentElement.style.clipPath='inset(50% 0 50% 0)';})()</script>

        </p>
        <div class="divider-thin"></div>

  <script>
  (function(){
    /* ── Pre-fill piece reference from URL ?piece=TITLE ── */
    var params  = new URLSearchParams(window.location.search);
    var piece   = params.get('piece') || '';
    var refName = document.getElementById('piece-ref-name');
    var fPiece  = document.getElementById('f-piece');
    var refRow  = document.getElementById('piece-ref-row');

    if(piece){
      refName.textContent = piece;
      fPiece.value        = piece;
    } else {
      refRow.style.display = 'none';
    }

    /* ── Pre-fill name/email from member store if logged in ── */
    try {
      var alias = localStorage.getItem('arts_alias');
      if(alias) document.getElementById('f-name').value = alias;
    } catch(e) {}

    /* ── Form submission via Formspree (AJAX) ── */
    var form   = document.getElementById('inq-form');
    var btn    = document.getElementById('btn-send');
    var errEl  = document.getElementById('err-msg');

    form.addEventListener('submit', async function(e){
      e.preventDefault();
      errEl.textContent = '';

      var name  = document.getElementById('f-name').value.trim();
      var email = document.getElementById('f-email').value.trim();
      var msg   = document.getElementById('f-msg').value.trim();

      /* Basic client-side validation */
      if(!name)  { errEl.textContent = '— nAME rEQUIRED'; return; }
      if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
        errEl.textContent = '— vALID eMAIL rEQUIRED'; return;
      }
      if(!msg)   { errEl.textContent = '— mESSAGE rEQUIRED'; return; }

      btn.disabled    = true;
      btn.textContent = 'sENDING…';
      /* Dim the form fields while request is in-flight */
      form.style.opacity = '0.4';
      form.style.pointerEvents = 'none';

      try {
        var res = await fetch('https://formspree.io/f/xaqpqzea', {
          method:  'POST',
          headers: { 'Accept': 'application/json' },
          body:    new FormData(form)
        });

        if(res.ok){
          /* Fade out form, fade in success */
          var wrap = document.getElementById('inq-form-wrap');
          wrap.style.transition = 'opacity 0.22s ease';
          wrap.style.opacity = '0';
          setTimeout(function(){
            wrap.hidden = true;
            var suc = document.getElementById('success');
            suc.style.opacity = '0';
            suc.style.display = 'flex';
            requestAnimationFrame(function(){
              requestAnimationFrame(function(){ suc.style.opacity = '1'; });
            });
          }, 240);
        } else {
          errEl.textContent = '— sEND fAILED · tRY aGAIN';
          btn.disabled    = false;
          btn.textContent = 'sEND iNQUIRY';
          form.style.opacity = '1';
          form.style.pointerEvents = '';
        }
      } catch(err){
        errEl.textContent = '— nETWORK eRROR · cHECK cONNECTION';
        btn.disabled    = false;
        btn.textContent = 'sEND iNQUIRY';
        form.style.opacity = '1';
        form.style.pointerEvents = '';
      }
    });
  })();
  </script>

  <script>
    (function () {
      function reveal() {
        var c = document.createElement('div');
        c.style.cssText = 'position:fixed;inset:0;background:#000;z-index:99998;pointer-events:none;opacity:1;';
        document.body.appendChild(c);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            c.style.transition = 'opacity 0.22s ease';
            c.style.opacity    = '0';
            setTimeout(function () { if (c.parentNode) c.parentNode.removeChild(c); }, 320);
          });
        });
      }
      window.addEventListener('pageshow', function (e) { if (e.persisted) reveal(); });
    })();
  </script>

  <!-- CRT channel-change transition -->
  <script>
  (function(){
    var scan=null,vig=null,busy=false;
    function mkL(){
      if(scan)return;
      scan=document.createElement('div');
      scan.style.cssText='position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,14,0,0.50) 3px,rgba(0,14,0,0.50) 4px);opacity:0;z-index:99997;pointer-events:none;';
      vig=document.createElement('div');
      vig.style.cssText='position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,0.88) 100%);opacity:0;z-index:99996;pointer-events:none;';
      document.body.appendChild(scan);document.body.appendChild(vig);
    }
    function lerp(a,b,t){return a+(b-a)*t;}
    function easeOut3(t){return 1-Math.pow(1-Math.min(1,Math.max(0,t)),3);}
    function smooth(t){var c=Math.min(1,Math.max(0,t));return c*c*(3-2*c);}
    function doEnter(){
      mkL();var T1=130,T2=780,T3=1150,s0=null;
      function run(ts){if(!s0)s0=ts;var e=ts-s0;
        if(e<T1){scan.style.opacity=String(lerp(0,1,e/T1));vig.style.opacity='0.95';}
        else if(e<T2){var t=(e-T1)/(T2-T1),p=lerp(50,0,easeOut3(t));document.documentElement.style.clipPath='inset('+p.toFixed(2)+'% 0 '+p.toFixed(2)+'% 0)';scan.style.opacity='1';vig.style.opacity=String(lerp(0.95,0.55,easeOut3(t)));}
        else if(e<T3){var t2=(e-T2)/(T3-T2),et=smooth(t2);document.documentElement.style.clipPath='';scan.style.opacity=String(lerp(1,0,et));vig.style.opacity=String(lerp(0.55,0,et));}
        else{document.documentElement.style.clipPath='';if(scan&&scan.parentNode)scan.parentNode.removeChild(scan);if(vig&&vig.parentNode)vig.parentNode.removeChild(vig);scan=null;vig=null;busy=false;return;}
        requestAnimationFrame(run);}
      requestAnimationFrame(run);}
    function doExit(dest){
      if(busy)return;busy=true;mkL();var TR=60,TS=320,s0=null;
      function run(ts){if(!s0)s0=ts;var e=ts-s0;
        if(e<TR){scan.style.opacity=String(lerp(0,1,e/TR));vig.style.opacity=String(lerp(0,0.95,e/TR));}
        else if(e<TR+TS){var t=(e-TR)/TS,p=lerp(0,50,smooth(t));document.documentElement.style.clipPath='inset('+p.toFixed(2)+'% 0 '+p.toFixed(2)+'% 0)';scan.style.opacity='1';vig.style.opacity='0.95';}
        else{document.documentElement.style.clipPath='inset(50% 0 50% 0)';document.documentElement.style.background='#000';document.body.style.background='#000';sessionStorage.setItem('crt_transition','1');window.location.href=dest;return;}
        requestAnimationFrame(run);}
      requestAnimationFrame(run);}
    if(sessionStorage.getItem('crt_transition')){sessionStorage.removeItem('crt_transition');doEnter();}
    document.addEventListener('click',function(ev){
      var a=ev.target.closest('a[href]');if(!a)return;
      var h=a.getAttribute('href');
      if(!h||h.charAt(0)==='#'||/^(https?:|mailto:|tel:|\/\/)/.test(h))return;
      if(ev.metaKey||ev.ctrlKey||ev.shiftKey||ev.altKey)return;
      ev.preventDefault();doExit(h);},true);
  })();
  </script>

  <!-- Nav & logo hover -->
  <script>
  (function(){
    var DELAY=40;
    function navHover(el){
      var orig=el.textContent,timers=[],state=0;
      function clr(){timers.forEach(clearTimeout);timers.length=0;}
      function render(n){var s=orig[0];for(var i=1;i<orig.length;i++)s+=(i<=n?orig[i].toLowerCase():orig[i]);el.textContent=s;}
      el.addEventListener('mouseenter',function(){clr();var from=state;for(var i=0;i<orig.length-1-from;i++)(function(i){timers.push(setTimeout(function(){render(state=from+i+1);},i*DELAY));})(i);});
      el.addEventListener('mouseleave',function(){clr();var from=state;for(var i=0;i<from;i++)(function(i){timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));})(i);});
    }
    document.querySelectorAll('nav a').forEach(navHover);
    document.querySelectorAll('a.logo[data-inner]').forEach(function(logo){
      var inner=logo.dataset.inner,timers=[],state=0;
      function clr(){timers.forEach(clearTimeout);timers.length=0;}
      function render(n){logo.textContent='[a'+inner.slice(0,n)+']';}
      logo.addEventListener('mouseenter',function(){clr();var from=state;for(var i=from;i<inner.length;i++)(function(i){timers.push(setTimeout(function(){render(state=i+1);},(i-from)*DELAY));})(i);});
      logo.addEventListener('mouseleave',function(){clr();var from=state;for(var i=0;i<from;i++)(function(i){timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));})(i);});
    });
  })();
  </script>
