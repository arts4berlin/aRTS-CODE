<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="icon" href="assets/favicon-64.png" sizes="64x64" type="image/png">
  <link rel="icon" href="assets/favicon.png" sizes="32x32" type="image/png">

  <link rel="apple-touch-icon" href="assets/favicon-180.png">
  <meta property="og:type"         content="website">
  <meta property="og:url"          content="https://4-arts.com/">
  <meta property="og:title"        content="[aRTS]">
  <meta property="og:description"  content="TRaDE + CONNeCT — now in BERLIN">
  <meta property="og:image"        content="https://4-arts.com/assets/og-banner.png">
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="[aRTS]">
  <meta name="twitter:description" content="TRaDE + CONNeCT — now in BERLIN">
  <meta name="twitter:image"       content="https://4-arts.com/assets/og-banner.png">
  <title>[aRTS]</title>
  <script>
    document.documentElement.style.background = '#000';
    if(localStorage.getItem('arts_theme')==='day'){document.documentElement.style.background='#fff';document.documentElement.setAttribute('data-theme','day');}
    if (!localStorage.getItem('captcha_passed')) {
      window.location.replace('tail.html');
    }
    var _to      = new URLSearchParams(location.search).get('to');
    var DEST_URL = _to === 'insta' ? 'socials.html'
                 : _to === 'email' ? 'mail.html'
                 : 'home.html';
    var DEST_LABEL = _to === 'insta' ? 'INSTa'
                   : _to === 'email' ? 'E-MaIL'
                   : '→';
  </script>
  <link href="assets/fonts/space-grotesk.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gate-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.4rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.16em;
      color: #FF5C00;
      opacity: 0;
      transform: scale(0.86);
      animation: gIn 0.38s cubic-bezier(0.22, 1, 0.36, 1) 0.08s forwards;
    }

    @keyframes gIn  { to { opacity: 1; transform: scale(1); } }
    @keyframes gOut { to { opacity: 0; transform: scale(1.1); } }
    .gate-out { animation: gOut 0.22s ease forwards; }
  
    /* ── dvh fix: excludes iOS Safari address bar ── */
    @supports (height: 100dvh) {
      body { height: 100dvh; }
    }
    /* ── Mobile: safe area + text-size ── */
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    .logo, .nav-about, header { touch-action: manipulation; }
    .btn, button, a { touch-action: manipulation; }
  
    /* ── Global: no text selection; no double-tap zoom (pinch zoom kept) ── */
    * { -webkit-user-select: none; user-select: none; }
    input, textarea, select, [contenteditable] { -webkit-user-select: text; user-select: text; }
    html { touch-action: manipulation; }

    /* ── Day mode ── */
    html[data-theme="day"] { background: #fff; }
    [data-theme="day"] body { background: #fff; }
</style>
</head>
<body>
  <div id="gate-label" class="gate-label"></div>

  <script>
    document.getElementById('gate-label').textContent = DEST_LABEL;

    setTimeout(function () {
      document.getElementById('gate-label').classList.add('gate-out');
      setTimeout(function () { window.location.href = DEST_URL; }, 160);
    }, 550);
  </script>
<script src="theme.js?v=4"></script>
<script src="auth.js"></script>
</body>
</html>
