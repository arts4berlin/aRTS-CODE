<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/favicon.png?v=4" sizes="32x32" type="image/png">
  <link rel="icon" href="assets/favicon.svg?v=4" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/favicon-180.png?v=4">
  <meta property="og:type"         content="website">
  <meta property="og:url"          content="https://4-arts.com/">
  <meta property="og:title"        content="[aRTS]">
  <meta property="og:description"  content="aRT · aSSETS · aID — now in BERLIN">
  <meta property="og:image"        content="https://4-arts.com/assets/og.png">
  <meta name="twitter:card"        content="summary">
  <meta name="twitter:title"       content="[aRTS]">
  <meta name="twitter:description" content="aRT · aSSETS · aID — now in BERLIN">
  <meta name="twitter:image"       content="https://4-arts.com/assets/og.png">
  <title>[aRTS] — aBOUT</title>
  <!-- Gate: redirect to CAPTCHA if not verified -->
  <script>
    if (!sessionStorage.getItem('captcha_passed')) {
      window.location.replace('index.html');
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
    }

    /* ── Fixed header (matches home.html) ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 26px 32px;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 60%, transparent);
    }

    .logo {
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 2.4rem;
    }

    nav a {
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      opacity: 0.85;
      transition: opacity 0.15s;
    }
    nav a:hover { opacity: 1; }
    nav a.active { opacity: 1; font-weight: 600; }

    /* ── Scrollable photo gallery ── */
    main {
      padding-top: clamp(86px, 13vh, 120px);
      padding-bottom: clamp(60px, 8vh, 100px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(48px, 7vw, 110px);
    }

    /* Each photo fills most of the viewport width, max 1000px */
    .photo {
      display: block;
      width: min(92vw, 1000px);
      height: auto;
    }

  
    /* ── Mobile: safe area + text-size ── */
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    .logo, .nav-about, header { touch-action: manipulation; }
    .btn, button, a { touch-action: manipulation; }
  </style>
</head>
<body>

  <header>
    <a href="home.html" class="logo">[aRTS]</a>
    <nav>
      <a href="about.html" class="active">aBOUT</a>
      <a href="ask.html">aCT</a>
    </nav>
  </header>

  <main>
    <img class="photo" src="assets/about-2.jpg" alt="" fetchpriority="high">
    <img class="photo" src="assets/about-1.jpg" alt="" loading="lazy">
  </main>

  <script>
    (function () {
      function reveal() {
        var c = document.createElement('div');
        c.style.cssText = 'position:fixed;inset:0;background:#000;z-index:99998;pointer-events:none;opacity:1;';
        document.body.appendChild(c);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            c.style.transition = 'opacity 0.22s ease';
            c.style.opacity    = '0';
            setTimeout(function () { if (c.parentNode) c.parentNode.removeChild(c); }, 320);
          });
        });
      }
      window.addEventListener('pageshow', function (e) { if (e.persisted) reveal(); });
    })();
  </script>
</body>
</html>
