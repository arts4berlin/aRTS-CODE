<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[aRTS] — aSK</title>
  <script>
    if (!sessionStorage.getItem('captcha_passed')) {
      window.location.replace('index.html');
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .logo {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 100;
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .tagline {
      padding: 90px 0 0 26vw;
      font-size: 0.92rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      opacity: 0.9;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 24px 80px;
    }

    .question {
      text-align: center;
      margin-bottom: 2rem;
    }

    .question .small {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      display: block;
      margin-bottom: 0.2rem;
    }

    .question .large {
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      display: block;
    }

    .buttons { display: flex; align-items: stretch; }

    .btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      cursor: pointer;
      padding: 0.85rem 2.8rem;
      border: 2px solid #fff;
      transition: background 0.15s, color 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-socials { background: #fff; color: #000; }
    .btn-socials:hover { background: #ddd; border-color: #ddd; }
    .btn-work { background: transparent; color: #fff; }
    .btn-work:hover { background: #fff; color: #000; }
  </style>
</head>
<body>

  <a href="home.html" class="logo">[aRTS]</a>

  <p class="tagline">...aSK aND aNSWERS aPPEAR...</p>

  <main>
    <div class="question">
      <span class="small">aRE YOU</span>
      <span class="large">LOOKING FOR:</span>
    </div>
    <div class="buttons">
      <a href="socials.html" class="btn btn-socials">SOCIALS</a>
      <a href="work.html"    class="btn btn-work">WORK</a>
    </div>
  </main>

</body>
</html>
