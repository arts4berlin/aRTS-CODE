  <meta property="og:type"         content="website">
  <meta property="og:url"          content="https://4-arts.com/">
  <meta property="og:title"        content="[aRTS]">
  <meta property="og:description"  content="aRT · aPPaREL · aID — Berlin.">
  <meta property="og:image"        content="https://4-arts.com/assets/og.svg">
  <meta name="twitter:card"        content="summary">
  <meta name="twitter:title"       content="[aRTS]">
  <meta name="twitter:description" content="aRT · aPPaREL · aID — Berlin.">
  <meta name="twitter:image"       content="https://4-arts.com/assets/og.svg">
  <title>[aRTS] — aCT</title>
  <script>
    if (!sessionStorage.getItem('captcha_passed')) {
      window.location.replace('index.html');
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(1rem, 2.5vh, 2rem);
    }

    .tagline {
      font-size: 0.82rem;
      font-weight: 300;
      letter-spacing: 0.13em;
      opacity: 0.5;
      white-space: nowrap;
    }

    /* Big orange-bordered aCT button */
    .btn-act {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: clamp(220px, 46vw, 430px);
      height: clamp(80px, 14vh, 140px);
      border: 2.5px solid #FF5C00;
      border-radius: 4px;
      background: transparent;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 5.5vw, 3.4rem);
      font-weight: 700;
      letter-spacing: 0.22em;
      text-decoration: none;
      transition: background 0.18s, color 0.18s;
    }
    .btn-act:hover { background: #FF5C00; color: #000; }
    .btn-act { font-variant-numeric: tabular-nums; }

    .logo {
      position: fixed;
      top: 28px; left: 32px;
      z-index: 100;
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    /* aBOUT — subtle top-right nav link */
    .nav-about {
      position: fixed;
      top: 28px;
      right: 32px;
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    .nav-about:hover { opacity: 1; }
  </style>
</head>
<body>

  <a href="home.html" class="logo">[aRTS]</a>
  <a href="about.html" class="nav-about">aBOUT</a>

  <div class="stack">
    <a href="act.html" class="btn-act">aSK</a>
    <span class="tagline">... aND aNSWERS aPPEAR ...</span>
  </div>

  <script>
    (function () {
      const TARGET = 'aSK';
      const POOL   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&!?';
      const btn    = document.querySelector('.btn-act');
      let timer    = null;
      let frame    = 0;
      const FRAMES = 18;
      const RATE   = 45;

      function rand() { return POOL[Math.floor(Math.random() * POOL.length)]; }

      function runScramble() {
        clearInterval(timer);
        frame = 0;
        timer = setInterval(() => {
          const settled = Math.floor((frame / FRAMES) * TARGET.length);
          btn.textContent = TARGET.split('').map((ch, i) =>
            i < settled ? ch : rand()
          ).join('');
          frame++;
          if (frame > FRAMES) {
            clearInterval(timer);
            btn.textContent = TARGET;
          }
        }, RATE);
      }

      /* Touch devices: auto-run on load + repeat; non-touch: hover only */
      if (window.matchMedia('(hover: none)').matches) {
        setTimeout(runScramble, 700);
        setInterval(runScramble, 3500);
      } else {
        btn.addEventListener('mouseenter', runScramble);
        btn.addEventListener('mouseleave', () => {
          clearInterval(timer);
          btn.textContent = TARGET;
        });
      }
    })();
  </script>
  <script>
    (function () {
      function reveal() {
        var c = document.createElement('div');
        c.style.cssText = 'position:fixed;inset:0;background:#000;z-index:99998;pointer-events:none;opacity:1;';
        document.body.appendChild(c);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            c.style.transition = 'opacity 0.22s ease';
            c.style.opacity    = '0';
            setTimeout(function () { if (c.parentNode) c.parentNode.removeChild(c); }, 320);
          });
        });
      }
      window.addEventListener('pageshow', function (e) { if (e.persisted) reveal(); });
    })();
  </script>
</body>
</html>
