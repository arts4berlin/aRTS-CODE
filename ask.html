  <script>(function(){document.documentElement.style.background='#000';if(!sessionStorage.getItem('crt_transition'))return;document.documentElement.style.clipPath='inset(50% 0 50% 0)';})()</script>

      <a href="work.html"    class="btn-act" id="btn-work">wORK<sup style="font-size:0.45em;opacity:0.55;font-weight:300;vertical-align:super;margin-left:2px">?</sup></a>

  <script>
  (function () {
    var POOL   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&!?';
    var FRAMES = 18, RATE = 45;
    var TOUCH  = window.matchMedia('(hover: none)').matches;

    var btns = [
      { id: 'btn-connect', target: 'TaLK' },
      { id: 'btn-work',    target: 'wORK'    }
    ];

    btns.forEach(function (b, idx) {
      var el    = document.getElementById(b.id);
      var timer = null, frame = 0;

      function runScramble() {
        clearInterval(timer);
        frame = 0;
        timer = setInterval(function () {
          var settled = Math.floor((frame / FRAMES) * b.target.length);
          el.textContent = b.target.split('').map(function (ch, i) {
            return i < settled ? ch : POOL[Math.floor(Math.random() * POOL.length)];
          }).join('');
          frame++;
          if (frame > FRAMES) { clearInterval(timer); el.textContent = b.target; }
        }, RATE);
      }

      setTimeout(runScramble, idx * 180);

      if (TOUCH) {
        setInterval(runScramble, 3800 + idx * 600);
      } else {
        el.addEventListener('mouseenter', runScramble);
        el.addEventListener('mouseleave', function () { clearInterval(timer); el.textContent = b.target; });
      }
    });
  })();
  </script>

  <script>
  (function () {
    function reveal() {
      var c = document.createElement('div');
      c.style.cssText = 'position:fixed;inset:0;background:#000;z-index:99998;pointer-events:none;opacity:1;';
      document.body.appendChild(c);
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          c.style.transition = 'opacity 0.22s ease';
          c.style.opacity    = '0';
          setTimeout(function () { if (c.parentNode) c.parentNode.removeChild(c); }, 320);
        });
      });
    }
    window.addEventListener('pageshow', function (e) { if (e.persisted) reveal(); });
  })();
  </script>

  <script>
  (function(){
    var scan=null,vig=null,busy=false;
    function mkL(){
      if(scan)return;
      scan=document.createElement('div');
      scan.style.cssText='position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,14,0,0.50) 3px,rgba(0,14,0,0.50) 4px);opacity:0;z-index:99997;pointer-events:none;';
      vig=document.createElement('div');
      vig.style.cssText='position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,0.88) 100%);opacity:0;z-index:99996;pointer-events:none;';
      document.body.appendChild(scan);
      document.body.appendChild(vig);
    }
    function lerp(a,b,t){return a+(b-a)*t;}
    function easeOut3(t){return 1-Math.pow(1-Math.min(1,Math.max(0,t)),3);}
    function smooth(t){var c=Math.min(1,Math.max(0,t));return c*c*(3-2*c);}

    function doEnter(){
      mkL();
      var T1=130,T2=780,T3=1150,s0=null;
      function run(ts){
        if(!s0)s0=ts;
        var e=ts-s0;
        if(e<T1){
          scan.style.opacity=String(lerp(0,1,e/T1));
          vig.style.opacity='0.95';
        }else if(e<T2){
          var t=(e-T1)/(T2-T1),p=lerp(50,0,easeOut3(t));
          document.documentElement.style.clipPath='inset('+p.toFixed(2)+'% 0 '+p.toFixed(2)+'% 0)';
          scan.style.opacity='1';
          vig.style.opacity=String(lerp(0.95,0.55,easeOut3(t)));
        }else if(e<T3){
          var t2=(e-T2)/(T3-T2),et=smooth(t2);
          document.documentElement.style.clipPath='';
          scan.style.opacity=String(lerp(1,0,et));
          vig.style.opacity=String(lerp(0.55,0,et));
        }else{
          document.documentElement.style.clipPath='';
          if(scan&&scan.parentNode)scan.parentNode.removeChild(scan);
          if(vig&&vig.parentNode)vig.parentNode.removeChild(vig);
          scan=null;vig=null;busy=false;return;
        }
        requestAnimationFrame(run);
      }
      requestAnimationFrame(run);
    }

    function doExit(dest){
      if(busy)return;busy=true;
      mkL();
      var TR=60,TS=320,s0=null;
      function run(ts){
        if(!s0)s0=ts;
        var e=ts-s0;
        if(e<TR){
          scan.style.opacity=String(lerp(0,1,e/TR));
          vig.style.opacity=String(lerp(0,0.95,e/TR));
        }else if(e<TR+TS){
          var t=(e-TR)/TS,p=lerp(0,50,smooth(t));
          document.documentElement.style.clipPath='inset('+p.toFixed(2)+'% 0 '+p.toFixed(2)+'% 0)';
          scan.style.opacity='1';
          vig.style.opacity='0.95';
        }else{
          document.documentElement.style.clipPath='inset(50% 0 50% 0)';
          document.documentElement.style.background='#000';
          document.body.style.background='#000';
          sessionStorage.setItem('crt_transition','1');
          window.location.href=dest;
          return;
        }
        requestAnimationFrame(run);
      }
      requestAnimationFrame(run);
    }

    if(sessionStorage.getItem('crt_transition')){
      sessionStorage.removeItem('crt_transition');
      doEnter();
    }

    document.addEventListener('click',function(ev){
      var a=ev.target.closest('a[href]');
      if(!a)return;
      var h=a.getAttribute('href');
      if(!h||h.charAt(0)==='#'||/^(https?:|mailto:|tel:|\/\/)/.test(h))return;
      if(ev.metaKey||ev.ctrlKey||ev.shiftKey||ev.altKey)return;
      ev.preventDefault();
      doExit(h);
    },true);
  })();
  </script>

  <script>
  (function(){
    var DELAY = 40;
    function navHover(el){
      var orig=el.textContent, timers=[], state=0;
      function clr(){ timers.forEach(clearTimeout); timers.length=0; }
      function render(n){
        var s=orig[0];
        for(var i=1;i<orig.length;i++) s+=(i<=n ? orig[i].toLowerCase() : orig[i]);
        el.textContent=s;
      }
      el.addEventListener('mouseenter',function(){
        clr(); var from=state;
        for(var i=0;i<orig.length-1-from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from+i+1);},i*DELAY));
        })(i);
      });
      el.addEventListener('mouseleave',function(){
        clr(); var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    }
    document.querySelectorAll('a.nav-about').forEach(navHover);
    document.querySelectorAll('a.logo[data-inner]').forEach(function(logo){
      var inner=logo.dataset.inner, timers=[], state=0;
      function clr(){ timers.forEach(clearTimeout); timers.length=0; }
      function render(n){ logo.textContent='[a'+inner.slice(0,n)+']'; }
      logo.addEventListener('mouseenter',function(){
        clr(); var from=state;
        for(var i=from;i<inner.length;i++)(function(i){
          timers.push(setTimeout(function(){render(state=i+1);},(i-from)*DELAY));
        })(i);
      });
      logo.addEventListener('mouseleave',function(){
        clr(); var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    });
  })();
  </script>
