<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[aRTS] — aCT</title>
  <script>
    if (!sessionStorage.getItem('captcha_passed')) {
      window.location.replace('index.html');
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(1rem, 2.5vh, 2rem);
    }

    .tagline {
      font-size: 0.82rem;
      font-weight: 300;
      letter-spacing: 0.13em;
      opacity: 0.5;
      white-space: nowrap;
    }

    /* Big orange-bordered aCT button */
    .btn-act {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: clamp(220px, 46vw, 430px);
      height: clamp(80px, 14vh, 140px);
      border: 2.5px solid #FF5C00;
      background: transparent;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 5.5vw, 3.4rem);
      font-weight: 700;
      letter-spacing: 0.22em;
      text-decoration: none;
      transition: background 0.18s, color 0.18s;
    }
    .btn-act:hover { background: #FF5C00; color: #000; }

    /* Smaller white-filled aBOUT button */
    .btn-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: clamp(150px, 30vw, 270px);
      height: clamp(46px, 8vh, 70px);
      background: #fff;
      border: 2px solid #fff;
      color: #000;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.9rem, 2.3vw, 1.3rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-decoration: none;
      transition: background 0.18s;
    }
    .btn-back:hover { background: #e0e0e0; border-color: #e0e0e0; }
  </style>
</head>
<body>

  <div class="stack">
    <a href="act.html" class="btn-act">aSK</a>
    <span class="tagline">... aND aNSWERS aPPEAR ...</span>
    <a href="about.html" class="btn-back">aBOUT</a>
  </div>

</body>
</html>
