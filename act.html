  <script>
    /* Button scramble — hover (desktop) / auto (touch) / idle (desktop) */
    (function () {
      var POOL    = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#%&!?';
      var FRAMES  = 18, RATE = 45;
      var IDLE_MS = 7000;

      var buttons = [
        { sel: '.btn-connect', target: 'CoNNECT', delay: 0   },
        { sel: '.btn-work',    target: 'WORK',    delay: 350 },
      ];

      var isTouch = window.matchMedia('(hover: none)').matches;
      var timers  = {};
      var lastAct = Date.now();

      function scramble(btn, target) {
        clearInterval(timers[target]);
        var step = 0;
        timers[target] = setInterval(function () {
          var out = '';
          for (var i = 0; i < target.length; i++) {
            out += (i < Math.floor(step * target.length / FRAMES))
              ? target[i]
              : POOL[Math.floor(Math.random() * POOL.length)];
          }
          btn.textContent = out;
          if (++step > FRAMES) { clearInterval(timers[target]); btn.textContent = target; }
        }, RATE);
      }

      buttons.forEach(function (b) {
        var btn = document.querySelector(b.sel);
        if (!btn) return;

        if (isTouch) {
          /* Touch: auto-fire with stagger */
          setTimeout(function () { scramble(btn, b.target); }, b.delay || 700);
          setInterval(function () { scramble(btn, b.target); }, 7000);
        } else {
          /* Desktop: hover scramble */
          btn.addEventListener('mouseenter', function () { scramble(btn, b.target); });
          btn.addEventListener('mouseleave', function () {
            clearInterval(timers[b.target]);
            btn.textContent = b.target;
          });
        }
      });

      /* Desktop idle scramble — fires all buttons after IDLE_MS of no interaction */
      if (!isTouch) {
        ['mousemove', 'click', 'scroll', 'keydown', 'touchstart'].forEach(function (ev) {
          document.addEventListener(ev, function () { lastAct = Date.now(); }, { passive: true });
        });
        setInterval(function () {
          if (Date.now() - lastAct >= IDLE_MS) {
            lastAct = Date.now(); /* reset so next fire is another IDLE_MS away */
            buttons.forEach(function (b, i) {
              var btn = document.querySelector(b.sel);
              if (!btn) return;
              setTimeout(function () { scramble(btn, b.target); }, i * 300);
            });
          }
        }, 500);
      }
    })();
  </script>

  <script>
    (function () {
      function reveal() {
        var c = document.createElement('div');
        c.style.cssText = 'position:fixed;inset:0;background:#000;z-index:99998;pointer-events:none;opacity:1;';
        document.body.appendChild(c);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            c.style.transition = 'opacity 0.22s ease';
            c.style.opacity    = '0';
            setTimeout(function () { if (c.parentNode) c.parentNode.removeChild(c); }, 320);
          });
        });
      }
      window.addEventListener('pageshow', function (e) { if (e.persisted) reveal(); });
    })();
  </script>
