<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[aRTS] — SOCIALS</title>
  <script>
    if (!sessionStorage.getItem('captcha_passed')) {
      window.location.replace('tail.html');
    }
  </script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 100;
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    /* SVG output — clip to rounded corners on the wrapper */
    #qr {
      border-radius: 14px;
      overflow: hidden;
      line-height: 0;
    }
    #qr svg { display: block; }

    .handle {
      margin-top: 1.2rem;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #FF5C00;
    }

    .bear-corner {
      position: fixed;
      bottom: 60px;
      right: 50px;
      width: clamp(80px, 10vw, 120px);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <a href="connect.html" class="logo">[sEEK]</a>

  <div id="qr"></div>
  <p class="handle">rts.berlin</p>


  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
  <script>
    new QRCodeStyling({
      width: 300,
      height: 300,
      type: 'svg',
      data: 'https://www.instagram.com/rts.berlin/',
      image: 'assets/bear.png',
      dotsOptions:          { color: '#ffffff', type: 'dots' },
      backgroundOptions:    { color: '#000000' },
      cornersSquareOptions: { color: '#ffffff', type: 'extra-rounded' },
      cornersDotOptions:    { color: '#ffffff', type: 'dot' },
      imageOptions: {
        crossOrigin: 'anonymous',
        margin: 4,
        hideBackgroundDots: true,
        imageSize: 0.28
      },
      qrOptions: { errorCorrectionLevel: 'H' }
    }).append(document.getElementById('qr'));
  </script>
  <script>
    /* rts.berlin — auto-scramble periodically */
    (function () {
      var el     = document.querySelector('.handle');
      var TARGET = 'rts.berlin';
      var POOL   = 'abcdefghijklmnopqrstuvwxyz0123456789@#!?.';
      var FRAMES = 22, RATE = 45;
      var timer  = null;
      function runScramble() {
        clearInterval(timer);
        var step = 0;
        timer = setInterval(function () {
          var out = '';
          for (var i = 0; i < TARGET.length; i++) {
            out += (i < Math.floor(step * TARGET.length / FRAMES))
              ? TARGET[i]
              : POOL[Math.floor(Math.random() * POOL.length)];
          }
          el.textContent = out;
          if (++step > FRAMES) { clearInterval(timer); el.textContent = TARGET; }
        }, RATE);
      }
      setTimeout(runScramble, 1200);
      setInterval(runScramble, 7000);
    })();
  </script>
  <script>
    (function () {
      function reveal() {
        var c = document.createElement('div');
        c.style.cssText = 'position:fixed;inset:0;background:#000;z-index:99998;pointer-events:none;opacity:1;';
        document.body.appendChild(c);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            c.style.transition = 'opacity 0.22s ease';
            c.style.opacity    = '0';
            setTimeout(function () { if (c.parentNode) c.parentNode.removeChild(c); }, 320);
          });
        });
      }
      window.addEventListener('pageshow', function (e) { if (e.persisted) reveal(); });
    })();
  </script>

</body>
</html>
