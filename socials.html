  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 100;
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    /* SVG output ‚Äî clip to rounded corners on the wrapper */
    #qr {
      border-radius: 14px;
      overflow: hidden;
      line-height: 0;
      cursor: pointer;
      touch-action: manipulation;
      position: relative;
    }
    @keyframes qrBreath {
      0%, 100% { opacity: 1;     transform: scale(1); }
      50%       { opacity: 0.82; transform: scale(0.984); }
    }
    #qr svg {
      display: block;
      animation: qrBreath 3.5s ease-in-out infinite;
      transform-origin: center;
      transition: filter 0.25s ease;
    }
    /* Hover: white dots ‚Üí orange via multiply overlay */
    #qr::after {
      content: '';
      position: absolute;
      inset: 0;
      background: #FF5C00;
      mix-blend-mode: multiply;
      opacity: 0;
      border-radius: 14px;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }
    #qr:hover::after { opacity: 1; }

    .handle {
      margin-top: 1.2rem;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #FF5C00;
      cursor: pointer;
      touch-action: manipulation;
      text-align: center;
    }

    .bear-corner {
      position: fixed;
      bottom: 60px;
      right: 50px;
      width: clamp(80px, 10vw, 120px);
      pointer-events: none;
    }

    .nav-about {
      position: fixed;
      top: 28px; right: 32px;
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    .nav-about:hover { opacity: 1; }
  
    /* ‚îÄ‚îÄ Mobile: safe area + text-size ‚îÄ‚îÄ */
    html { background: #000; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    .logo, .nav-about, header { touch-action: manipulation; }
    .btn, button, a { touch-action: manipulation; }
  
    /* ‚îÄ‚îÄ Global: no text selection; no double-tap zoom (pinch zoom kept) ‚îÄ‚îÄ */
    * { -webkit-user-select: none; user-select: none; }
    input, textarea, select, [contenteditable] { -webkit-user-select: text; user-select: text; }
    html { touch-action: manipulation; }

    /* ‚îÄ‚îÄ Day mode ‚îÄ‚îÄ */
    html[data-theme="day"] { background: #fff; }
    [data-theme="day"] body { background: #fff; color: #000; }
    [data-theme="day"] .logo { color: #000; }
    [data-theme="day"] .nav-about { color: #000; }

  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
  <script>
    var _isDay = document.documentElement.getAttribute('data-theme')==='day';
    var _dotColor = _isDay ? '#000000' : '#ffffff';
    var _bgColor  = _isDay ? '#ffffff' : '#000000';
    new QRCodeStyling({
      width: 300,
      height: 300,
      type: 'svg',
      data: 'https://www.instagram.com/rts.berlin/',
      image: 'assets/bear.png',
      dotsOptions:          { color: _dotColor, type: 'dots' },
      backgroundOptions:    { color: _bgColor },
      cornersSquareOptions: { color: _dotColor, type: 'extra-rounded' },
      cornersDotOptions:    { color: _dotColor, type: 'dot' },
      imageOptions: {
        crossOrigin: 'anonymous',
        margin: 4,
        hideBackgroundDots: true,
        imageSize: 0.28
      },
      qrOptions: { errorCorrectionLevel: 'H' }
    }).append(document.getElementById('qr'));
  </script>
  <script>
    /* rts.berlin ‚Äî scramble on load, periodic auto-scramble, click‚ÜíInstagram */
    (function () {
      var el   = document.querySelector('.handle');
      var POOL = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#!?.';
      var FRAMES = 22, RATE = 45;
      var timer  = null;

      function scramble() {
        clearInterval(timer);
        var target = 'rts.berlin';
        var step = 0;
        timer = setInterval(function () {
          var out = '';
          for (var i = 0; i < target.length; i++) {
            out += (i < Math.floor(step * target.length / FRAMES))
              ? target[i]
              : POOL[Math.floor(Math.random() * POOL.length)];
          }
          el.textContent = out;
          if (++step > FRAMES) { clearInterval(timer); el.textContent = target; }
        }, RATE);
      }

      /* Click ‚Üí open Instagram */
      el.addEventListener('click', function () {
        window.open('https://www.instagram.com/rts.berlin/', '_blank', 'noopener');
      });

      /* Scramble on load + every 11 s */
      scramble();
      setInterval(scramble, 11000);
    })();
  </script>
  <script>
    (function () {
      function reveal() {
        var c = document.createElement('div');
        var bg = document.documentElement.getAttribute('data-theme')==='day' ? '#fff' : '#000';
        c.style.cssText = 'position:fixed;inset:0;background:'+bg+';z-index:99998;pointer-events:none;opacity:1;';
        document.body.appendChild(c);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            c.style.transition = 'opacity 0.22s ease';
            c.style.opacity    = '0';
            setTimeout(function () { if (c.parentNode) c.parentNode.removeChild(c); }, 320);
          });
        });
      }
      window.addEventListener('pageshow', function (e) { if (e.persisted) reveal(); });
    })();
  </script>


  <!-- Nav & logo hover -->
  <script>
  (function(){
    var DELAY = 40;

    /* Nav links ‚Äî lowercase left‚Üíright on enter, recapitalise right‚Üíleft on leave */
    function navHover(el){
      var orig = el.textContent;
      var timers=[], state=0;
      function clr(){ timers.forEach(clearTimeout); timers.length=0; }
      function render(n){
        var s=orig[0];
        for(var i=1;i<orig.length;i++) s+=(i<=n ? orig[i].toLowerCase() : orig[i]);
        el.textContent=s;
      }
      el.addEventListener('mouseenter',function(){
        clr();
        var from=state;
        for(var i=0;i<orig.length-1-from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from+i+1);},i*DELAY));
        })(i);
      });
      el.addEventListener('mouseleave',function(){
        clr();
        var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    }
    document.querySelectorAll('nav a, a.nav-about').forEach(navHover);

    /* Logo [a] ‚Äî expand on hover via data-inner attribute; avoids flash */
    document.querySelectorAll('a.logo[data-inner]').forEach(function(logo){
      var inner=logo.dataset.inner;
      var timers=[], state=0;
      function clr(){ timers.forEach(clearTimeout); timers.length=0; }
      function render(n){ logo.textContent='[a'+inner.slice(0,n)+']'; }
      logo.addEventListener('mouseenter',function(){
        clr();
        var from=state;
        for(var i=from;i<inner.length;i++)(function(i){
          timers.push(setTimeout(function(){render(state=i+1);},(i-from)*DELAY));
        })(i);
      });
      logo.addEventListener('mouseleave',function(){
        clr();
        var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    });
  })();
  </script>
