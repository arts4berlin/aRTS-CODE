<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[aRTS] — SOCIALS</title>
  <script>
    if (!sessionStorage.getItem('captcha_passed')) {
      window.location.replace('index.html');
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 100;
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    /* SVG output — clip to rounded corners on the wrapper */
    #qr {
      border-radius: 14px;
      overflow: hidden;
      line-height: 0;
    }
    #qr svg { display: block; }

    .handle {
      margin-top: 1.2rem;
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.18em;
    }

    .bear-corner {
      position: fixed;
      bottom: 60px;
      right: 50px;
      width: clamp(80px, 10vw, 120px);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <a href="ask.html" class="logo">[aRTS]</a>

  <div id="qr"></div>
  <p class="handle">@RTS.BERLIN</p>

  <img src="assets/bear.png" class="bear-corner" alt="">

  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
  <script>
    /* Instagram icon as base64 SVG for the centre logo */
    const igSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect width="24" height="24" fill="#000000" rx="4"/><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z" fill="white"/></svg>';

    new QRCodeStyling({
      width: 300,
      height: 300,
      type: 'svg',
      data: 'https://www.instagram.com/rts.berlin/',
      image: 'data:image/svg+xml;base64,' + btoa(igSvg),
      dotsOptions:          { color: '#ffffff', type: 'dots' },
      backgroundOptions:    { color: '#000000' },
      cornersSquareOptions: { color: '#ffffff', type: 'extra-rounded' },
      cornersDotOptions:    { color: '#ffffff', type: 'dot' },
      imageOptions: {
        crossOrigin: 'anonymous',
        margin: 4,
        hideBackgroundDots: true,
        imageSize: 0.28
      },
      qrOptions: { errorCorrectionLevel: 'H' }
    }).append(document.getElementById('qr'));
  </script>

</body>
</html>
