    /* activate row */

  <script>
  (function(){
    /* ── Stripe payment links (same as join.html) ── */
    var PAYMENT_LINKS = {
      'aLLY':      'https://buy.stripe.com/aFa28rdMOgOtfOBdTm4ZG02',
      'BRIGaDIER': 'https://buy.stripe.com/4gM8wPaAC0Pvbyl5mQ4ZG01',
      'CURaTOR':   'https://buy.stripe.com/00w3cv6km1TzgSF16A4ZG00'
    };

    function showActivateLink(tier) {
      var link = PAYMENT_LINKS[tier];
      if (!link) return;
      var row = document.getElementById('activate-row');
      row.hidden = false;
      document.getElementById('btn-activate-pay').href = link;
    }

    /* ── Same word pool as join.html ── */
    var POOL = new Set([
      'amber','archive','atlas','axiom','azure',
      'beacon','bridge','canal','canvas','cedar',
      'cipher','cobalt','coral','current','datum',
      'delta','dusk','echo','ember','epoch',
      'ether','ferry','flare','flux','fractal',
      'frame','ghost','grain','granite','harbor',
      'haze','helix','hollow','horizon','indigo',
      'iris','ivory','jade','lacuna','lance',
      'layer','lens','linden','locus','loop',
      'lumen','margin','matrix','mesa','mirror',
      'mist','module','moat','moss','nave',
      'nexus','node','nomad','notch','nova',
      'oasis','ochre','orbit','origin','oxide',
      'paper','passage','pearl','phase','pillar',
      'pivot','plane','prism','pulse','quartz',
      'radius','rail','raven','relay','ridge',
      'ripple','root','route','rubric','rust',
      'salt','shard','shore','signal','silk',
      'slate','socket','soot','spark','spine',
      'spool','spore','spur','steel','stem',
      'stencil','stone','strand','stratum','stream',
      'string','strobe','surge','symbol','taper',
      'tide','timber','token','tome','torch',
      'torque','track','transit','tread','trove',
      'tunnel','umbra','vale','valve','vector',
      'vessel','void','volta','wake','weld',
      'wharf','wire','witness','zinc','zone'
    ]);

    /* ── Milestones & points renderer ── */
    var MILESTONES = [
      { name: 'nOVICE',    min: 0    },
      { name: 'PaTRON',    min: 100  },
      { name: 'cOLLECTOR', min: 500  },
      { name: 'aRCHIVIST', min: 1000 },
      { name: 'mAESTRO',   min: 2500 }
    ];

    function getMilestoneIdx(pts) {
      for (var i = MILESTONES.length - 1; i >= 0; i--) {
        if (pts >= MILESTONES[i].min) return i;
      }
      return 0;
    }

    function renderPoints(pts, alias, tier, since, remembered) {
      pts = parseInt(pts, 10) || 0;
      var idx  = getMilestoneIdx(pts);
      var m    = MILESTONES[idx];
      var next = MILESTONES[idx + 1] || null;
      document.getElementById('vc-alias').textContent     = alias || 'mEMBER';
      document.getElementById('vc-tier').textContent      = tier  || '—';
      document.getElementById('vc-pts-num').textContent   = pts;
      document.getElementById('vc-milestone').textContent = m.name;
      var pct = next
        ? Math.min(100, Math.round((pts - m.min) / (next.min - m.min) * 100))
        : 100;
      /* Animate bar after short delay for visual effect */
      setTimeout(function(){
        document.getElementById('vc-progress-fill').style.width = pct + '%';
      }, 120);
      document.getElementById('vc-progress-label').textContent = next
        ? ((next.min - pts) + ' pTS tO ' + next.name)
        : '— mAESTRO — mAX TIER';
      if (since) document.getElementById('vc-since').textContent = 'mEMBER sINCE ' + since;
      if (remembered) document.getElementById('vc-remembered').hidden = false;
    }

    /* SHA-256 */
    async function sha256(str) {
      var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
    }

    /* Build the 12-input grid */
    var grid = document.getElementById('id-grid');
    var inputs = [];
    for (var i = 0; i < 12; i++) {
      var cell = document.createElement('div');
      cell.className = 'id-cell';
      var num = (i+1) < 10 ? '0'+(i+1) : ''+(i+1);
      var inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'id-input';
      inp.autocomplete = 'off';
      inp.autocorrect = 'off';
      inp.autocapitalize = 'none';
      inp.spellcheck = false;
      inp.placeholder = '· · ·';
      inp.dataset.idx = i;
      cell.innerHTML = '<span class="id-num">' + num + '</span>';
      cell.appendChild(inp);
      grid.appendChild(cell);
      inputs.push(inp);
    }

    /* Tab / enter navigation + paste on every cell */
    inputs.forEach(function(inp, i) {
      /* Paste on any cell: if 12 words detected, always fill from 0; otherwise fill from cursor */
      inp.addEventListener('paste', function(e) {
        var text = (e.clipboardData || window.clipboardData).getData('text');
        var parts = text.trim().split(/[\s\-—,]+/).filter(Boolean).slice(0, 12);
        if (parts.length > 1) {
          e.preventDefault();
          var start = parts.length === 12 ? 0 : i;
          parts.forEach(function(w, j){ if (inputs[start + j]) inputs[start + j].value = w.toLowerCase().trim(); });
          var nextFocus = inputs[start + parts.length] || inputs[11];
          if (nextFocus) nextFocus.focus();
        }
      });
      inp.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === 'Tab') {
          e.preventDefault();
          var next = inputs[i + 1];
          if (next) next.focus(); else document.getElementById('btn-verify').focus();
        }
      });
      inp.addEventListener('input', function() {
        inp.value = inp.value.toLowerCase().replace(/[^a-z]/g, '');
        inp.classList.remove('err', 'ok');
      });
    });

    /* Verify */
    document.getElementById('btn-verify').addEventListener('click', async function() {
      var words = inputs.map(function(inp){ return inp.value.trim().toLowerCase(); });
      var errEl = document.getElementById('err-msg');
      errEl.textContent = '';
      inputs.forEach(function(inp){ inp.classList.remove('err','ok'); });

      /* All 12 filled? */
      var empty = words.some(function(w){ return !w; });
      if (empty) {
        errEl.textContent = '— eNTER aLL 12 wORDS';
        inputs.forEach(function(inp,i){ if(!words[i]) inp.classList.add('err'); });
        return;
      }

      /* All in pool? */
      var bad = words.filter(function(w){ return !POOL.has(w); });
      if (bad.length) {
        errEl.textContent = '— wORD' + (bad.length > 1 ? 'S' : '') + ' nOT rECOGNISED: ' + bad.join(', ');
        inputs.forEach(function(inp,i){ if(!POOL.has(words[i])) inp.classList.add('err'); else inp.classList.add('ok'); });
        return;
      }

      /* No duplicates? */
      if (new Set(words).size !== 12) {
        errEl.textContent = '— dUPLICaTE wORDS dETECTED';
        var seen = {};
        words.forEach(function(w,i){
          if(seen[w] !== undefined){ inputs[i].classList.add('err'); inputs[seen[w]].classList.add('err'); }
          else seen[w] = i;
        });
        return;
      }

      /* Valid — mark all ok */
      inputs.forEach(function(inp){ inp.classList.add('ok'); });

      var hash = await sha256(words.join('-'));
      var storedHash = null;
      var storedTier = null;
      try {
        storedHash = localStorage.getItem('arts_id_hash');
        storedTier = localStorage.getItem('arts_tier');
      } catch(e) {}

      /* Store for this device */
      try { localStorage.setItem('arts_id_hash', hash); } catch(e) {}

      var newDevice = !storedHash || storedHash !== hash;

      /* Switch to verified view */
      document.getElementById('s1').hidden = true;
      var s2 = document.getElementById('s2');
      s2.hidden = false;

      /* Show phrase lightly */
      document.getElementById('vc-phrase').textContent = words.join(' — ');

      var alias = null, since = null, pts = null;
      try {
        alias = localStorage.getItem('arts_alias');
        since = localStorage.getItem('arts_since');
        pts   = localStorage.getItem('arts_points');
      } catch(e) {}

      if (storedTier && !newDevice) {
        document.getElementById('vc-status').textContent = 'aCTIVE';
        renderPoints(pts || 0, alias, storedTier, since, false);
        showActivateLink(storedTier);
      } else {
        /* New device: show partial info and ask for tier */
        document.getElementById('vc-status').textContent = 'vERIFIED';
        renderPoints(pts || 0, alias, 'mEMBER', since, false);
        document.getElementById('tier-confirm').hidden = false;
        document.querySelectorAll('.btn-tier').forEach(function(btn) {
          btn.addEventListener('click', function() {
            document.querySelectorAll('.btn-tier').forEach(function(b){ b.classList.remove('active'); });
            btn.classList.add('active');
            try { localStorage.setItem('arts_tier', btn.dataset.tier); } catch(e) {}
            renderPoints(pts || 0, alias, btn.dataset.tier, since, false);
            showActivateLink(btn.dataset.tier);
          });
        });
      }
    });

    /* Sign out */
    document.getElementById('btn-signout').addEventListener('click', function() {
      try {
        localStorage.removeItem('arts_id_hash');
        localStorage.removeItem('arts_tier');
        localStorage.removeItem('arts_alias');
        localStorage.removeItem('arts_since');
        localStorage.removeItem('arts_points');
      } catch(e) {}
      document.getElementById('s2').hidden = true;
      document.getElementById('s1').hidden = false;
      document.getElementById('vc-remembered').hidden = true;
      document.getElementById('vc-progress-fill').style.width = '0%';
      document.getElementById('activate-row').hidden = true;
      document.getElementById('tier-confirm').hidden = true;
      inputs.forEach(function(inp){ inp.value = ''; inp.classList.remove('ok','err'); });
      document.getElementById('err-msg').textContent = '';
    });

    /* Auto-login: if hash stored, skip word entry and show personalised dashboard */
    (async function() {
      var h = null, t = null, a = null, s = null, p = null;
      try {
        h = localStorage.getItem('arts_id_hash');
        t = localStorage.getItem('arts_tier');
        a = localStorage.getItem('arts_alias');
        s = localStorage.getItem('arts_since');
        p = localStorage.getItem('arts_points');
      } catch(e) {}
      if (!h) return;
      document.getElementById('s1').hidden = true;
      document.getElementById('s2').hidden = false;
      document.getElementById('vc-status').textContent  = 'rETURNING mEMBER';
      document.getElementById('vc-phrase').textContent  = '·· ·· ·· ·· ·· ·· ·· ·· ·· ·· ·· ··';
      renderPoints(p || 0, a, t, s, true);
      if (t) showActivateLink(t);
    })();
  })();
  </script>

  <script>
    (function () {
      function reveal() {
        var c = document.createElement('div');
        c.style.cssText = 'position:fixed;inset:0;background:#000;z-index:99998;pointer-events:none;opacity:1;';
        document.body.appendChild(c);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            c.style.transition = 'opacity 0.22s ease';
            c.style.opacity    = '0';
            setTimeout(function () { if (c.parentNode) c.parentNode.removeChild(c); }, 320);
          });
        });
      }
      window.addEventListener('pageshow', function (e) { if (e.persisted) reveal(); });
    })();
  </script>

  <!-- CRT transition -->
  <script>
  (function(){
    var scan=null,vig=null,busy=false;
    function mkL(){
      if(scan)return;
      scan=document.createElement('div');
      scan.style.cssText='position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,14,0,0.50) 3px,rgba(0,14,0,0.50) 4px);opacity:0;z-index:99997;pointer-events:none;';
      vig=document.createElement('div');
      vig.style.cssText='position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,0.88) 100%);opacity:0;z-index:99996;pointer-events:none;';
      document.body.appendChild(scan);document.body.appendChild(vig);
    }
    function lerp(a,b,t){return a+(b-a)*t;}
    function easeOut3(t){return 1-Math.pow(1-Math.min(1,Math.max(0,t)),3);}
    function smooth(t){var c=Math.min(1,Math.max(0,t));return c*c*(3-2*c);}
    function doEnter(){
      mkL();var T1=130,T2=780,T3=1150,s0=null;
      function run(ts){if(!s0)s0=ts;var e=ts-s0;
        if(e<T1){scan.style.opacity=String(lerp(0,1,e/T1));vig.style.opacity='0.95';}
        else if(e<T2){var t=(e-T1)/(T2-T1),p=lerp(50,0,easeOut3(t));document.documentElement.style.clipPath='inset('+p.toFixed(2)+'% 0 '+p.toFixed(2)+'% 0)';scan.style.opacity='1';vig.style.opacity=String(lerp(0.95,0.55,easeOut3(t)));}
        else if(e<T3){var t2=(e-T2)/(T3-T2),et=smooth(t2);document.documentElement.style.clipPath='';scan.style.opacity=String(lerp(1,0,et));vig.style.opacity=String(lerp(0.55,0,et));}
        else{document.documentElement.style.clipPath='';if(scan&&scan.parentNode)scan.parentNode.removeChild(scan);if(vig&&vig.parentNode)vig.parentNode.removeChild(vig);scan=null;vig=null;busy=false;return;}
        requestAnimationFrame(run);}
      requestAnimationFrame(run);}
    function doExit(dest){
      if(busy)return;busy=true;mkL();var TR=60,TS=320,s0=null;
      function run(ts){if(!s0)s0=ts;var e=ts-s0;
        if(e<TR){scan.style.opacity=String(lerp(0,1,e/TR));vig.style.opacity=String(lerp(0,0.95,e/TR));}
        else if(e<TR+TS){var t=(e-TR)/TS,p=lerp(0,50,smooth(t));document.documentElement.style.clipPath='inset('+p.toFixed(2)+'% 0 '+p.toFixed(2)+'% 0)';scan.style.opacity='1';vig.style.opacity='0.95';}
        else{document.documentElement.style.clipPath='inset(50% 0 50% 0)';sessionStorage.setItem('crt_transition','1');window.location.href=dest;return;}
        requestAnimationFrame(run);}
      requestAnimationFrame(run);}
    if(sessionStorage.getItem('crt_transition')){sessionStorage.removeItem('crt_transition');doEnter();}
    document.addEventListener('click',function(ev){
      var a=ev.target.closest('a[href]');if(!a)return;
      var h=a.getAttribute('href');
      if(!h||h.charAt(0)==='#'||/^(https?:|mailto:|tel:|\/\/)/.test(h))return;
      if(ev.metaKey||ev.ctrlKey||ev.shiftKey||ev.altKey)return;
      ev.preventDefault();doExit(h);},true);
  })();
  </script>

  <!-- Nav hover -->
  <script>
  (function(){
    var DELAY=40;
    function navHover(el){
      var orig=el.textContent,timers=[],state=0;
      function clr(){timers.forEach(clearTimeout);timers.length=0;}
      function render(n){var s=orig[0];for(var i=1;i<orig.length;i++)s+=(i<=n?orig[i].toLowerCase():orig[i]);el.textContent=s;}
      el.addEventListener('mouseenter',function(){clr();var from=state;for(var i=0;i<orig.length-1-from;i++)(function(i){timers.push(setTimeout(function(){render(state=from+i+1);},i*DELAY));})(i);});
      el.addEventListener('mouseleave',function(){clr();var from=state;for(var i=0;i<from;i++)(function(i){timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));})(i);});
    }
    document.querySelectorAll('nav a').forEach(navHover);
    document.querySelectorAll('a.logo[data-inner]').forEach(function(logo){
      var inner=logo.dataset.inner,timers=[],state=0;
      function clr(){timers.forEach(clearTimeout);timers.length=0;}
      function render(n){logo.textContent='[a'+inner.slice(0,n)+']';}
      logo.addEventListener('mouseenter',function(){clr();var from=state;for(var i=from;i<inner.length;i++)(function(i){timers.push(setTimeout(function(){render(state=i+1);},(i-from)*DELAY));})(i);});
      logo.addEventListener('mouseleave',function(){clr();var from=state;for(var i=0;i<from;i++)(function(i){timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));})(i);});
    });
  })();
  </script>
