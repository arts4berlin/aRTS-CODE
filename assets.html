    /* ── Page-specific: fullscreen centred chooser ── */
    .question {
      text-align: center;
      margin-bottom: clamp(1.4rem, 3vh, 2.2rem);
    }

    .small {
      font-size: 0.82rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.15em;
      opacity: 0.65;
      display: block;
      margin-bottom: 0.28rem;
    }

    .large {
      font-size: clamp(1.8rem, 4.5vw, 3rem);
      font-weight: var(--fw-bold);
      letter-spacing: 0.1em;
      display: block;
    }

    /* ── Choice cards ── */
    .choices {
      display: flex;
      gap: clamp(0.7rem, 2vw, 1.2rem);
      align-items: stretch;
    }

    .choice-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: clamp(1rem, 2.6vw, 2rem) clamp(1.1rem, 3vw, 2.2rem);
      min-width: clamp(150px, 26vw, 200px);
      width: fit-content;
      min-height: clamp(110px, 22vh, 170px);
      border: 1.5px solid var(--c-border-strong);
      border-radius: 6px;
      text-decoration: none;
      cursor: crosshair;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    /* aRT card — fill on hover */
    .choice-art { background: transparent; color: var(--c-text); }
    .choice-art::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--c-text);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.24s cubic-bezier(0.4,0,0.2,1);
      z-index: 0;
    }
    .choice-art:hover { border-color: var(--c-text); }
    .choice-art:hover::before { transform: scaleY(1); }
    .choice-art:hover .choice-title { color: var(--c-bg); }
    .choice-art:hover .choice-sub   { color: rgba(0,0,0,0.42); }

    /* aPPaREL card — accent bg, dark fill on hover */
    .choice-apparel { background: var(--c-accent); border-color: var(--c-accent); color: var(--c-bg); }
    .choice-apparel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--c-bg);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.24s cubic-bezier(0.4,0,0.2,1);
      z-index: 0;
    }
    .choice-apparel:hover::before  { transform: scaleY(1); }
    .choice-apparel:hover .choice-title { color: var(--c-accent); }
    .choice-apparel:hover .choice-sub   { color: var(--c-accent-muted); }

    .choice-eyebrow {
      font-size: 0.4rem;
      font-weight: var(--fw-bold);
      letter-spacing: 0.34em;
      text-transform: uppercase;
      opacity: 0.38;
      position: relative;
      z-index: 1;
    }

    .choice-title {
      font-size: clamp(1.5rem, 5vw, 2.8rem);
      font-weight: var(--fw-bold);
      letter-spacing: 0.08em;
      line-height: 1;
      margin-top: auto;
      white-space: nowrap;
      position: relative;
      z-index: 1;
      transition: color 0.15s;
    }

    .choice-sub {
      font-size: 0.48rem;
      font-weight: var(--fw-light);
      letter-spacing: 0.13em;
      line-height: 1.6;
      margin-top: 0.45rem;
      opacity: 0.52;
      position: relative;
      z-index: 1;
      transition: color 0.15s, opacity 0.15s;
    }

    @media (max-width: 420px) {
      .choices { gap: 0.5rem; }
      .choice-card { width: clamp(130px, 44vw, 190px); min-height: 100px; }
    }

    /* ── dvh fix: excludes iOS Safari address bar ── */
    @supports (height: 100dvh) {
      body { height: 100dvh; }
    }

    /* ── Page entrance animation ── */
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .question, .choices { animation: pageIn 0.5s ease both; }
    .choices { animation-delay: 0.1s; }

    /* ── Day mode overrides ── */
    [data-theme="day"] .choice-card { border-color: var(--c-border-hover); }
    [data-theme="day"] .choice-art::before { background: var(--c-bg); }
    [data-theme="day"] .choice-art:hover { border-color: var(--c-bg); }
    [data-theme="day"] .choice-art:hover .choice-title { color: var(--c-text) !important; }
    [data-theme="day"] .choice-art:hover .choice-sub { color: var(--c-text-secondary) !important; }

    [data-theme="day"] .choice-apparel { background: var(--c-accent) !important; border-color: var(--c-accent) !important; }
    [data-theme="day"] .choice-apparel .choice-title,
    [data-theme="day"] .choice-apparel .choice-eyebrow,
    [data-theme="day"] .choice-apparel .choice-sub { color: #fff !important; }
    [data-theme="day"] .choice-apparel:hover .choice-title { color: var(--c-accent) !important; }
    [data-theme="day"] .choice-apparel:hover .choice-sub   { color: color-mix(in srgb, var(--c-accent) 55%, transparent) !important; }
</style>

  <!-- Scrambler -->
  <script>
    (function () {
      var POOL = '0123456789@#%&!?\/+~^<>';
      var FRAMES = 18, RATE = 40;

      function makeScrambler(card, NAME) {
        var title = card && card.querySelector('.choice-title');
        if (!card || !title) return;
        title.textContent = NAME;
        var timer = null;

        function runScramble(finalText) {
          clearInterval(timer);
          var step = 0;
          var len = finalText.length;
          timer = setInterval(function () {
            var out = '';
            for (var i = 0; i < len; i++) {
              out += (i < Math.floor(step * len / FRAMES))
                ? finalText[i]
                : POOL[Math.floor(Math.random() * POOL.length)];
            }
            title.textContent = out;
            if (++step > FRAMES) { clearInterval(timer); title.textContent = finalText; }
          }, RATE);
        }

        if (!window.matchMedia('(hover: none)').matches) {
          card.addEventListener('mouseenter', function () { runScramble(NAME); });
          card.addEventListener('mouseleave', function () { clearInterval(timer); title.textContent = NAME; });
        }
      }

      var artTitle = document.querySelector('.btn-art .choice-title');
      var appTitle = document.querySelector('.btn-apparel .choice-title');
      makeScrambler(document.querySelector('.btn-art'),     artTitle ? artTitle.textContent : 'kUNST');
      makeScrambler(document.querySelector('.btn-apparel'), appTitle ? appTitle.textContent : 'aPPaREL');
    })();
  </script>

  <!-- Nav & logo hover -->
  <script>
  (function(){
    var DELAY = 40;

    /* Nav links — lowercase left-to-right on enter, recapitalise right-to-left on leave */
    function navHover(el){
      var orig = el.textContent;
      var timers=[], state=0;
      function clr(){ timers.forEach(clearTimeout); timers.length=0; }
      function render(n){
        var s=orig[0];
        for(var i=1;i<orig.length;i++) s+=(i<=n ? orig[i].toLowerCase() : orig[i]);
        el.textContent=s;
      }
      el.addEventListener('mouseenter',function(){
        clr();
        var from=state;
        for(var i=0;i<orig.length-1-from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from+i+1);},i*DELAY));
        })(i);
      });
      el.addEventListener('mouseleave',function(){
        clr();
        var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    }
    document.querySelectorAll('a.nav-about').forEach(navHover);
logo.addEventListener('mouseleave',function(){
        clr();
        var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    });
  })();
  </script>
