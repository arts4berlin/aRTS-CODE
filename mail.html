  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 100;
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .heading {
      text-align: center;
      margin-bottom: clamp(1.4rem, 3vh, 2.2rem);
    }

    .small {
      font-size: 0.82rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      opacity: 0.65;
      display: block;
      margin-bottom: 0.28rem;
    }

    .large {
      font-size: clamp(1.8rem, 4.5vw, 3rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      display: block;
    }

    /* ── Form column ── */
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 1.8vh, 18px);
      width: clamp(280px, 55vw, 460px);
    }

    /* ── Box-style inputs — white fill, black text ── */
    .field { text-transform: uppercase; }
    .field {
      width: 100%;
      background: #fff;
      border: 2px solid #fff;
      border-radius: 4px;
      padding: clamp(0.75rem, 1.5vh, 1.05rem) clamp(1.2rem, 2vw, 1.8rem);
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1rem, 2vw, 1.1rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      color: #000;
      outline: none;
      text-align: center;
      transition: border-color 0.15s;
    }
    .field::placeholder { color: rgba(0,0,0,0.38); }
    @keyframes caretBlink {
      0%, 100% { caret-color: #FF5C00; }
      50%      { caret-color: transparent; }
    }
    .field:focus {
      border-color: #FF5C00;
      caret-color: #FF5C00;
      animation: caretBlink 0.9s step-end infinite;
    }

    .nav-about {
      position: fixed;
      top: 28px; right: 32px;
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    .nav-about:hover { opacity: 1; }

    /* ── NaME + LaST side by side ── */
    .name-row        { display: flex; gap: clamp(8px, 1.4vw, 14px); }
    .name-row .field { flex: 1; }

    /* ── Bottom row: E-MaIL + bear side by side ── */
    .send-row        { display: flex; gap: clamp(8px, 1.4vw, 14px); }
    .send-row .field { flex: 1; }

    /* ── Orange bear submit ── */
    .bear-btn {
      flex-shrink: 0;
      background: #FF5C00;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1 / 1;
      width: clamp(48px, 8.5vw, 72px);
      padding: 0;
      position: relative;
      overflow: hidden;
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .bear-btn:hover { transform: scale(1.06); }
    .bear-btn.sent  { transform: scale(1.12); }

    .bear-btn img {
      width: 60%;
      height: auto;
      filter: brightness(0);
      transition: opacity 0.18s, transform 0.18s;
    }
    .bear-btn.sent img { opacity: 0; transform: scale(0); }

    @keyframes checkBounce {
      0%   { opacity: 0; transform: scale(0);    }
      55%  { opacity: 1; transform: scale(1.35); }
      75%  { opacity: 1; transform: scale(0.88); }
      90%  { opacity: 1; transform: scale(1.10); }
      100% { opacity: 1; transform: scale(1);    }
    }
    .bear-check {
      position: absolute;
      color: #000;
      font-size: clamp(1.2rem, 2.6vw, 1.9rem);
      font-weight: 700;
      opacity: 0;
      transform: scale(0);
      pointer-events: none;
      line-height: 1;
    }
    .bear-btn.sent .bear-check {
      animation: checkBounce 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
  
    /* ── dvh fix: excludes iOS Safari address bar ── */
    @supports (height: 100dvh) {
      body { height: 100dvh; }
    }
    /* ── Mobile: safe area + text-size ── */
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    .logo, .nav-about, header { touch-action: manipulation; }
    .btn, button, a { touch-action: manipulation; }
  
    /* ── Global: no text selection; no double-tap zoom (pinch zoom kept) ── */
    * { -webkit-user-select: none; user-select: none; }
    input, textarea, select, [contenteditable] { -webkit-user-select: text; user-select: text; }
    html { touch-action: manipulation; }

    /* ── Day mode ── */
    html[data-theme="day"] { background: #fff; }
    [data-theme="day"] body { background: #fff; color: #000; }
    [data-theme="day"] .logo { color: #000; }
    [data-theme="day"] .nav-about { color: #000; }
    [data-theme="day"] .field { background: #000; border-color: #000; color: #fff; }
    [data-theme="day"] .field::placeholder { color: rgba(255,255,255,0.38); }
    [data-theme="day"] .field:focus { border-color: #FF5C00; }

  <form class="contact-form" id="mail-form" onsubmit="handleSend(event)">

      </button>

  <script>
    /* ── Placeholder scramble — left-to-right reveal, staggered ── */
    (function () {
      var POOL   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#%&!?';
      var FRAMES = 22, RATE = 44;

      function scramblePh(input, text, delay) {
        setTimeout(function () {
          var step = 0;
          var t = setInterval(function () {
            var out = '';
            for (var i = 0; i < text.length; i++) {
              out += (i < Math.floor(step * text.length / FRAMES))
                ? text[i]
                : POOL[Math.floor(Math.random() * POOL.length)];
            }
            input.placeholder = out;
            if (++step > FRAMES) { clearInterval(t); input.placeholder = text; }
          }, RATE);
        }, delay);
      }

      var fields = document.querySelectorAll('.field[data-ph]');
      fields.forEach(function (f, i) {
        scramblePh(f, f.dataset.ph, 280 + i * 220);
      });
    })();
  </script>
  <script>
    async function handleSend(e) {
      e.preventDefault();
      const btn  = document.querySelector('.bear-btn');
      const form = document.getElementById('mail-form');
      const data = new FormData(form);

      btn.disabled = true;
      try {
        // Also subscribe to newsletter via backend
        const emailVal = data.get('email') || '';
        const nameVal = data.get('name') || '';
        if (emailVal && window.artsAuth) {
          artsAuth.subscribeNewsletter(emailVal, nameVal, 'mail.html').catch(function(){});
        }
        const res = await fetch('https://formspree.io/f/xgonvgbw', {
          method:  'POST',
          body:    data,
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          btn.classList.add('sent');
          form.reset();
          document.querySelectorAll('.field').forEach(f => f.classList.remove('has-value'));
          setTimeout(() => { btn.classList.remove('sent'); btn.disabled = false; }, 2500);
        } else {
          btn.disabled = false;
        }
      } catch (_) {
        btn.disabled = false;
      }
    }

    /* Auto-uppercase typed text in name fields */
    document.querySelectorAll('.field[type="text"]').forEach(function (f) {
      f.addEventListener('input', function () {
        var pos = f.selectionStart;
        f.value = f.value.toUpperCase();
        f.setSelectionRange(pos, pos);
      });
    });
  </script>
  <script>
    (function () {
      function reveal() {
        var c = document.createElement('div');
        var bg = document.documentElement.getAttribute('data-theme')==='day' ? '#fff' : '#000';
        c.style.cssText = 'position:fixed;inset:0;background:'+bg+';z-index:99998;pointer-events:none;opacity:1;';
        document.body.appendChild(c);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            c.style.transition = 'opacity 0.22s ease';
            c.style.opacity    = '0';
            setTimeout(function () { if (c.parentNode) c.parentNode.removeChild(c); }, 320);
          });
        });
      }
      window.addEventListener('pageshow', function (e) { if (e.persisted) reveal(); });
    })();
  </script>

  <!-- Nav & logo hover -->
  <script>
  (function(){
    var DELAY = 40;

    /* Nav links — lowercase left→right on enter, recapitalise right→left on leave */
    function navHover(el){
      var orig = el.textContent;
      var timers=[], state=0;
      function clr(){ timers.forEach(clearTimeout); timers.length=0; }
      function render(n){
        var s=orig[0];
        for(var i=1;i<orig.length;i++) s+=(i<=n ? orig[i].toLowerCase() : orig[i]);
        el.textContent=s;
      }
      el.addEventListener('mouseenter',function(){
        clr();
        var from=state;
        for(var i=0;i<orig.length-1-from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from+i+1);},i*DELAY));
        })(i);
      });
      el.addEventListener('mouseleave',function(){
        clr();
        var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    }
    document.querySelectorAll('nav a, a.nav-about').forEach(navHover);
logo.addEventListener('mouseleave',function(){
        clr();
        var from=state;
        for(var i=0;i<from;i++)(function(i){
          timers.push(setTimeout(function(){render(state=from-i-1);},i*DELAY));
        })(i);
      });
    });
  })();
  </script>
